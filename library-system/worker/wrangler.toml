name = "maomao-books-proxy"
main = "books-proxy.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "maomao-library"
database_id = ""  # ← 创建 D1 后填入: npx wrangler d1 create maomao-library

# 环境变量（通过 wrangler secret put 设置，不要写在这里！）
# GBOOKS_API_KEY    — Google Books API Key（已有）
# JWT_SECRET        — JWT 签名密钥（新增：openssl rand -base64 32）
# GOOGLE_CLIENT_ID  — Google OAuth Client ID（新增）
