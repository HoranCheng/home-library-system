<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>毛毛图书馆 · 概念 v4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#F6F3ED;--bg2:#EDE8E0;--card:#FFFDF8;--line:rgba(44,38,31,.07);
      --text:#2C261F;--muted:#7A6F62;--accent:#3D5E4C;--accent-light:#E8EFE9;
      --accent2:#8B6F4E;--brown-light:#F5EDE2;
      --ok:#4A7C59;--ok-light:#EAF3EC;--warn:#B8863A;--warn-light:#FFF7E6;--danger:#A84E4E;
      --surface:#F3EFE8;--surface-2:#EBE6DC;
      --shadow:0 2px 12px rgba(44,38,31,.06);--shadow-md:0 4px 20px rgba(44,38,31,.10);
      --shadow-lg:0 8px 32px rgba(44,38,31,.14);
      --safe-b:env(safe-area-inset-bottom,12px);
      --serif:"Noto Serif SC","Songti SC","STSong","Georgia",serif;
    }
    *{box-sizing:border-box;margin:0}
    body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Noto Sans SC",sans-serif;background:var(--bg);-webkit-font-smoothing:antialiased}
    .app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}

    /* ── Pages ── */
    .page{display:none;padding:0 20px calc(var(--safe-b) + 84px)}
    .page.active{display:block;animation:fadeUp .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

    /* ── Topbar ── */
    .topbar{
      position:sticky;top:0;z-index:20;padding:50px 20px 14px;
      background:rgba(246,243,237,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      display:flex;align-items:flex-end;justify-content:space-between;
    }
    .topbar-sub{font-size:12px;color:var(--muted);margin-bottom:2px;letter-spacing:.03em}
    .topbar-title{font-size:22px;font-family:var(--serif);font-weight:700;line-height:1.2}

    /* ── Bottom Nav + FAB ── */
    .bottom-nav{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
      background:rgba(255,253,248,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-top:1px solid var(--line);padding:0 8px calc(var(--safe-b) + 4px);
      display:flex;align-items:flex-end;justify-content:space-around;z-index:40;height:72px;
    }
    .nav-btn{
      flex:1;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;
      cursor:pointer;padding:10px 0 6px;position:relative;-webkit-tap-highlight-color:transparent;
    }
    .nav-btn .ico{font-size:20px;transition:transform .2s}
    .nav-btn .lbl{font-size:10px;font-weight:600;color:var(--muted);transition:color .2s}
    .nav-btn.active .lbl{color:var(--accent)}
    .nav-btn.active .ico{transform:scale(1.08)}
    .nav-btn::after{content:'';position:absolute;top:0;width:20px;height:3px;background:var(--accent);border-radius:0 0 2px 2px;opacity:0;transition:opacity .15s}
    .nav-btn.active::after{opacity:1}
    .nav-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--warn);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:14px;text-align:center}
    .fab{
      width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
      background:linear-gradient(135deg,#3D5E4C 0%,#5A8C6C 100%);color:#fff;font-size:26px;font-weight:300;
      box-shadow:0 6px 20px rgba(61,94,76,.35);transform:translateY(-12px);
      transition:transform .12s,box-shadow .12s;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .fab:active{transform:translateY(-12px) scale(.9);box-shadow:0 3px 10px rgba(61,94,76,.3)}

    /* ── Shared ── */
    .card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.6)}
    .sec-title{font-size:16px;font-family:var(--serif);font-weight:700;margin:24px 0 12px}
    .subsec{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.04em;margin:20px 0 10px}
    .muted{color:var(--muted);font-size:13px}
    .hidden{display:none!important}

    /* ── Stats ── */
    .stat-grid{display:flex;justify-content:space-around;padding:14px 0}
    .stat-item{text-align:center}
    .stat-num{font-size:26px;font-weight:800;font-family:var(--serif);line-height:1}
    .stat-num.green{color:var(--accent)}.stat-num.brown{color:var(--accent2)}.stat-num.warn{color:var(--warn)}
    .stat-label{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600}

    /* ── Alert Banner ── */
    .alert-banner{margin-top:12px;padding:10px 14px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;font-size:12px}
    .alert-banner.warn{background:var(--warn-light);color:#8B6A20}
    .alert-action{font-weight:600;color:var(--warn);cursor:pointer}

    /* ── Carousel ── */
    .carousel-wrap{margin:0 -20px;padding:0 20px}
    .carousel{
      background:linear-gradient(145deg,#F9F5EE 0%,var(--brown-light) 100%);
      border-radius:20px;padding:20px 20px 16px;position:relative;overflow:hidden;
      border:1px solid rgba(139,111,78,.06);cursor:pointer;
    }
    .carousel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .carousel-label{font-size:11px;color:var(--accent2);font-weight:600;letter-spacing:.05em;display:flex;align-items:center;gap:6px}
    .carousel-ctrl{display:flex;gap:8px}
    .carousel-ctrl button{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(139,111,78,.15);background:var(--card);color:var(--accent2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .carousel-ctrl button:active{background:var(--brown-light)}
    .carousel-body{display:flex;align-items:center;gap:20px;min-height:160px;position:relative}
    .carousel-cover-wrap{position:relative;flex-shrink:0}
    .carousel-disc{
      position:absolute;top:50%;left:50%;width:130px;height:130px;border-radius:50%;
      background:conic-gradient(from 0deg,#3D3028,#5C4A38,#3D3028,#5C4A38,#3D3028);
      transform:translate(-30%,-50%);opacity:.25;
    }
    .carousel-disc::after{content:'';position:absolute;top:50%;left:50%;width:20px;height:20px;border-radius:50%;background:var(--brown-light);transform:translate(-50%,-50%)}
    .carousel-cover{
      width:110px;height:156px;border-radius:10px;object-fit:cover;position:relative;z-index:2;
      box-shadow:0 8px 28px rgba(44,38,31,.18);background:var(--surface-2);
      transition:opacity .4s ease,transform .4s ease;
    }
    .carousel-cover.switching{opacity:0;transform:translateX(30px) scale(.95)}
    .carousel-info{flex:1;min-width:0;position:relative;z-index:2}
    .carousel-cat{display:inline-block;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(139,111,78,.1);color:var(--accent2);margin-bottom:8px}
    .carousel-title{font-size:20px;font-family:var(--serif);font-weight:700;line-height:1.3;margin-bottom:6px}
    .carousel-author{font-size:13px;color:var(--muted)}
    .carousel-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;margin-top:8px;padding:3px 10px;border-radius:20px}
    .carousel-status.reading{background:var(--warn-light);color:#8B6A20}
    .carousel-status.want{background:#EBF2F8;color:#2D6A9F}
    .carousel-status.done{background:var(--ok-light);color:#2D6A3A}
    .carousel-status::before{content:'';width:5px;height:5px;border-radius:50%}
    .carousel-status.reading::before{background:var(--warn)}
    .carousel-status.want::before{background:#5B9BD5}
    .carousel-status.done::before{background:var(--ok)}
    .carousel-dots{display:flex;justify-content:center;gap:5px;margin-top:14px}
    .carousel-dots span{width:6px;height:6px;border-radius:50%;background:rgba(139,111,78,.15);transition:all .3s}
    .carousel-dots span.active{background:var(--accent2);width:18px;border-radius:3px}
    .carousel-progress{position:absolute;bottom:0;left:0;height:2px;background:var(--accent2);border-radius:0 0 20px 20px;opacity:.3;transition:width linear}

    /* ── Category Bars ── */
    .cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer}
    .cat-bar-label{font-size:12px;color:var(--text);width:48px;flex-shrink:0;text-align:right}
    .cat-bar-track{flex:1;height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden}
    .cat-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
    .cat-bar-count{font-size:12px;color:var(--muted);width:20px;text-align:right}

    /* ── Cover Grid ── */
    .cover-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .cover-item{cursor:pointer;transition:transform .12s}
    .cover-item:active{transform:scale(.95)}
    .cover-item img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);display:block}
    .cover-item .ci-title{font-size:11px;margin-top:6px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .cover-item .ci-author{font-size:10px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .shelf-letter{display:block;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.08em;padding:10px 2px 4px;margin-top:8px;border-bottom:1px solid var(--line)}

    /* ── Search ── */
    .search-bar{
      display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;
      padding:12px 16px;border:1.5px solid var(--surface-2);box-shadow:var(--shadow);margin-bottom:12px;
    }
    .search-bar input{border:none;background:transparent;font-size:14px;color:var(--text);outline:none;flex:1}
    .chip-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;padding-bottom:2px}
    .chip-row::-webkit-scrollbar{display:none}
    .chip{
      display:inline-flex;padding:6px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0;
      background:var(--surface);border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;
    }
    .chip.active{background:var(--accent);color:#fff;border-color:transparent}

    /* ── List Item ── */
    .recent-item{
      display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;
      background:var(--card);border-radius:14px;box-shadow:var(--shadow);margin-bottom:8px;transition:transform .12s;
    }
    .recent-item:active{transform:scale(.98)}
    .recent-color{width:5px;height:44px;border-radius:3px;flex-shrink:0}
    .recent-info{flex:1;min-width:0}
    .recent-title{font-size:14px;font-weight:600;font-family:var(--serif);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .recent-meta{font-size:12px;color:var(--muted);margin-top:2px}
    .status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600}
    .status-badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .status-badge.reading{background:var(--warn-light);color:#8B6A20}
    .status-badge.reading::before{background:var(--warn)}
    .status-badge.want{background:#EBF2F8;color:#2D6A9F}
    .status-badge.want::before{background:#5B9BD5}
    .status-badge.done{background:var(--ok-light);color:#2D6A3A}
    .status-badge.done::before{background:var(--ok)}
    .lib-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;background:#FFF3E0;color:#E65100;border:1px solid #FFCC80}

    /* ── Organize Card ── */
    .organize-card{
      background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);
      border-left:4px solid var(--warn);margin-bottom:10px;cursor:pointer;
    }
    .organize-head{display:flex;gap:12px;align-items:flex-start}
    .organize-cover{width:38px;height:52px;border-radius:4px;flex-shrink:0}
    .organize-info{flex:1}
    .organize-title{font-size:15px;font-weight:600;font-family:var(--serif)}
    .organize-author{font-size:12px;color:var(--muted);margin-top:3px}
    .missing-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:#FFF3E0;color:#E65100;font-weight:600;display:inline-block;margin-right:4px;margin-top:6px}
    .organize-actions{display:flex;gap:8px;margin-top:12px}
    .organize-actions button{flex:1;padding:9px 0;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:none}

    /* ── Settings Row ── */
    .setting-row{
      display:flex;align-items:center;gap:14px;background:var(--card);border-radius:14px;
      padding:14px 16px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow);
    }
    .setting-icon{font-size:20px}.setting-info{flex:1}
    .setting-label{font-size:14px;font-weight:600}
    .setting-sub{font-size:12px;color:var(--muted);margin-top:2px}
    .setting-arrow{color:var(--muted);font-size:16px}

    /* ── Detail Bottom Sheet ── */
    .modal-backdrop{position:fixed;inset:0;background:rgba(44,38,31,.5);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:50}
    .modal-sheet{
      width:100%;max-width:430px;background:var(--bg);border-radius:24px 24px 0 0;
      max-height:88vh;overflow-y:auto;animation:sheetUp .35s ease;
    }
    @keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
    .modal-hero{position:relative;display:flex;align-items:center;gap:16px;padding:20px 24px;border-radius:24px 24px 0 0}
    .modal-hero-cover{width:64px;height:90px;border-radius:8px;object-fit:cover;box-shadow:0 4px 16px rgba(0,0,0,.2);flex-shrink:0;background:var(--surface-2)}
    .modal-hero-info{flex:1;min-width:0}
    .modal-hero-title{font-size:19px;font-family:var(--serif);font-weight:700;color:#fff;line-height:1.3}
    .modal-hero-meta{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px}
    .modal-hero-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .modal-body{padding:20px 24px 40px}
    .option-row{display:flex;gap:8px;margin-top:10px}
    .option-pill{flex:1;padding:10px 0;border:2px solid var(--surface-2);border-radius:12px;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
    .option-pill.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
    .modal-meta-row{display:flex;padding:13px 16px}
    .modal-meta-row+.modal-meta-row{border-top:1px solid var(--line)}
    .modal-meta-label{font-size:13px;color:var(--muted);width:72px;flex-shrink:0}
    .modal-meta-value{font-size:13px;color:var(--text)}
    .actions{display:flex;gap:10px;margin-top:14px}
    button.btn{flex:1;border:0;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:600;cursor:pointer}
    .primary{background:var(--accent);color:#fff}
    .ghost{background:transparent;color:var(--muted);border:1.5px solid var(--line)!important}

    /* ── Scan Overlay ── */
    .scan-overlay{position:fixed;inset:0;z-index:60;background:#0A0A0A;display:none;flex-direction:column;animation:fadeIn .25s}
    .scan-overlay.show{display:flex}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .scan-top{display:flex;justify-content:space-between;align-items:center;padding:54px 20px 16px;color:#fff;position:relative;z-index:2}
    .scan-close{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .scan-mode{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.7)}
    .scan-toggle{width:42px;height:24px;background:rgba(255,255,255,.2);border-radius:12px;border:none;position:relative;cursor:pointer;transition:background .2s}
    .scan-toggle.on{background:var(--accent)}
    .scan-toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s}
    .scan-toggle.on::after{transform:translateX(18px)}
    .scan-viewport{flex:1;position:relative;display:flex;align-items:center;justify-content:center}
    .scan-frame{width:260px;height:160px;border:2.5px solid var(--accent);border-radius:12px;position:relative;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
    .scan-line{position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(90deg,transparent,rgba(97,148,113,.8),transparent);animation:scanAnim 2s ease-in-out infinite;top:0}
    @keyframes scanAnim{0%,100%{top:0;opacity:.3}50%{top:calc(100% - 2px);opacity:1}}
    .scan-hint{color:rgba(255,255,255,.5);font-size:13px;text-align:center;position:absolute;bottom:-36px;width:100%}
    .scan-torch{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer}
    .scan-bottom{padding:20px;position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:12px;padding-bottom:calc(var(--safe-b) + 24px)}
    .scan-count{background:rgba(255,255,255,.1);backdrop-filter:blur(8px);border-radius:14px;padding:12px 24px;color:#fff;font-size:14px;font-weight:600;text-align:center;width:100%;max-width:300px}
    .scan-count .big{font-size:28px;font-family:var(--serif);display:block;margin-bottom:2px}
    .scan-manual{background:none;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);border-radius:12px;padding:12px 24px;font-size:13px;cursor:pointer;font-weight:600;width:100%;max-width:300px}
    .scan-queue{max-width:300px;width:100%}
    .scan-queue-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border-radius:10px;padding:8px 12px;margin-bottom:6px;color:#fff;font-size:12px;animation:slideIn .3s ease}
    @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}
    .dupe-warn{display:none;position:absolute;inset:0;background:rgba(168,78,78,.92);backdrop-filter:blur(8px);z-index:10;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center;animation:shake .4s ease}
    .dupe-warn.show{display:flex}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

    /* ── Demo Banner ── */
    .demo-banner{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:linear-gradient(135deg,#3D5E4C,#5A8C6C);color:#fff;font-size:10px;font-weight:600;text-align:center;padding:5px 16px;z-index:100;letter-spacing:.04em}
    .demo-banner a{color:#fff;text-decoration:underline}
  </style>
</head>
<body>
<div class="app">
  <div class="demo-banner">概念演示 v4 · <a href="index.html">返回正式版</a></div>

  <!-- ═══ TOPBAR ═══ -->
  <div class="topbar" id="topbarEl">
    <div><div class="topbar-sub" id="topSub">毛毛的书房</div><div class="topbar-title" id="topTitle">我的藏书</div></div>
  </div>

  <!-- ═══ HOME ═══ -->
  <div id="pgHome" class="page active">
    <div class="card">
      <div class="stat-grid" id="statsGrid"></div>
      <div id="alertBanner"></div>
    </div>

    <div class="sec-title" style="display:flex;align-items:center;gap:8px">书海漫游 <span style="font-size:12px;color:var(--accent2);font-weight:400">自动播放中</span></div>
    <div class="carousel-wrap">
      <div class="carousel" id="carousel" onclick="openDetailFromCarousel()">
        <div class="carousel-header">
          <div class="carousel-label">♪ SHUFFLE</div>
          <div class="carousel-ctrl">
            <button onclick="event.stopPropagation();prevSlide()">‹</button>
            <button onclick="event.stopPropagation();nextSlide()">›</button>
          </div>
        </div>
        <div class="carousel-body">
          <div class="carousel-cover-wrap">
            <div class="carousel-disc" id="carouselDisc"></div>
            <img class="carousel-cover" id="carouselCover" />
          </div>
          <div class="carousel-info">
            <div class="carousel-cat" id="carouselCat"></div>
            <div class="carousel-title" id="carouselTitle"></div>
            <div class="carousel-author" id="carouselAuthor"></div>
            <div class="carousel-status" id="carouselStatus"></div>
          </div>
        </div>
        <div class="carousel-dots" id="carouselDots"></div>
        <div class="carousel-progress" id="carouselProgress"></div>
      </div>
    </div>

    <div class="sec-title">分类分布</div>
    <div class="card" id="catBars"></div>

    <div class="sec-title" style="display:flex;align-items:center;justify-content:space-between">
      我的书架 <span id="shelfToggle" style="font-size:12px;color:var(--muted);cursor:pointer;font-weight:600"></span>
    </div>
    <div id="bookShelf"></div>
  </div>

  <!-- ═══ SEARCH ═══ -->
  <div id="pgSearch" class="page">
    <div class="search-bar">
      <svg width="16" height="16" fill="none" stroke="var(--muted)" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" placeholder="书名、作者、ISBN…" oninput="renderSearch()"/>
    </div>
    <div class="chip-row" id="searchChips"></div>
    <div class="muted" id="searchCount" style="margin-bottom:10px"></div>
    <div id="searchResults"></div>
  </div>

  <!-- ═══ ORGANIZE ═══ -->
  <div id="pgOrganize" class="page">
    <div id="organizeStats"></div>
    <div id="organizeList" style="margin-top:14px"></div>
  </div>

  <!-- ═══ SETTINGS ═══ -->
  <div id="pgSettings" class="page">
    <div id="settingsContent"></div>
  </div>

  <!-- ═══ DETAIL MODAL ═══ -->
  <div id="detailRoot"></div>

  <!-- ═══ SCAN OVERLAY ═══ -->
  <div class="scan-overlay" id="scanOverlay">
    <div class="scan-top">
      <button class="scan-close" onclick="closeScan()">✕</button>
      <div style="color:#fff;font-size:15px;font-weight:600;font-family:var(--serif)">扫码录入</div>
      <div class="scan-mode">连扫 <button class="scan-toggle" id="scanToggle" onclick="toggleScanMode()"></button></div>
    </div>
    <div class="scan-viewport">
      <div class="scan-frame"><div class="scan-line"></div><div class="scan-hint">将条码对准框内</div></div>
      <button class="scan-torch" onclick="this.textContent=this.textContent==='🔦'?'💡':'🔦'">🔦</button>
      <div class="dupe-warn" id="dupeWarn">
        <div style="font-size:48px;margin-bottom:12px">🚫</div>
        <div style="font-size:20px;font-family:var(--serif);font-weight:700">这本书你已经有了！</div>
        <div style="font-size:13px;opacity:.8;margin-top:8px;line-height:1.5" id="dupeSub"></div>
        <button onclick="document.getElementById('dupeWarn').classList.remove('show')" style="margin-top:20px;background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.3);border-radius:12px;padding:12px 32px;font-size:14px;font-weight:600;cursor:pointer">知道了</button>
      </div>
    </div>
    <div class="scan-bottom">
      <div class="scan-count"><span class="big" id="scanCountNum">0</span>本已扫描</div>
      <div class="scan-queue" id="scanQueue"></div>
      <button class="scan-manual" onclick="closeScan()">手动输入 ISBN</button>
    </div>
  </div>

  <!-- ═══ BOTTOM NAV ═══ -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-pg="home"><span class="ico">🏠</span><span class="lbl">首页</span></button>
    <button class="nav-btn" data-pg="search"><span class="ico">🔍</span><span class="lbl">搜索</span></button>
    <button class="fab" onclick="openScan()">+</button>
    <button class="nav-btn" data-pg="organize" style="position:relative"><span class="ico">✏️</span><span class="lbl">整理</span></button>
    <button class="nav-btn" data-pg="settings"><span class="ico">⚙️</span><span class="lbl">设置</span></button>
  </nav>
</div>

<script>
  // ── Data ──
  const CAT_COLORS = {'文学':'#3D5E4C','历史':'#5E6B4E','科幻':'#4A6B7B','哲学':'#6B5B7B','小说':'#3D5E4C','设计':'#6B6B8B','古典':'#8B4E4E','童话':'#8B7B4E','经济':'#8B6F4E'};
  function catColor(c){return CAT_COLORS[c]||'#8B6F4E'}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function coverUrl(isbn){return `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`}
  function statusCls(s){return s==='在读'?'reading':s==='读完'?'done':'want'}

  const BOOKS=[
    {id:1,title:'三体',author:'刘慈欣',isbn:'9787536692930',cat:'科幻',status:'在读',year:'2008',loc:'书房左柜',added:'2026-03-01',desc:'地球往事三部曲第一部，讲述了地球人类文明和三体文明的信息交流与生死搏杀。'},
    {id:2,title:'百年孤独',author:'加西亚·马尔克斯',isbn:'9787544253994',cat:'文学',status:'要读',year:'2011',loc:'客厅书架',added:'2026-02-28',desc:'魔幻现实主义的代表作，描写了布恩迪亚家族七代人的传奇故事。'},
    {id:3,title:'人类简史',author:'尤瓦尔·赫拉利',isbn:'9787508647357',cat:'历史',status:'读完',year:'2014',loc:'书房右柜',added:'2025-12-15',desc:'从十万年前有生命迹象开始到21世纪的人类发展史。'},
    {id:4,title:'活着',author:'余华',isbn:'9787506365437',cat:'小说',status:'读完',year:'2012',loc:'卧室床头',added:'2025-11-20',desc:'主人公福贵经历了人生的苦难与欢乐。'},
    {id:5,title:'小王子',author:'圣埃克苏佩里',isbn:'9787020042494',cat:'童话',status:'读完',year:'2003',loc:'客厅书架',added:'2025-10-10',desc:'讲述了小王子从自己星球出发前往地球的过程中的各种历险。'},
    {id:6,title:'1984',author:'乔治·奥威尔',isbn:'9787530210291',cat:'小说',status:'要读',year:'2010',loc:'书房左柜',added:'2026-03-05',desc:'一部杰出的政治寓言小说。'},
    {id:7,title:'围城',author:'钱锺书',isbn:'9787020024759',cat:'小说',status:'读完',year:'1991',loc:'书房右柜',added:'2025-09-05',desc:'以幽默的笔触描绘了抗战时期知识分子的群像。'},
    {id:8,title:'红楼梦',author:'曹雪芹',isbn:'9787020002207',cat:'古典',status:'在读',year:'1996',loc:'书房左柜',added:'2026-01-01',desc:'中国古代四大名著之首。'},
    {id:9,title:'设计心理学',author:'唐纳德·诺曼',isbn:'9787508648330',cat:'设计',status:'要读',year:'2015',loc:'',added:'2026-03-08',desc:'用日常案例阐释设计的基本原则。',incomplete:true},
    {id:10,title:'解忧杂货店',author:'东野圭吾',isbn:'9787544270878',cat:'小说',status:'读完',year:'2014',loc:'客厅书架',added:'2026-02-14',desc:'现代人内心流失的东西，这家杂货店能帮你找回。'},
    {id:11,title:'月亮与六便士',author:'毛姆',isbn:'9787020090006',cat:'小说',status:'读完',year:'2017',loc:'卧室床头',added:'2025-08-30',desc:'一个经纪人抛妻弃子追求绘画艺术的故事。'},
    {id:12,title:'平凡的世界',author:'路遥',isbn:'9787530212004',cat:'小说',status:'读完',year:'2012',loc:'书房左柜',added:'2025-07-10',desc:'以70年代到80年代十年间为背景的史诗级作品。'},
  ];

  // ── State ──
  let curPage='home', searchCat='', shelfSort='alpha', carouselIdx=0, carouselTimer=null, carouselPaused=false;
  let continuousScan=false, scanCount=0, scanSimTimer=null;

  // ── Navigation ──
  const PAGES={home:{title:'我的藏书',sub:'毛毛的书房'},search:{title:'找一本书',sub:'搜索'},organize:{title:'信息补充',sub:'补充信息'},settings:{title:'设置',sub:'设置'}};
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.onclick=()=>{
      const pg=btn.dataset.pg; if(!pg)return;
      curPage=pg;
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      document.getElementById('pg'+pg.charAt(0).toUpperCase()+pg.slice(1)).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const info=PAGES[pg]||{};
      document.getElementById('topTitle').textContent=info.title||'';
      document.getElementById('topSub').textContent=info.sub||'';
      window.scrollTo({top:0,behavior:'smooth'});
    };
  });

  // ── Carousel ──
  function renderCarousel(){
    const b=BOOKS[carouselIdx];
    const cover=document.getElementById('carouselCover');
    const cls=statusCls(b.status);
    cover.classList.add('switching');
    setTimeout(()=>{
      cover.src=coverUrl(b.isbn);
      cover.style.background=catColor(b.cat);
      cover.onerror=function(){this.style.background=catColor(b.cat);this.removeAttribute('src')};
      document.getElementById('carouselCat').textContent=b.cat;
      document.getElementById('carouselTitle').textContent=b.title;
      document.getElementById('carouselAuthor').textContent=b.author+' · '+b.year;
      const statusEl=document.getElementById('carouselStatus');
      statusEl.className='carousel-status '+cls;
      statusEl.textContent=b.status;
      // Dots
      document.getElementById('carouselDots').innerHTML=BOOKS.map((_,i)=>
        `<span class="${i===carouselIdx?'active':''}"></span>`
      ).join('');
      cover.classList.remove('switching');
    },350);
    // Progress bar animation
    const prog=document.getElementById('carouselProgress');
    prog.style.transition='none';prog.style.width='0%';
    requestAnimationFrame(()=>{prog.style.transition='width 4s linear';prog.style.width='100%'});
  }
  function nextSlide(){carouselIdx=(carouselIdx+1)%BOOKS.length;renderCarousel();resetCarouselTimer()}
  function prevSlide(){carouselIdx=(carouselIdx-1+BOOKS.length)%BOOKS.length;renderCarousel();resetCarouselTimer()}
  function resetCarouselTimer(){
    clearInterval(carouselTimer);
    if(!carouselPaused)carouselTimer=setInterval(()=>{carouselIdx=(carouselIdx+1)%BOOKS.length;renderCarousel()},4000);
  }
  function openDetailFromCarousel(){showDetail(BOOKS[carouselIdx].id)}

  // ── Home ──
  function renderHome(){
    const total=BOOKS.length, read=BOOKS.filter(b=>b.status==='读完').length;
    const reading=BOOKS.filter(b=>b.status==='在读').length, unread=BOOKS.filter(b=>b.status==='要读').length;
    const incomplete=BOOKS.filter(b=>b.incomplete).length;
    document.getElementById('statsGrid').innerHTML=
      `<div class="stat-item"><div class="stat-num">${total}</div><div class="stat-label">总藏书</div></div>`+
      `<div class="stat-item"><div class="stat-num green">${read}</div><div class="stat-label">已读</div></div>`+
      `<div class="stat-item"><div class="stat-num brown">${reading}</div><div class="stat-label">在读</div></div>`+
      `<div class="stat-item"><div class="stat-num warn">${unread}</div><div class="stat-label">未读</div></div>`;
    document.getElementById('alertBanner').innerHTML=incomplete>0
      ?`<div class="alert-banner warn"><span>📋 有 ${incomplete} 本书信息待补充</span><span class="alert-action" onclick="document.querySelector('[data-pg=organize]').click()">去补充 →</span></div>`:'';

    // Category bars
    const counts={};BOOKS.forEach(b=>{const k=b.cat||'未分类';counts[k]=(counts[k]||0)+1});
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    const max=sorted[0]?.[1]||1;
    document.getElementById('catBars').innerHTML=sorted.map(([name,count])=>
      `<div class="cat-bar-row"><span class="cat-bar-label">${esc(name)}</span><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(count/max)*100}%;background:${catColor(name)}"></div></div><span class="cat-bar-count">${count}</span></div>`
    ).join('');

    // Bookshelf
    renderShelf();

    // Organize badge
    const badge=document.querySelector('[data-pg=organize] .nav-badge');
    if(badge)badge.remove();
    if(incomplete>0){const b=document.createElement('span');b.className='nav-badge';b.textContent=incomplete;document.querySelector('[data-pg=organize]').appendChild(b)}
  }

  function getPinyinInitial(ch){
    const map=[['A','啊'],['B','芭'],['C','擦'],['D','搭'],['E','蛾'],['F','发'],['G','噶'],['H','哈'],['J','击'],['K','喀'],['L','垃'],['M','妈'],['N','拿'],['O','哦'],['P','啪'],['Q','期'],['R','然'],['S','撒'],['T','塌'],['W','挖'],['X','昔'],['Y','压'],['Z','匝']];
    for(let i=map.length-1;i>=0;i--)if(ch.localeCompare(map[i][1],'zh-CN-u-co-pinyin')>=0)return map[i][0];return '#';
  }
  function getSortKey(t){const f=String(t||'').trim().charAt(0);if(!f)return '#';const c=f.charCodeAt(0);if(c>=0x4e00&&c<=0x9fff)return getPinyinInitial(f);const u=f.toUpperCase();return(u>='A'&&u<='Z')?u:'#'}

  function renderShelf(){
    const el=document.getElementById('bookShelf');
    const tog=document.getElementById('shelfToggle');
    tog.textContent=shelfSort==='alpha'?'按字母 ↕时间':'按时间 ↕字母';
    tog.onclick=()=>{shelfSort=shelfSort==='alpha'?'time':'alpha';renderShelf()};
    if(shelfSort==='time'){
      const sorted=BOOKS.slice().sort((a,b)=>b.added.localeCompare(a.added));
      el.innerHTML=`<div class="cover-grid">${sorted.map(b=>coverItemHtml(b)).join('')}</div>`;
    } else {
      const sorted=BOOKS.slice().sort((a,b)=>a.title.localeCompare(b.title,'zh-CN-u-co-pinyin'));
      let html='',lastKey=null;
      for(const b of sorted){
        const key=getSortKey(b.title);
        if(key!==lastKey){if(lastKey!==null)html+='</div>';html+=`<div class="shelf-letter">${esc(key)}</div><div class="cover-grid">`;lastKey=key}
        html+=coverItemHtml(b);
      }
      if(lastKey!==null)html+='</div>';
      el.innerHTML=html;
    }
  }
  function coverItemHtml(b){
    return `<div class="cover-item" onclick="showDetail(${b.id})"><img src="${coverUrl(b.isbn)}" onerror="this.style.background='${catColor(b.cat)}';this.removeAttribute('src')" /><div class="ci-title">${esc(b.title)}</div><div class="ci-author">${esc(b.author)}</div></div>`;
  }

  // ── Search ──
  function renderSearch(){
    const q=(document.getElementById('searchInput')?.value||'').trim().toLowerCase();
    const cats=[...new Set(BOOKS.map(b=>b.cat))];
    document.getElementById('searchChips').innerHTML=
      `<button class="chip ${!searchCat?'active':''}" onclick="searchCat='';renderSearch()">全部</button>`+
      cats.map(c=>`<button class="chip ${searchCat===c?'active':''}" onclick="searchCat='${c}';renderSearch()">${esc(c)}</button>`).join('');
    const matched=BOOKS.filter(b=>{
      const qm=!q||[b.title,b.author,b.isbn,b.cat].some(v=>v.toLowerCase().includes(q));
      const cm=!searchCat||b.cat===searchCat;return qm&&cm;
    });
    document.getElementById('searchCount').textContent=`${matched.length} 本`;
    document.getElementById('searchResults').innerHTML=matched.map(b=>{
      const cls=statusCls(b.status);
      return `<div class="recent-item" onclick="showDetail(${b.id})"><div class="recent-color" style="background:${catColor(b.cat)}"></div><div class="recent-info"><div class="recent-title">${esc(b.title)}</div><div class="recent-meta">${esc(b.author)} · ${esc(b.cat)}${b.loc?' · 📍'+esc(b.loc):''}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><span class="status-badge ${cls}">${esc(b.status)}</span>${b.incomplete?'<span class="lib-badge">待补充</span>':''}</div></div>`;
    }).join('')||'<div class="muted" style="text-align:center;padding:40px 0">没有找到匹配的图书</div>';
  }

  // ── Organize ──
  function renderOrganize(){
    const todo=BOOKS.filter(b=>b.incomplete);
    document.getElementById('organizeStats').innerHTML=todo.length
      ?`<div class="card" style="display:flex;gap:12px;align-items:center;padding:12px 16px"><div style="font-size:28px;font-weight:800;color:var(--warn)">${todo.length}</div><div><div style="font-size:13px;font-weight:600;color:#8B6A20">本书信息待补充</div><div style="font-size:11px;color:var(--muted);margin-top:2px">缺少分类、位置或出版年份</div></div></div>`
      :`<div style="text-align:center;padding:40px 20px"><div style="font-size:40px;margin-bottom:12px">✅</div><div class="muted">全部整理完毕</div></div>`;
    document.getElementById('organizeList').innerHTML=todo.map(b=>{
      const missing=[];if(!b.isbn)missing.push('ISBN');if(!b.loc)missing.push('位置');if(!b.cat)missing.push('分类');
      return `<div class="organize-card"><div class="organize-head"><div class="organize-cover" style="background:${catColor(b.cat)}"></div><div class="organize-info"><div class="organize-title">${esc(b.title)}</div><div class="organize-author">${esc(b.author||'未知作者')}</div>${missing.length?`<div>${missing.map(m=>`<span class="missing-tag">缺 ${m}</span>`).join('')}</div>`:''}</div></div><div class="organize-actions"><button style="background:var(--accent-light);color:var(--accent)">补充信息</button><button style="background:var(--card);color:var(--muted);border:1.5px solid var(--line)">直接入库</button></div></div>`;
    }).join('');
  }

  // ── Settings ──
  function renderSettings(){
    document.getElementById('settingsContent').innerHTML=[
      {icon:'📤',label:'导出 JSON',sub:'完整数据备份'},
      {icon:'📊',label:'导出 CSV',sub:'表格格式，便于迁移'},
      {icon:'📥',label:'导入数据',sub:'从备份恢复'},
      {icon:'🔍',label:'数据校验',sub:'检查数据完整性'},
    ].map(r=>`<div class="setting-row"><span class="setting-icon">${r.icon}</span><div class="setting-info"><div class="setting-label">${r.label}</div><div class="setting-sub">${r.sub}</div></div><span class="setting-arrow">›</span></div>`).join('')+
    `<div class="card" style="margin-top:16px;padding:14px 16px"><div style="font-size:12px;color:var(--muted)">存储方式</div><div style="font-size:14px;font-weight:600;margin-top:4px">本地 localStorage</div><div style="font-size:12px;color:var(--muted);margin-top:2px">数据存在浏览器本地，建议定期导出备份</div></div>`;
  }

  // ── Detail Modal ──
  function showDetail(id){
    const b=BOOKS.find(x=>x.id===id);if(!b)return;
    const cc=catColor(b.cat),cls=statusCls(b.status);
    document.getElementById('detailRoot').innerHTML=`
      <div class="modal-backdrop" id="detailBackdrop">
        <div class="modal-sheet">
          <div class="modal-hero" style="background:linear-gradient(135deg,${cc},${cc}cc)">
            <img class="modal-hero-cover" src="${coverUrl(b.isbn)}" onerror="this.style.background='${cc}';this.removeAttribute('src')" style="background:${cc}" />
            <div class="modal-hero-info">
              <div class="modal-hero-title">${esc(b.title)}</div>
              <div class="modal-hero-meta">${esc(b.author)} · ${esc(b.year)}</div>
              <div class="modal-hero-badges">
                <span class="status-badge ${cls}">${esc(b.status)}</span>
                ${b.incomplete?'<span class="lib-badge">待补充</span>':''}
              </div>
            </div>
          </div>
          <div class="modal-body">
            <div style="margin-bottom:20px">
              <div class="subsec" style="margin-top:0">阅读状态</div>
              <div class="option-row">
                ${['要读','在读','读完'].map(s=>`<button class="option-pill ${b.status===s?'active':''}" onclick="switchStatus(${b.id},'${s}')">${s}</button>`).join('')}
              </div>
            </div>
            <div style="background:var(--card);border-radius:14px;overflow:hidden;margin-bottom:16px">
              ${[{l:'分类',v:b.cat||'未分类'},{l:'存放位置',v:b.loc||'未填写'},{l:'ISBN',v:b.isbn||'未填写'},{l:'出版年',v:b.year||''}].map(r=>`<div class="modal-meta-row"><span class="modal-meta-label">${r.l}</span><span class="modal-meta-value">${esc(r.v)}</span></div>`).join('')}
            </div>
            ${b.desc?`<div style="margin-bottom:16px"><div class="subsec" style="margin-top:0">内容简介</div><div class="muted" style="line-height:1.8">${esc(b.desc)}</div></div>`:''}
            <div class="actions">
              <button class="btn primary">编辑</button>
              <button class="btn ghost" onclick="closeDetail()">关闭</button>
            </div>
          </div>
        </div>
      </div>`;
    document.getElementById('detailBackdrop').onclick=e=>{if(e.target.id==='detailBackdrop')closeDetail()};
  }
  function closeDetail(){document.getElementById('detailRoot').innerHTML=''}
  function switchStatus(id,status){const b=BOOKS.find(x=>x.id===id);if(b){b.status=status;showDetail(id);renderHome();renderSearch()}}

  // ── Scan ──
  function openScan(){
    scanCount=0;document.getElementById('scanCountNum').textContent='0';
    document.getElementById('scanQueue').innerHTML='';
    document.getElementById('dupeWarn').classList.remove('show');
    document.getElementById('scanOverlay').classList.add('show');
    if(continuousScan)startScanSim();
  }
  function closeScan(){document.getElementById('scanOverlay').classList.remove('show');clearTimeout(scanSimTimer)}
  function toggleScanMode(){
    continuousScan=!continuousScan;
    document.getElementById('scanToggle').classList.toggle('on',continuousScan);
    if(continuousScan)startScanSim();else clearTimeout(scanSimTimer);
  }
  function startScanSim(){
    scanSimTimer=setTimeout(()=>{
      if(Math.random()<0.2){
        const d=BOOKS[Math.floor(Math.random()*BOOKS.length)];
        document.getElementById('dupeSub').innerHTML=`《${esc(d.title)}》已在你的书架中<br>添加于 ${d.added}`;
        document.getElementById('dupeWarn').classList.add('show');
        if(navigator.vibrate)navigator.vibrate(200);
      } else {
        scanCount++;document.getElementById('scanCountNum').textContent=String(scanCount);
        const names=['时间简史','代码大全','娱乐至死','乡土中国','白鹿原','许三观卖血记','天龙八部','明朝那些事儿','苏菲的世界','追风筝的人'];
        const auths=['霍金','麦康奈尔','波兹曼','费孝通','陈忠实','余华','金庸','当年明月','贾德','胡赛尼'];
        const i=(scanCount-1)%names.length;
        const q=document.getElementById('scanQueue');
        q.innerHTML=`<div class="scan-queue-item"><span style="color:var(--ok)">✓</span><span style="flex:1;font-weight:600">${names[i]}</span><span style="opacity:.5">${auths[i]}</span></div>`+q.innerHTML;
        if(q.children.length>4)q.lastElementChild.remove();
      }
      if(continuousScan&&document.getElementById('scanOverlay').classList.contains('show'))startScanSim();
    },2000+Math.random()*2000);
  }

  // ── Init ──
  renderHome();renderSearch();renderOrganize();renderSettings();
  renderCarousel();resetCarouselTimer();
</script>
</body>
</html>
