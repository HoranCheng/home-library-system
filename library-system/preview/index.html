              ${currentDraftLocation ? `<span class="scan-preview-chip">📍 ${escapeHtml(currentDraftLocation)}</span>` : ''}
            </div>
            <div style="margin-top:8px">
              <button class="btn ghost" id="toggleDetailFieldsBtn" style="font-size:11px;padding:4px 10px">编辑详情 ▾</button>
            </div>
          </div>
        </div>`;
        els.reviewCard.style.display = 'none';
      } else if (!lookupCompleted && !currentDraftTitle && !currentDraftAuthor) {
        previewArea.innerHTML = '';
        els.reviewCard.style.display = '';
        els.reviewCard.innerHTML = '<div class="muted">扫码或输入 ISBN，系统自动补全信息</div>';
        if (detailFields) detailFields.style.display = 'none';
      } else {
        previewArea.innerHTML = '';
        els.reviewCard.style.display = '';
        els.reviewCard.innerHTML = `<div style="font-weight:600;font-family:var(--serif)">${escapeHtml(currentDraftTitle || '待补充书名')}</div>
           <div class="muted" style="margin-top:6px">${escapeHtml(currentDraftAuthor || '待补充作者')}</div>`;
        if (detailFields) detailFields.style.display = '';
      }
      els.saveBtn.disabled = false;
      // Dynamic button text based on entry method
      els.finishEntryBtn.textContent = lastEntryMethod === 'scan' ? '结束扫描' : '返回总览';

      const books = loadActiveBooks();
      const todoCount = books.filter(b => b.status === 'to_be_sorted').length;
      const inLibCount = books.filter(b => b.status === 'in_library').length;

      // Dashboard summary card (warm copy, no progress bar)
      let summarySub;
      if (todoCount > 5) summarySub = '还有一些书可以补充更多信息';
      else if (todoCount >= 1) summarySub = '大部分书都已经整理得很完整了';
      else summarySub = '每一本书的信息都已经整理好了';

      document.getElementById('summaryCard').innerHTML = `
        <div class="summary-headline">
          书架上整理了 <span class="num">${books.length}</span> 本书
        </div>
        <div class="summary-sub">${escapeHtml(summarySub)}</div>
      `;

      // Backup reminder (non-intrusive)
      const backupBanner = document.getElementById('backupReminder');
      if (backupBanner) {
        if (shouldShowBackupReminder()) {
          const bs = getBackupStatus();
          let msg;
          if (!bs.lastExport) msg = `你已经有 ${bs.currentCount} 本书了，建议导出备份一下`;
          else if (bs.newSinceExport >= 10) msg = `新增了 ${Math.max(0, bs.newSinceExport)} 本书，建议更新备份`;
          else msg = `距上次备份已经 ${bs.daysSinceExport} 天了，建议导出一下`;
          backupBanner.innerHTML = `<span>💾 ${escapeHtml(msg)}</span><button class="backup-remind-btn" onclick="setPage('settings');this.closest('.backup-reminder').style.display='none'">去备份</button><button class="backup-remind-dismiss" onclick="this.closest('.backup-reminder').style.display='none'">✕</button>`;
          backupBanner.style.display = '';
        } else {
          backupBanner.style.display = 'none';
        }
      }

      // Favorites gallery
      const favBooks = books.filter(b => b.favorite);
      const favSection = document.getElementById('favGallerySection');
      if (favBooks.length > 0) {
        favSection.style.display = '';
        document.getElementById('favGalleryLabel').textContent = favBooks.length;
        document.getElementById('favGalleryScroll').innerHTML = favBooks.map(b => {
          const cu = coverUrl(b);
          const cc = catColor(b.category);
          return `<div class="fav-gallery-item book-detail-btn" data-id="${escapeHtml(b.id)}">
            ${cu
              ? `<img class="fav-gallery-cover" src="${escapeHtml(cu)}" alt="${escapeHtml(b.title || '')}" loading="lazy" ${coverFallbackUrl(b) ? `data-fallback-src="${escapeHtml(coverFallbackUrl(b))}"` : ''} style="background:${cc}" onload="onCoverLoad(this)" onerror="handleCoverError(this)" />`
              : `<div class="fav-gallery-cover" style="background:${cc};display:flex;align-items:flex-end;justify-content:center;padding:8px"><span style="font-size:10px;color:rgba(255,255,255,.7);font-weight:600;text-align:center;line-height:1.3">${escapeHtml((b.title||'').slice(0,8))}</span></div>`
            }
          </div>`;
        }).join('');
      } else {
        favSection.style.display = 'none';
      }

      // Category distribution (bar chart)
      const categoryCounts = books.reduce((acc, book) => {
        const key = (book.category || '未分类').trim() || '未分类';
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
      const sortedCategories = Object.entries(categoryCounts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-CN'));
      const CAT_COLLAPSE_LIMIT = 5;
      if (sortedCategories.length) {
        const maxCount = sortedCategories[0][1];
        const catRows = sortedCategories.map(([name, count], i) =>
          `<div class="cat-bar-row category-filter-chip${i >= CAT_COLLAPSE_LIMIT ? ' cat-hidden' : ''}" data-category="${escapeHtml(name)}" style="cursor:pointer${i >= CAT_COLLAPSE_LIMIT ? ';display:none' : ''}">
            <span class="cat-bar-label">${escapeHtml(name)}</span>
            <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(count/maxCount)*100}%;background:${catColor(name)}"></div></div>
            <span class="cat-bar-count">${count}</span>
          </div>`
        ).join('');
        const toggleBtn = sortedCategories.length > CAT_COLLAPSE_LIMIT
          ? `<div class="cat-expand-btn" id="catExpandBtn" style="text-align:center;padding:8px 0;font-size:12px;color:var(--accent);cursor:pointer;font-weight:600">展开全部 (${sortedCategories.length}) ▾</div>`
          : '';
        els.categoryChips.innerHTML = catRows + toggleBtn;
      } else {
        els.categoryChips.innerHTML = '<div class="muted">还没有分类数据</div>';
      }

      // View toggle active state
      document.querySelectorAll('.shelf-view-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === shelfViewMode);
      });

      // Bookshelf
      if (!books.length) {
        els.bookList.innerHTML = `<div class="empty-onboarding">
          <div class="empty-icon">📚</div>
          <div class="empty-title">欢迎来到你的书房</div>
          <div class="empty-sub">扫一扫书背面的条形码，<br>或手动输入 ISBN，开始整理你的藏书吧</div>
          <button class="empty-cta" onclick="setPage('home',{mode:'entry'})">开始录入第一本书</button>
        </div>`;
      } else if (shelfViewMode === 'grid') {
        // Grid view: covers in grid, sorted by time (newest first)
        // Paginated rendering for large libraries (>100 books)
        const byTime = books.slice().sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
        // Disconnect previous observer if any
        if (_gridObserver) { _gridObserver.disconnect(); _gridObserver = null; }
        const PAGE_SIZE = 60;
        const firstPage = byTime.slice(0, PAGE_SIZE);
        const gridId = `grid-${++_gridIdCounter}`;
        els.bookList.innerHTML = `<div class="book-grid" id="${gridId}">${firstPage.map(b => {
          const cu = coverUrl(b);
          const fallbackCu = coverFallbackUrl(b);
          return `<div class="book-grid-item book-detail-btn" data-id="${escapeHtml(b.id)}">
            ${coverHtml(cu, b.title, fallbackCu)}
            <div class="book-grid-title">${escapeHtml(b.title || '未命名')}</div>
            <div class="book-grid-author">${escapeHtml(b.author || '未知作者')}</div>
          </div>`;
        }).join('')}</div>${byTime.length > PAGE_SIZE ? '<div class="load-more-sentinel" style="height:1px"></div>' : ''}`;

        // Progressive loading for remaining pages
        if (byTime.length > PAGE_SIZE) {
          let loaded = PAGE_SIZE;
          const sentinel = els.bookList.querySelector('.load-more-sentinel');
          const gridEl = document.getElementById(gridId);
          if (sentinel && gridEl) {
            _gridObserver = new IntersectionObserver((entries) => {
              const io = _gridObserver;
              if (!entries[0].isIntersecting || loaded >= byTime.length) { if (io) io.disconnect(); sentinel.remove(); return; }
              const nextBatch = byTime.slice(loaded, loaded + PAGE_SIZE);
              const frag = document.createDocumentFragment();
              const tmp = document.createElement('div');
              tmp.innerHTML = nextBatch.map(b => {
                const cu = coverUrl(b);
                return `<div class="book-grid-item book-detail-btn" data-id="${escapeHtml(b.id)}">
                  ${coverHtml(cu, b.title, coverFallbackUrl(b))}
                  <div class="book-grid-title">${escapeHtml(b.title || '未命名')}</div>
                  <div class="book-grid-author">${escapeHtml(b.author || '未知作者')}</div>
                </div>`;
              }).join('');
              while (tmp.firstChild) frag.appendChild(tmp.firstChild);
              gridEl.appendChild(frag);
              loaded += nextBatch.length;
              if (loaded >= byTime.length) { if (io) io.disconnect(); sentinel.remove(); }
            }, { rootMargin: '200px' });
            _gridObserver.observe(sentinel);
          }
        }
      } else {
        // List view: alphabetical with letter headers
        const byAlpha = sortByTitle(books);
        let html = '';
        let lastKey = null;
        for (const b of byAlpha) {
          const key = getSortKey(b.title);
          if (key !== lastKey) {
            if (lastKey !== null) html += '</div>';
            html += `<div class="shelf-letter-head" data-letter="${escapeHtml(key)}">${escapeHtml(key)}</div><div class="book-list-view">`;
            lastKey = key;
          }
          const cu = coverUrl(b);
          const cc = catColor(b.category);
          html += `<div class="book-list-item book-detail-btn" data-id="${escapeHtml(b.id)}">
            ${cu
              ? `<img class="book-list-cover" src="${escapeHtml(cu)}" alt="${escapeHtml(b.title || '')}" loading="lazy" ${coverFallbackUrl(b) ? `data-fallback-src="${escapeHtml(coverFallbackUrl(b))}"` : ''} style="background:${cc}" onload="onCoverLoad(this)" onerror="handleCoverError(this)" />`
              : `<div class="book-list-cover" style="background:${cc}"></div>`
            }
            <div class="book-list-info">
              <div class="book-list-title">${escapeHtml(b.title || '未命名')}</div>
              <div class="book-list-meta">${escapeHtml(b.author || '未知作者')}${b.category ? ' · ' + escapeHtml(b.category) : ''}</div>
            </div>
          </div>`;
        }
        if (lastKey !== null) html += '</div>';
        els.bookList.innerHTML = html;
      }

      // ── Alphabet Scrubber (only in list/alpha view) ──
      _alphaScrubberEnabled = (page === 'home' && mode === 'dashboard' && shelfViewMode === 'list');
      if (!_alphaScrubberEnabled) {
        const s = document.getElementById('alphaScrubber');
        if (s) s.classList.add('hidden');
      } else {
        updateAlphaScrubber(true);
      }

      // Category presets (entry form)
      const defaultCats = ['小说','文学','科幻','历史','哲学','心理学','经济','计算机','编程','科普','传记','儿童','艺术','旅行'];
      const cleanUserCats = [...new Set(books.map(b => b.category).filter(Boolean))]
        .filter(c => isGoodCategory(c) && c.length <= 8 && !/[=:]/.test(c));
      const allCatPresets = [...new Set([...cleanUserCats, ...defaultCats])].slice(0, 14);
      const categoryPresetsEl = document.getElementById('categoryPresets');
      if (categoryPresetsEl) {
        categoryPresetsEl.innerHTML = allCatPresets.map(c =>
          `<button class="chip category-preset-btn" data-cat="${escapeHtml(c)}" style="flex-shrink:0;font-size:11px;padding:4px 10px;white-space:nowrap">${escapeHtml(c)}</button>`
        ).join('');
      }

      // Location presets
      const locationPresets = loadLocationPresets();
      els.locationPresetChips.innerHTML = locationPresets.length
        ? locationPresets.map(v => `<button class="chip location-preset-btn" data-value="${escapeHtml(v)}">${escapeHtml(v)}</button>`).join('')
        : '';

      // Search
      const query = String(els.searchInput?.value || '').trim().toLowerCase();
      els.searchClearBtn.style.display = query ? 'block' : 'none';
      const matchedBooks = books.filter(b => {
        const statusLabel = b.status === 'to_be_sorted' ? '待补充' : '已入库';
        const readLabel = normalizeReadingStatus(b.readingStatus) || '未读';
        const favLabel = b.favorite ? '收藏' : '';
        const queryMatched = !query || [b.title, b.author, b.isbn, b.category, statusLabel, readLabel, favLabel, b.location].some(v => String(v || '').toLowerCase().includes(query));
        const categoryMatched = !selectedCategoryFilter || String(b.category || '').trim() === selectedCategoryFilter;
        return queryMatched && categoryMatched;
      });
      // Search category chips
      const searchCategories = [...new Set(books.map(b => b.category).filter(Boolean))];
      const SEARCH_CAT_LIMIT = 6;
      const searchCatAll = `<button class="chip category-filter-chip ${!selectedCategoryFilter ? 'active' : ''}" data-category="">全部</button>`;
      const searchCatItems = searchCategories.map((cat, i) =>
        `<button class="chip category-filter-chip search-cat-chip${i >= SEARCH_CAT_LIMIT ? ' cat-hidden' : ''}" ${i >= SEARCH_CAT_LIMIT ? 'style="display:none"' : ''} data-category="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`
      ).join('');
      const searchCatToggle = searchCategories.length > SEARCH_CAT_LIMIT
        ? `<button class="chip search-cat-expand" id="searchCatExpand" style="color:var(--accent);border-color:var(--accent);font-weight:600">+${searchCategories.length - SEARCH_CAT_LIMIT}</button>`
        : '';
      els.searchCatChips.innerHTML = searchCatAll + searchCatItems + searchCatToggle;

      const exactIsbnMatches = query ? books.filter(b => String(b.isbn || '').replace(/[^0-9Xx]/g, '') === query.replace(/[^0-9Xx]/g, '')) : [];
      if (!books.length) {
        els.searchSummary.innerHTML = '';
        els.searchResults.innerHTML = '<div class="muted" style="margin-top:12px">还没有图书数据</div>';
      } else {
        els.searchSummary.innerHTML = `<span class="muted">${matchedBooks.length} 本</span>`;
        els.searchResults.innerHTML = matchedBooks.length
          ? matchedBooks.map(b => {
              const cu = coverUrl(b);
              return `<div class="recent-item book-detail-btn" data-id="${escapeHtml(b.id)}">
                <div class="recent-color" style="background:${catColor(b.category)}"></div>
                <div class="recent-info">
                  <div class="recent-title">${escapeHtml(b.title || '未命名')}</div>
                  <div class="recent-author">${escapeHtml(b.author || '未知')} · ${escapeHtml(b.category || '未分类')}</div>
                  ${b.location ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">📍 ${escapeHtml(b.location)}</div>` : ''}
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
                  ${statusBadgeHtml(b.readingStatus, b.favorite)}
                  ${b.status === 'to_be_sorted' ? libBadgeHtml(b.status) : ''}
                </div>
              </div>`;
            }).join('')
          : '<div class="muted" style="margin-top:12px">没有找到匹配的图书</div>';
      }

      // Organize
      const todoBooks = books.filter(b => b.status === 'to_be_sorted');
      els.organizeStats.innerHTML = todoBooks.length
        ? `<div class="card" style="display:flex;gap:12px;align-items:center;padding:12px 16px">
            <div style="font-size:28px;font-weight:800;color:var(--warn)">${todoBooks.length}</div>
            <div><div style="font-size:13px;font-weight:600;color:#8B6A20">本书信息待补充</div><div style="font-size:11px;color:var(--muted);margin-top:2px">缺少分类、位置或出版年份</div></div>
          </div>`
        : `<div style="text-align:center;padding:40px 20px"><div style="font-size:40px;margin-bottom:12px">✅</div><div class="muted">全部整理完毕</div></div>`;
      els.organizeList.innerHTML = todoBooks.map((b, index) => {
        const missing = [];
        if (!b.isbn) missing.push('ISBN');
        if (!b.location) missing.push('位置');
        if (!b.category) missing.push('分类');
        return `<div class="organize-card">
          <div class="organize-card-head">
            <div class="organize-card-cover" style="background:${catColor(b.category)}"></div>
            <div class="organize-card-info">
              <div class="organize-card-title">${escapeHtml(b.title || '未命名')}</div>
              <div class="organize-card-author">${escapeHtml(b.author || '未知作者')}</div>
              ${missing.length ? `<div>${missing.map(m => `<span class="missing-tag">缺 ${m}</span>`).join('')}</div>` : ''}
            </div>
          </div>
          <div class="organize-actions">
            <button style="background:var(--accent-light);color:var(--accent)" class="menu-btn" data-menu-id="${escapeHtml(b.id)}" data-action="edit" data-id="${escapeHtml(b.id)}">补充信息</button>
            <button style="background:var(--card);color:var(--muted);border:1.5px solid var(--line)" class="organize-done-btn" data-index="${index}">直接入库</button>
          </div>
        </div>`;
      }).join('');

      // Organize: reading stats
      const orgStatsGrid = document.getElementById('orgStatsGrid');
      if (orgStatsGrid) {
        const catCount = [...new Set(books.map(b => b.category).filter(Boolean))].length;
        const orgDoneBooks = books.filter(b => normalizeReadingStatus(b.readingStatus) === '读过').length;
        const orgFavBooks = books.filter(b => b.favorite).length;
        orgStatsGrid.innerHTML = `
          <div class="stats-card"><div class="sc-icon">📚</div><div class="sc-num">${books.length}</div><div class="sc-label">总藏书量</div></div>
          <div class="stats-card"><div class="sc-icon">✅</div><div class="sc-num">${orgDoneBooks}</div><div class="sc-label">读过</div><div class="sc-sub">完成率 ${books.length ? (orgDoneBooks/books.length*100).toFixed(0) : 0}%</div></div>
          <div class="stats-card"><div class="sc-icon">❤️</div><div class="sc-num">${orgFavBooks}</div><div class="sc-label">收藏</div></div>
          <div class="stats-card"><div class="sc-icon">🏷️</div><div class="sc-num">${catCount}</div><div class="sc-label">分类数</div></div>
        `;
      }

      // Organize: monthly timeline
      const orgTimeline = document.getElementById('orgTimeline');
      if (orgTimeline) {
        const monthCounts = {};
        books.forEach(b => {
          const d = b.createdAt || b.updatedAt || '';
          if (d) {
            const m = d.substring(0, 7); // YYYY-MM
            monthCounts[m] = (monthCounts[m] || 0) + 1;
          }
        });
        const sorted = Object.entries(monthCounts).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 9);
        const maxM = Math.max(...sorted.map(s => s[1]), 1);
        const monthNames = { '01':'1月','02':'2月','03':'3月','04':'4月','05':'5月','06':'6月','07':'7月','08':'8月','09':'9月','10':'10月','11':'11月','12':'12月' };
        orgTimeline.innerHTML = sorted.map(([ym, count]) => {
          const mm = ym.split('-')[1];
          return `<div class="timeline-row"><span class="timeline-month">${monthNames[mm] || mm}</span><div class="timeline-bar"><div class="timeline-fill" style="width:${(count/maxM)*100}%;background:var(--accent)">${count > 1 ? count + '本' : ''}</div></div><span class="timeline-count">${count}</span></div>`;
        }).join('') || '<div class="muted" style="text-align:center;padding:20px">暂无录入数据</div>';
      }

      // Organize: locations
      const locationListEl = document.getElementById('locationList');
      if (locationListEl) {
        const locs = {};
        books.forEach(b => { const l = b.location || '未设置位置'; locs[l] = (locs[l] || 0) + 1; });
        const sortedLocs = Object.entries(locs).sort((a, b) => b[1] - a[1]);
        const icons = {'书房左柜':'📚','书房右柜':'📖','客厅书架':'🏠','卧室床头':'🛏️','未设置位置':'❓'};
        const bgColors = {'书房左柜':'var(--accent-light)','书房右柜':'var(--ok-light)','客厅书架':'var(--brown-light)','卧室床头':'var(--warn-light)','未设置位置':'var(--surface-2)'};
        locationListEl.innerHTML =
          `<div class="card" style="margin-bottom:14px;padding:14px 16px"><div style="font-size:13px;font-weight:600;margin-bottom:4px">📍 ${sortedLocs.length} 个存放位置</div><div class="muted" style="font-size:11px">合理规划书架位置，方便找到想读的书</div></div>` +
          sortedLocs.map(([name, count]) =>
            `<div class="loc-card"><div class="loc-icon" style="background:${bgColors[name] || 'var(--surface-2)'}">${icons[name] || '📍'}</div><div class="loc-info"><div class="loc-name">${escapeHtml(name)}</div><div class="loc-count">${count} 本书</div></div><span style="color:var(--muted);font-size:14px">›</span></div>`
          ).join('');
      }

      // Organize: todo badge
      const todoBadgeEl = document.getElementById('todoBadge');
      if (todoBadgeEl) {
        todoBadgeEl.textContent = todoCount || '';
        todoBadgeEl.style.display = todoCount ? 'block' : 'none';
      }

      // Settings — user-friendly
      const bookCount = books.length;
      const lastUpdated = loadMeta().updatedAt ? new Date(loadMeta().updatedAt).toLocaleDateString('zh-CN') : '—';

      // Auth section
      let authHtml = '';
      if (auth.isLoggedIn()) {
        const u = auth.user;
        const avatarInner = u.avatar_url
          ? `<img src="${escapeHtml(u.avatar_url)}" alt="">`
          : (u.display_name || u.email || '?').charAt(0).toUpperCase();
        const lastSync = localStorage.getItem(SYNC_LAST_KEY);
        const syncTime = lastSync ? new Date(lastSync).toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '从未';
        authHtml = `
          <div class="auth-card">
            <div class="auth-user-card">
              <div class="auth-avatar">${avatarInner}</div>
              <div class="auth-user-info">
                <div class="auth-user-name">${escapeHtml(u.display_name || '用户')}</div>
                <div class="auth-user-email">${escapeHtml(u.email || '')}</div>
              </div>
            </div>
            <div class="sync-status">
              <span class="sync-dot synced" id="syncStatusDot"></span>
              <span id="syncStatusLabel">已同步 · ${escapeHtml(syncTime)}</span>
            </div>
            <button class="auth-btn secondary" onclick="syncManager.initialSync().then(()=>render()).catch(()=>{})" style="margin-top:10px">🔄 立即同步</button>
            <button class="auth-btn secondary" onclick="if(confirm('确定退出登录？本地数据不会丢失，但需要重新登录才能继续同步。'))authLogout()" style="margin-top:6px;color:var(--danger)">退出登录</button>
          </div>`;
      } else {
        authHtml = `
          <div class="auth-card" id="authCard">
            <div class="auth-title" id="authFormTitle">登录</div>
            <div class="auth-sub">登录后可在多设备间同步藏书数据</div>
            <div class="auth-error" id="authError"></div>
            <div id="authFormFields">
              <div class="auth-field" id="authNameField" style="display:none">
                <label>昵称</label>

    function validIsbn(v) {

    // Nav tab: tap current tab → scroll to top; tap other tab → switch page
    function handleNavTap(btn, page, opts) {
      btn.addEventListener('click', () => {
        // Always stop scanner when tapping nav (regardless of page)
        try { if (scannerActive) stopScanner(); } catch (_) {}
        if (getPage() === page && !(page === 'home' && getMode() !== (opts?.mode || 'dashboard'))) {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          setPage(page, opts);
          window.scrollTo({ top: 0 });
        }
      });
    }

    document.getElementById('navFab').onclick = () => {
      entrySessionCount = 0;

      lastEntryMethod = 'scan';
      setPage('home', { mode: 'entry' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
      // Auto-start scanner after page renders
      requestAnimationFrame(() => {
        if (!scannerActive) {
          clearDraftFields({ keepIsbn: false });
          render();
          startScanner();
        }
      });
    };

    // ── Ghost Nav: scroll direction + idle fade ──
    {
      const ghostNav = document.getElementById('ghostNav');
      let lastY = 0, idleTimer = null, hasScrolledDown = false;

      function showNav() {
        ghostNav.classList.remove('hidden');
        clearTimeout(idleTimer);
        // After first scroll-down, idle = fade out after 3s
        if (hasScrolledDown && window.scrollY > 60) {
          idleTimer = setTimeout(() => ghostNav.classList.add('hidden'), 3000);
        }
      }
      function hideNav() {
        ghostNav.classList.add('hidden');
        clearTimeout(idleTimer);
      }

      window.addEventListener('scroll', () => {
        const y = window.scrollY;
        if (y <= 60) { showNav(); hasScrolledDown = false; }  // near top: always show, reset
        else if (y > lastY + 4) { hideNav(); hasScrolledDown = true; }  // scrolling down
        else if (y < lastY - 4) { showNav(); }  // scrolling up
        lastY = y;
      }, { passive: true });
    }

    function clearDraftFields(options = {}) {
      const keepIsbn = options.keepIsbn === true;
      const keepLocation = options.keepLocation === true;
      const keepCategory = options.keepCategory === true;
      const clearNotices = options.clearNotices !== false;
      if (!keepIsbn) els.isbn.value = '';
      els.title.value = '';
      els.author.value = '';
      if (!keepCategory) els.category.value = '';
      els.publishedYear.value = '';
      if (!keepLocation) els.location.value = '';
      if (els.description) els.description.value = '';
      if (els.readingStatus) els.readingStatus.value = '';
      if (els.notes) els.notes.value = '';
      delete els.manualCard.dataset.bookLang;
      delete els.manualCard.dataset.bookSources;
      delete els.manualCard.dataset.pendingCoverUrl;
      lookupCompleted = false;
      if (clearNotices) {
        els.scanNotice.innerHTML = '';
        els.manualNotice.innerHTML = '';
      }

    async function lookupCurrentIsbn() {
      const isbn = els.isbn.value.trim();
      const compact = isbn.replace(/[^0-9Xx]/g, '');
      if (!(compact.length === 10 || compact.length === 13)) {
        els.manualNotice.innerHTML = makeNotice('warn', '请先输入有效的 10 位或 13 位 ISBN。');
        return false;
      }
      clearDraftFields({ keepIsbn: true });
      const result = await fillBookMetaByIsbn(isbn, 'manual', '已搜索 ISBN');
      lookupCompleted = Boolean(result?.found || els.title.value.trim() || els.author.value.trim());
      if (lookupCompleted) {
        if (scannerActive) stopScanner();
        render();
        requestAnimationFrame(() => {
          document.getElementById('scanPreviewArea')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      } else {
        render();
      }
      return lookupCompleted;
    }

    function showDuplicateModal(existingBook) {
      return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.className = 'dup-overlay';
        overlay.innerHTML = `
          <div class="dup-modal">
            <div class="dup-icon">📚</div>
            <div class="dup-title">这本书已经在库里了</div>
            <div class="dup-book">
              <div class="dup-book-title">${escapeHtml(existingBook.title || '未命名')}</div>
              <div class="dup-book-author">${escapeHtml(existingBook.author || '未知作者')}</div>
            </div>
            <div class="dup-detail">不用重复导入哦，要继续扫下一本吗？</div>
            <div class="dup-btns">
              <button class="dup-btn-stop">到此为止</button>
              <button class="dup-btn-continue">继续扫码</button>
            </div>
          </div>`;

        const cleanup = (result) => {
          overlay.style.animation = 'fadeIn .15s ease reverse';
          setTimeout(() => { overlay.remove(); resolve(result); }, 150);
        };

        overlay.querySelector('.dup-btn-stop').onclick = () => cleanup('stop');
        overlay.querySelector('.dup-btn-continue').onclick = () => cleanup('continue');

        // Auto-dismiss after 6 seconds → continue scanning
        const timer = setTimeout(() => cleanup('continue'), 6000);
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) { clearTimeout(timer); cleanup('stop'); }
        });

        document.body.appendChild(overlay);
      });
    }

    function showSuccessModal(title, author, coverUrl, count, onContinue, onFinish) {
      const overlay = document.createElement('div');
      overlay.className = 'dup-overlay';
      const coverEl = coverUrl
        ? `<div style="width:60px;height:90px;border-radius:8px;overflow:hidden;margin:0 auto 12px;box-shadow:0 4px 12px rgba(0,0,0,.12)"><img src="${escapeHtml(coverUrl)}" style="width:100%;height:100%;object-fit:cover" /></div>`
        : '';
      const emoji = count <= 1 ? '🎉' : count <= 5 ? '🔥' : count <= 10 ? '⚡' : '🏆';
      const cheers = count <= 1 ? '第一本！' : count <= 3 ? `已录入 ${count} 本！` : count <= 10 ? `${count} 本了，继续！` : `${count} 本！停不下来！`;
      overlay.innerHTML = `
        <div class="dup-modal">
          <div class="dup-icon">${emoji}</div>
          ${coverEl}
          <div class="dup-title">${escapeHtml(title)}</div>
          <div class="dup-book-author" style="color:var(--muted);font-size:13px;margin-bottom:6px">${escapeHtml(author || '')}</div>
          <div style="font-size:20px;font-weight:800;color:var(--accent);margin-bottom:16px">${cheers}</div>
          <div class="dup-btns">
            <button class="dup-btn-stop">结束录入</button>
            <button class="dup-btn-continue">继续扫码 📷</button>
          </div>
        </div>`;

      overlay.querySelector('.dup-btn-stop').onclick = () => {
        overlay.style.animation = 'fadeIn .15s ease reverse';
        setTimeout(() => { overlay.remove(); onFinish(); }, 150);
      };
      overlay.querySelector('.dup-btn-continue').onclick = () => {
        overlay.style.animation = 'fadeIn .15s ease reverse';
        setTimeout(() => { overlay.remove(); onContinue(); }, 150);
      };
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          overlay.style.animation = 'fadeIn .15s ease reverse';
          setTimeout(() => { overlay.remove(); onFinish(); }, 150);
        }
      });

      document.body.appendChild(overlay);
    }

    async function saveCurrentBook(options = {}) {
      const isbn = els.isbn.value.trim();
      let title = els.title.value.trim();
      let author = els.author.value.trim();
      let category = els.category.value.trim();
      let readingStatus = String(els.readingStatus?.value || '').trim();
      let readingProgress = 0;
      let publishedYear = els.publishedYear.value.trim();
      let location = els.location.value.trim();
      let description = String(els.description?.value || '').trim();
      let notes = String(els.notes?.value || '').trim();
      let bookLang = String(els.manualCard.dataset.bookLang || '').trim();
      let metadataSources = String(els.manualCard.dataset.bookSources || '').trim().split(/\s*\/\s*/).filter(Boolean);
      let coverUrl = String(els.manualCard.dataset.pendingCoverUrl || '').trim();

      if (!validIsbn(isbn)) {
        els.manualNotice.innerHTML = makeNotice('err', 'ISBN 格式不合法，请输入 10 位或 13 位。');
        return false;
      }

      if (!title && (isbn.replace(/[^0-9Xx]/g, '').length === 10 || isbn.replace(/[^0-9Xx]/g, '').length === 13)) {
        await fillBookMetaByIsbn(isbn, 'manual', '已识别 ISBN');
        lookupCompleted = true;
        title = els.title.value.trim();
        author = els.author.value.trim();
        category = els.category.value.trim();
        publishedYear = els.publishedYear.value.trim();
        description = String(els.description?.value || '').trim();
      }

      if (!title || !author) {
        els.manualNotice.innerHTML = makeNotice('err', '请至少补齐书名和作者。其他缺失信息可以后续再完善。');
        return false;
      }

      // If we have ISBN but no cover, try Bookcover API
      if (!coverUrl && isbn) {
        const compact = isbn.replace(/[^0-9Xx]/g, '');
        if (compact) {
          try {
            const bcRes = await fetchWithTimeout(`https://bookcover.longitood.com/bookcover/${encodeURIComponent(compact)}`);
            if (bcRes.ok) {
              const bcData = await bcRes.json();
              if (bcData.url) coverUrl = bcData.url;
            }
          } catch (_) {}
        }
      }

      const wasEditing = Boolean(editingBookId);
      const books = loadBooks();
      const activeBooks = books.filter(b => !b._deleted);
      const duplicate = activeBooks.find(b => b.id !== editingBookId && ((isbn && b.isbn === isbn) || (b.title === title && b.author === author)));
      const isCompleteRecord = Boolean(category && publishedYear && location);
      if (duplicate) {
        const dupAction = await showDuplicateModal(duplicate);
        if (dupAction === 'stop') return false;
        if (dupAction === 'continue') {
          // User chose to continue scanning — clear fields and restart
          const shouldResumeScan = lastEntryMethod === 'scan';
          clearDraftFields({ keepIsbn: false, keepLocation: true, keepCategory: true, clearNotices: shouldResumeScan });
          lookupCompleted = false;
          if (shouldResumeScan) { scannerIntent = 'entry'; startScanner(); }
          else { els.isbn.focus(); }
          return false;
        }
      }

      rememberLocationPreset(location);

      if (editingBookId) {
        const target = books.find(b => b.id === editingBookId);
        if (!target) throw new Error('未找到要编辑的图书');
        target.isbn = isbn;
        target.title = title;
        target.author = author;
        target.category = category;
        target.readingStatus = readingStatus;
        target.readingProgress = readingProgress;
        target.publishedYear = publishedYear;
        target.location = location;
        target.description = description;
        target.notes = notes;
        target.bookLang = bookLang;
        target.metadataSources = metadataSources;
        if (coverUrl) target.coverUrl = coverUrl;
        target.status = isCompleteRecord ? 'in_library' : 'to_be_sorted';
        target.updatedAt = new Date().toISOString();
        saveBooks(books);
        hapticSaved();
        els.manualNotice.innerHTML = makeNotice('ok', `已更新：${title}${isCompleteRecord ? '（已入库）' : '（信息待补充）'}`);
        editingBookId = null;
        els.saveBtn.textContent = '导入库中';
        clearDraftFields({ keepIsbn: false, keepLocation: false, clearNotices: false });
        setPage(editReturnPage, { mode: editReturnMode });
        setTimeout(() => window.scrollTo({ top: editReturnScrollY, behavior: 'auto' }), 0);
        return true;
      } else {
        books.push({
          id: makeId(), isbn, title, author, category, readingStatus, readingProgress, publishedYear, location, description, notes, bookLang, metadataSources,
          ...(coverUrl ? { coverUrl } : {}),
          status: isCompleteRecord ? 'in_library' : 'to_be_sorted', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
        });
        saveBooks(books);
        entrySessionCount += 1;
        hapticSaved();

        // Contribute to community book cache (non-blocking)
        if (isbn && title) {
          fetchWithTimeout(`${GBOOKS_PROXY}/cache/contribute`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ isbn, title, author, category, publishedYear, bookLang, coverUrl, description, metadataSources }),
          }, 5000).catch(() => {}); // fire-and-forget
        }

        // Stop scanner during modal
        if (scannerActive) stopScanner();

        // Show success modal (dopamine!)
        return new Promise(resolve => {
          showSuccessModal(title, author, coverUrl, entrySessionCount, () => {
            // Continue scanning — keep location + category for batch entry
            clearDraftFields({ keepIsbn: false, keepLocation: true, keepCategory: true });
            lookupCompleted = false;
            lastEntryMethod = 'scan';
            scannerIntent = 'entry';
            startScanner();
            render();
            resolve(true);
          }, () => {
            // Finish entry
            entrySessionCount = 0;
            clearDraftFields({ keepIsbn: false, keepLocation: false });
            lookupCompleted = false;
            setPage('home', { mode: 'dashboard' });
            resolve(true);
          });
        });
      }
      // Edit path already returned above
      return true;
    }

    els.isbn.addEventListener('input', () => {

      if (isbnLookupTimer) clearTimeout(isbnLookupTimer);

            </div>

              <div class="detail-anim" style="margin-bottom:20px;animation-delay:.1s">
                <div style="display:flex;gap:10px;align-items:center">
                  <div style="flex:1">
                    <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px">阅读状态</div>
                    <div class="option-row">
                      <button class="option-pill reading-status-btn ${normalizeReadingStatus(book.readingStatus) === '' ? 'active' : ''}" data-id="${escapeHtml(book.id)}" data-status="">未读</button>
                      <button class="option-pill reading-status-btn ${normalizeReadingStatus(book.readingStatus) === '读过' ? 'active' : ''}" data-id="${escapeHtml(book.id)}" data-status="读过">读过</button>
                    </div>
                  </div>
                  <div>
                    <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px">收藏</div>
                    <button class="option-pill favorite-btn ${book.favorite ? 'active' : ''}" data-id="${escapeHtml(book.id)}" style="font-size:16px">${book.favorite ? '♥' : '♡'}</button>
                  </div>
                </div>
              </div>
              <div class="detail-anim" style="background:var(--card);border-radius:14px;overflow:hidden;margin-bottom:16px;animation-delay:.15s">
                ${[
                  { label: '分类', value: book.category || '未分类' },
                  { label: '存放位置', value: book.location || '未填写' },
                  { label: '来源', value: Array.isArray(book.metadataSources) ? book.metadataSources.join(' / ') : (book.metadataSources || '手动录入') },
                  { label: 'ISBN', value: book.isbn || '未填写' },
                ].map(row => `<div class="modal-meta-row"><span class="modal-meta-label">${row.label}</span><span class="modal-meta-value">${escapeHtml(row.value)}</span></div>`).join('')}
              </div>
              ${book.notes ? `<div class="detail-anim modal-note" style="animation-delay:.2s"><div class="modal-note-label">我的笔记</div><div class="modal-note-text">${escapeHtml(book.notes)}</div></div>` : ''}
              ${book.description ? `<div class="detail-anim" style="margin-bottom:16px;animation-delay:.25s"><div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px">内容简介</div><div class="muted">${escapeHtml(book.description)}</div></div>` : ''}
              <div class="detail-anim actions" style="animation-delay:.3s">
                <button class="btn secondary" data-action="edit" data-id="${escapeHtml(book.id)}" style="cursor:pointer">编辑</button>
                <button class="btn ghost" id="closeDetailBtn">关闭</button>
              </div>
              <div class="detail-anim" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line);text-align:center;animation-delay:.35s">
                <button class="btn ghost delete-book-btn" data-id="${escapeHtml(book.id)}" style="color:#d44;font-size:13px;cursor:pointer">删除此书</button>
              </div>
            </div>
          </div>
        </div>`;
    }

    document.addEventListener('click', (event) => {
      const detailBtn = event.target.closest('.book-detail-btn');
      if (detailBtn) {
        showBookDetail(detailBtn.dataset.id);
        return;
      }

      const readingStatusBtn = event.target.closest('.reading-status-btn');
      if (readingStatusBtn) {
        const id = readingStatusBtn.dataset.id;
        const newStatus = readingStatusBtn.dataset.status;
        updateBook(id, { readingStatus: newStatus || '' });
        // In-place update: toggle active pills without rebuilding modal
        const modal = readingStatusBtn.closest('.modal-sheet');
        if (modal) {
          modal.querySelectorAll('.reading-status-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.status === (newStatus || ''));
          });
          // Update status badges in header
          const book = loadActiveBooks().find(b => b.id === id);
          if (book) {
            const badgeContainer = modal.querySelector('.modal-header [style*="display:flex;gap:6px"]');
            if (badgeContainer) badgeContainer.innerHTML = statusBadgeHtml(book.readingStatus, book.favorite) + libBadgeHtml(book.status);
          }
        }
        render(); // background sync (dashboard, gallery, etc.)
        return;
      }

      const favoriteBtn = event.target.closest('.favorite-btn');
      if (favoriteBtn) {
        const id = favoriteBtn.dataset.id;
        const book = loadActiveBooks().find(b => b.id === id);
        if (book) {
          favoriteBtn.classList.remove('bounce');
          void favoriteBtn.offsetWidth;
          favoriteBtn.classList.add('bounce');
          const newFav = !book.favorite;
          updateBook(id, { favorite: newFav });
          // In-place update: toggle favorite without rebuilding modal
          favoriteBtn.classList.toggle('active', newFav);
          favoriteBtn.textContent = newFav ? '♥' : '♡';
          // Update status badges in header
          const modal = favoriteBtn.closest('.modal-sheet');
          if (modal) {
            const updatedBook = loadActiveBooks().find(b => b.id === id);
            if (updatedBook) {
              const badgeContainer = modal.querySelector('.modal-header [style*="display:flex;gap:6px"]');
              if (badgeContainer) badgeContainer.innerHTML = statusBadgeHtml(updatedBook.readingStatus, updatedBook.favorite) + libBadgeHtml(updatedBook.status);
            }
          }
          render(); // background sync
        }
        return;
      }

      if (event.target.closest('#closeDetailBtn') || (event.target.id === 'detailBackdrop')) {
        els.detailModalRoot.innerHTML = '';
        return;
      }

      // Delete book
      const deleteBtn = event.target.closest('.delete-book-btn');
      if (deleteBtn) {
        const id = deleteBtn.dataset.id;
        const book = loadBooks().find(b => b.id === id);
        if (!book) return;
        if (!confirm(`确定要删除「${book.title || '未命名图书'}」吗？`)) return;
        const books = loadBooks().map(b => b.id === id ? { ...b, _deleted: true, updatedAt: new Date().toISOString() } : b);
        saveBooks(books);
        els.detailModalRoot.innerHTML = '';
        render();
        showToast('已删除');
        return;
      }

      // ⋯ menu on book cards
      const menuBtn = event.target.closest('.menu-btn[data-menu-id]');
      if (menuBtn && !menuBtn.dataset.action) {
        const bookId = menuBtn.dataset.menuId;
        document.querySelectorAll('.menu-panel').forEach(el => el.remove());
        if (openMenuBookId === bookId) { openMenuBookId = null; return; }
        openMenuBookId = bookId;
        const panel = document.createElement('div');
        panel.className = 'menu-panel';
        panel.innerHTML = `
          <button data-action="edit" data-id="${bookId}">✏️ 编辑</button>
          <button class="delete-book-btn" data-id="${bookId}" style="color:#d44">🗑 删除</button>
        `;
        menuBtn.closest('.menu-wrap').appendChild(panel);
        return;
      }

      const categoryPresetBtn = event.target.closest('.category-preset-btn');
      if (categoryPresetBtn) {
        els.category.value = categoryPresetBtn.dataset.cat || '';
        return;
      }

      const locationPresetBtn = event.target.closest('.location-preset-btn');
      if (locationPresetBtn) {
        els.location.value = locationPresetBtn.dataset.value || '';
        return;
      }

      // Dashboard stat items → navigate to search with filter
      const statClick = event.target.closest('.stat-clickable');
      if (statClick) {
        const filter = statClick.dataset.statFilter;
        setPage('search');
        if (filter === 'all') {
          els.searchInput.value = '';
        } else if (filter === 'in_library') {
          els.searchInput.value = '已入库';
        } else if (filter === 'to_be_sorted') {
          els.searchInput.value = '待补充';
        } else if (filter === 'favorite') {
          els.searchInput.value = '收藏';
        }
        render();
        return;
      }

      const quickActionBtn = event.target.closest('.quick-action-btn');
      if (quickActionBtn) {
        const action = quickActionBtn.dataset.action;
        if (action === 'entry') { entrySessionCount = 0; setPage('home', { mode: 'entry' }); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        if (action === 'search') { setPage('search'); window.scrollTo({ top: 0 }); }
        if (action === 'organize') { setPage('organize'); window.scrollTo({ top: 0 }); }
        if (action === 'settings') { setPage('settings'); window.scrollTo({ top: 0 }); }
        return;
      }

      // Summary card interactions
      if (event.target.closest('.summary-sub')) {
        // "还有一些书可以补充信息" → go to organize todo panel
        setPage('organize');
        window.scrollTo({ top: 0 });
        // Auto-switch to todo tab
        requestAnimationFrame(() => {
          const todoTab = document.querySelector('.org-tab[data-panel="todo"]');
          if (todoTab) todoTab.click();
        });
        return;
      }
      if (event.target.closest('.summary-headline')) {
        // "书架上整理了 N 本书" → scroll down to book list on dashboard
        const header = document.getElementById('shelfHeader');
        if (header) {
          const y = header.getBoundingClientRect().top + window.scrollY - 8;
          window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
        }
        return;
      }

      const settingAction = event.target.closest('.setting-action');
      if (settingAction) {
        const action = settingAction.dataset.action;
        if (action === 'exportJson') els.exportJsonBtn_handler();
        if (action === 'exportCsv') els.exportCsvBtn_handler();
        if (action === 'exportPrintable') exportPrintableBooklist();
        if (action === 'shareBookshelf') handleShareBookshelf();
        if (action === 'feedback') handleFeedback();
        if (action === 'deleteAccount') handleDeleteAccount();
        if (action === 'toggleLang') { setLang(currentLang() === 'en' ? 'zh-CN' : 'en'); render(); }
        if (action === 'validate') els.validateBtn.click();
        if (action === 'importJson') { els.importText.focus(); }
        if (action === 'enrichBooks') runBatchEnrichment();
        return;
      }

      // Category expand/collapse
      if (event.target.closest('#toggleDetailFieldsBtn')) {
        const detailFields = document.getElementById('entryDetailFields');
        const btn = event.target.closest('#toggleDetailFieldsBtn');
        const isShown = detailFields.style.display !== 'none';
        detailFields.style.display = isShown ? 'none' : '';
        btn.textContent = isShown ? '编辑详情 ▾' : '收起详情 ▴';
        return;
      }
      if (event.target.closest('#catExpandBtn')) {
        const btn = event.target.closest('#catExpandBtn');
        const hidden = els.categoryChips.querySelectorAll('.cat-hidden');
        const isExpanded = btn.dataset.expanded === '1';
        hidden.forEach(el => el.style.display = isExpanded ? 'none' : '');
        btn.dataset.expanded = isExpanded ? '0' : '1';
        btn.textContent = isExpanded ? `展开全部 ▾` : '收起 ▴';
        return;
      }
      if (event.target.closest('#searchCatExpand')) {
        const btn = event.target.closest('#searchCatExpand');
        const hidden = els.searchCatChips.querySelectorAll('.cat-hidden');
        const isExpanded = btn.dataset.expanded === '1';
        hidden.forEach(el => el.style.display = isExpanded ? 'none' : '');
        btn.dataset.expanded = isExpanded ? '0' : '1';
        btn.textContent = isExpanded ? '收起' : `+${hidden.length}`;
        return;
      }

      const categoryFilterChip = event.target.closest('.category-filter-chip');
      if (categoryFilterChip) {
        selectedCategoryFilter = categoryFilterChip.dataset.category || '';
        setPage('search');
        render();
        return;
      }

      // Edit button (from modal or organize card)
      const editAction = event.target.closest('[data-action="edit"]');
      if (editAction && editAction.dataset.id) {
        const id = editAction.dataset.id;
        const books = loadBooks();
        const book = books.find(b => b.id === id);
        if (!book) return;
        {
          stopScanner();
          scannerIntent = 'entry';
          editReturnPage = getPage();
          editReturnMode = getMode();
          editReturnScrollY = window.scrollY || window.pageYOffset || 0;
          editingBookId = id;
          els.isbn.value = book.isbn || '';
          els.title.value = book.title || '';
          els.author.value = book.author || '';
          els.category.value = book.category || '';
          if (els.readingStatus) els.readingStatus.value = book.readingStatus || '';
          els.publishedYear.value = book.publishedYear || '';
          els.location.value = book.location || '';
          if (els.description) els.description.value = book.description || '';
          if (els.notes) els.notes.value = book.notes || '';
          els.saveBtn.textContent = '保存修改';
          lookupCompleted = true;
          setEntryMode('manual');
          setPage('home', { mode: 'entry' });
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setTimeout(() => els.title.focus(), 120);
          els.manualNotice.innerHTML = makeNotice('warn', `正在编辑《${book.title || '未命名图书'}》，修改后直接保存即可。`);
          els.detailModalRoot.innerHTML = '';
        }
        return;
      }

      const btn = event.target.closest('.organize-done-btn');
      if (btn) {
        const todoBooks = loadActiveBooks().filter(b => b.status === 'to_be_sorted');
        const picked = todoBooks[Number(btn.dataset.index)];
        if (!picked) return;
        const books = loadBooks().map(b => b.id === picked.id ? { ...b, status: 'in_library', updatedAt: new Date().toISOString() } : b);
        saveBooks(books);
        els.organizeNotice.innerHTML = makeNotice('ok', `已整理入库：${picked.title || '未命名图书'}`);
        render();
        return;
      }

      document.querySelectorAll('.menu-panel').forEach(el => el.remove());
      openMenuBookId = null;
    });

    function downloadFile(content, filename, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    els.exportJsonBtn_handler = () => {
      const payload = { books: loadActiveBooks(), meta: loadMeta() };
      const date = new Date().toISOString().slice(0, 10);
      const lastUpdated = payload.books.reduce((latest, b) => {
        const ts = String(b.updatedAt || b.createdAt || '');
        return ts > latest ? ts : latest;
      }, '');
      const summary = `本次将导出 ${payload.books.length} 本书${lastUpdated ? `，最近修改 ${new Date(lastUpdated).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })}` : ''}`;
      if (!confirm(`${summary}。确认下载备份吗？`)) {
        els.settingsNotice.innerHTML = makeNotice('warn', '已取消导出。');
        return;
      }
      downloadFile(JSON.stringify(payload, null, 2), `藏书备份_${date}.json`, 'application/json');
      recordExport(payload.books.length);
      els.settingsNotice.innerHTML = makeNotice('ok', `已下载备份文件 📥 ${summary}`);
    };

    els.exportCsvBtn_handler = () => {
      const books = loadActiveBooks();
      const rows = ['书名,作者,分类,ISBN,阅读状态,收藏,存放位置,入库状态,添加日期'];
      for (const b of books) {
        rows.push([
          b.title || '',
          b.author || '',
          b.category || '',
          b.isbn || '',
          normalizeReadingStatus(b.readingStatus) || '未读',
          b.favorite ? '是' : '否',
          b.location || '',
          b.status === 'in_library' ? '已入库' : '待补充',
          b.createdAt ? new Date(b.createdAt).toLocaleDateString('zh-CN') : ''
        ].map(v => `"${String(v||'').replaceAll('"','""')}"`).join(','));
      }
      const date = new Date().toISOString().slice(0, 10);
      downloadFile('\uFEFF' + rows.join('\n'), `藏书表格_${date}.csv`, 'text/csv;charset=utf-8');
      els.settingsNotice.innerHTML = makeNotice('ok', `已下载表格 📊 共 ${books.length} 本书`);
    };

    // ── Share bookshelf ──
    // ── Batch Enrichment ───────────────────────────────────────────────────
    // Score an existing book's cover by how trustworthy the source is.
    // Higher = more confident it's actually the right cover.
    function coverScore(book) {
      if (!book.coverUrl) return 0;
      const src = Array.isArray(book.metadataSources) ? book.metadataSources : [];
      if (src.includes('豆瓣读书')) return 95;
      if (src.includes('Google Books')) return 80;
      if (src.includes('community-cache')) return 70;
      if (src.includes('Open Library')) return 60;
      // Cover URL exists but source is unknown (manual entry or early version)
      return 35;
    }
    // Score a candidate cover URL by its source name
    function candidateCoverScore(sourceName) {
      if (sourceName === '豆瓣读书') return 95;
      if (sourceName === 'Google Books') return 80;
      if (sourceName === 'Open Library') return 60;
      return 50;
    }
    const COVER_REPLACE_THRESHOLD = 75; // replace covers scoring below this (catches OL=60, unknown=35)

    async function runBatchEnrichment() {
      const books = loadActiveBooks();
      const needsEnrich = books.filter(b => {
        if (!b.isbn) return false;
        const c = b.isbn.replace(/[^0-9Xx]/g, '');
        if (c.length !== 10 && c.length !== 13) return false;
        // Include: any missing text field, OR cover with low-confidence source
        return !b.description || !b.author || !b.category || !b.publishedYear ||
               coverScore(b) < COVER_REPLACE_THRESHOLD;
      });

      if (!needsEnrich.length) {
        const toast = document.createElement('div');
        toast.className = 'scan-toast';
        toast.textContent = '✓ 所有书的信息都已完整，无需补全';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
        return;
      }

      // Build modal
      const overlay = document.createElement('div');
      overlay.className = 'enrich-overlay';
      overlay.innerHTML = `
        <div class="enrich-modal">
          <div class="enrich-title">🔍 自动补全书目信息</div>
          <div class="enrich-sub">将为以下 ${needsEnrich.length} 本书自动补全或改进：<br>简介 / 作者 / 分类 / 出版年份 / 封面图</div>
          <div class="enrich-info" style="font-size:11px;color:var(--muted);margin-top:4px">
            查询顺序：豆瓣读书 → Google Books → Open Library<br>
            缺失字段 → 直接补上；封面 → 按来源可信度打分，更可靠的才会替换<br>
            <b>封面替换条件：现有来源分 &lt; 75（Open Library=60 / 来源不明=35 会被替换，Google Books=80 / 豆瓣=95 不会）</b>
          </div>
          <div id="enrichProgress" style="margin-top:14px;display:none">
            <div class="enrich-bar-bg"><div id="enrichBar" class="enrich-bar" style="width:0%"></div></div>
            <div id="enrichStatus" style="font-size:12px;color:var(--muted);margin-top:6px;text-align:center">准备中…</div>
            <div id="enrichLog" style="font-size:11px;color:var(--muted);margin-top:8px;max-height:120px;overflow:auto;line-height:1.7"></div>
          </div>
          <div id="enrichResult" style="margin-top:10px;display:none;font-size:13px;color:var(--ok);font-weight:600;text-align:center"></div>
          <div class="enrich-actions" id="enrichActions">
            <button class="btn ghost" id="enrichCancelBtn">取消</button>
            <button class="btn primary" id="enrichStartBtn">开始补全 (${needsEnrich.length} 本)</button>
          </div>
          <button class="btn ghost" id="enrichCloseBtn" style="display:none;margin-top:8px;width:100%">关闭</button>
        </div>`;
      document.body.appendChild(overlay);
      overlay.querySelector('#enrichCancelBtn').onclick = () => overlay.remove();
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

      const startBtn = overlay.querySelector('#enrichStartBtn');
      const progress = overlay.querySelector('#enrichProgress');
      const bar = overlay.querySelector('#enrichBar');
      const statusEl = overlay.querySelector('#enrichStatus');
      const logEl = overlay.querySelector('#enrichLog');
      const resultEl = overlay.querySelector('#enrichResult');
      const actionsEl = overlay.querySelector('#enrichActions');
      const closeBtn = overlay.querySelector('#enrichCloseBtn');

      let cancelled = false;
      overlay.querySelector('#enrichCancelBtn').onclick = () => { cancelled = true; overlay.remove(); };

      startBtn.onclick = async () => {
        actionsEl.style.display = 'none';
        progress.style.display = '';
        let enriched = 0, skipped = 0, failed = 0;

        const addLog = (msg) => {
          const line = document.createElement('div');
          line.textContent = msg;
          logEl.appendChild(line);
          logEl.scrollTop = logEl.scrollHeight;
        };

        // Quality check: is new value actually useful?
        function qualityOk(val) {
          if (!val) return false;
          const s = String(val).trim();
          if (s.length < 2) return false;
          if (/^https?:\/\//.test(s) && s.length < 15) return false; // too-short URL
          return true;
        }

        for (let i = 0; i < needsEnrich.length; i++) {
          if (cancelled) break;
          const book = needsEnrich[i];
          const compact = book.isbn.replace(/[^0-9Xx]/g, '');
          const isZh = /^9787|^97895[67]/.test(compact);

          bar.style.width = `${Math.round(((i + 1) / needsEnrich.length) * 100)}%`;
          statusEl.textContent = `(${i + 1}/${needsEnrich.length}) 正在查：${book.title || book.isbn}`;

          try {
            // Gather results from all sources; rate-limit 1.5s between books
            const urls = [
              isZh ? `${GBOOKS_PROXY}/douban/${encodeURIComponent(compact)}` : null,
              `${GBOOKS_PROXY}/?q=isbn:${encodeURIComponent(compact)}&maxResults=3`,
              `https://openlibrary.org/search.json?isbn=${encodeURIComponent(compact)}&fields=title,author_name,subject,first_publish_year,cover_i,language&limit=2`,
            ].filter(Boolean);

            const results = await Promise.allSettled(
              urls.map(u => fetch(u, { signal: AbortSignal.timeout(8000) }).then(r => r.ok ? r.json() : null).catch(() => null))
            );

            let si = 0;
            const doubanRaw = isZh ? (results[si++]?.value) : null;
            const gbRaw = results[si++]?.value;
            const olRaw = results[si++]?.value;

            // Parse candidates — cover uses scoring; other fields only fill gaps
            const candidates = {};
            let bestCoverScore = coverScore(book); // current cover's score
            let bestCoverSrc = '';

            function trySetCover(url, srcName) {
              if (!qualityOk(url)) return;
              const score = candidateCoverScore(srcName);
              if (score > bestCoverScore) {
                bestCoverScore = score;
                bestCoverSrc = srcName;
                candidates.coverUrl = url;
                candidates._coverReplaced = Boolean(book.coverUrl);
              }
            }

            if (doubanRaw?.title) {
              trySetCover(doubanRaw.coverUrl, '豆瓣读书');
              if (!book.description && qualityOk(doubanRaw.description)) candidates.description = doubanRaw.description;
              if (!book.author && qualityOk(doubanRaw.author)) candidates.author = doubanRaw.author;
              if (!book.publishedYear && qualityOk(doubanRaw.publishedYear)) candidates.publishedYear = doubanRaw.publishedYear;
            }
            if (gbRaw?.items?.[0]) {
              const vi = gbRaw.items[0].volumeInfo || {};
              trySetCover((vi.imageLinks?.thumbnail || '').replace(/^http:/, 'https:'), 'Google Books');
              if (!candidates.description && !book.description && qualityOk(vi.description)) {
                candidates.description = vi.description.slice(0, 600);
              }
              if (!candidates.author && !book.author && vi.authors?.length) {
                candidates.author = vi.authors.join(', ');
              }
              if (!candidates.publishedYear && !book.publishedYear && vi.publishedDate) {
                const y = String(vi.publishedDate).slice(0, 4);
                if (/^\d{4}$/.test(y)) candidates.publishedYear = y;
              }
              if (!candidates.category && !book.category && vi.categories?.length) {
                const cat = translateCategory(vi.categories[0]);
                if (cat) candidates.category = cat;
              }
            }
            if (olRaw?.docs?.[0]) {
              const d = olRaw.docs[0];
              if (!candidates.author && !book.author && d.author_name?.length) {
                candidates.author = d.author_name.slice(0, 3).join(', ');
              }
              if (!candidates.publishedYear && !book.publishedYear && d.first_publish_year) {
                candidates.publishedYear = String(d.first_publish_year);
              }
              if (d.cover_i) {
                trySetCover(`https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg`, 'Open Library');
              }
              if (!candidates.category && !book.category && d.subject?.length) {
                const cat = translateCategory(d.subject[0]);
                if (cat) candidates.category = cat;
              }
            }

            // Strip internal flags before saving
            const coverReplaced = candidates._coverReplaced;
            delete candidates._coverReplaced;

            if (Object.keys(candidates).length === 0) {
              skipped++;
              addLog(`— ${book.title || book.isbn}：已是最优，跳过`);
            } else {
              // Merge into book
              const allBooks = loadActiveBooks();
              const idx = allBooks.findIndex(ab => ab.id === book.id);
              if (idx >= 0) {
                const updated = { ...allBooks[idx], ...candidates, updatedAt: new Date().toISOString() };
                if (!updated.metadataSources) updated.metadataSources = [];
                if (isZh && doubanRaw?.title) {
                  if (!updated.metadataSources.includes('豆瓣读书')) updated.metadataSources.push('豆瓣读书');
                }
                if (candidates.coverUrl && bestCoverSrc && !updated.metadataSources.includes(bestCoverSrc)) {
                  updated.metadataSources.push(bestCoverSrc);
                }
                allBooks[idx] = updated;
                saveBooks(allBooks);

                // Build a human-readable log
                const fieldLabels = [];
                if (candidates.coverUrl) fieldLabels.push(coverReplaced ? `封面(替换→${bestCoverSrc})` : `封面(+${bestCoverSrc})`);
                if (candidates.description) fieldLabels.push('简介');
                if (candidates.author) fieldLabels.push('作者');
                if (candidates.publishedYear) fieldLabels.push('年份');
                if (candidates.category) fieldLabels.push('分类');
                addLog(`✓ ${book.title || book.isbn}：${fieldLabels.join(' · ')}`);
                enriched++;

                try {
                  await fetch(`${GBOOKS_PROXY}/cache/contribute`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      isbn: compact,
                      title: updated.title,
                      author: updated.author || '',
                      category: updated.category || '',
                      publishedYear: updated.publishedYear || '',
                      bookLang: updated.bookLang || (isZh ? 'zh-CN' : ''),
                      coverUrl: updated.coverUrl || '',
                      description: (updated.description || '').slice(0, 1200),
                      metadataSources: updated.metadataSources,
                      sourcePriority: isZh ? 110 : 80,
                    }),
                  });
                } catch { /* contribute is best-effort */ }
              }
            }
          } catch (err) {
            failed++;
            addLog(`✗ ${book.title || book.isbn}：查询失败`);
          }

          // Polite rate limit: wait 1.5s between books
          if (i < needsEnrich.length - 1 && !cancelled) {
            await new Promise(r => setTimeout(r, 1500));
          }
        }

        statusEl.textContent = '完成！';
        bar.style.width = '100%';
        resultEl.textContent = `完成 ${enriched} 本，跳过 ${skipped} 本，失败 ${failed} 本`;
        resultEl.style.display = '';
        closeBtn.style.display = '';
        closeBtn.onclick = () => { overlay.remove(); render(); };
        // Refresh render to show updated covers etc.
        render();
      };
    }

    // ── Import validation ──
    const BOOK_FIELD_WHITELIST = new Set([
      'id', 'isbn', 'title', 'author', 'category', 'readingStatus', 'readingProgress',
      'publishedYear', 'location', 'description', 'notes', 'bookLang', 'coverUrl',
      'metadataSources', 'status', 'createdAt', 'updatedAt', '_deleted', 'favorite',
    ]);
    const SAFE_URL_PROTOCOLS = new Set(['http:', 'https:', 'data:']);
    const MAX_IMPORT_BOOKS = 5000;
    const MAX_FIELD_LENGTH = 2000;

    function isSafeUrl(str) {
      if (!str) return true;
      try { return SAFE_URL_PROTOCOLS.has(new URL(str).protocol); }
      catch { return false; }
    }

    function validateAndSanitizeImport(raw) {
      if (typeof raw !== 'object' || raw === null) throw new Error('无效的 JSON 对象');
      if (!Array.isArray(raw.books)) throw new Error('缺少 books 数组');
      if (!raw.meta || typeof raw.meta !== 'object') throw new Error('缺少 meta 字段');
      if (raw.books.length > MAX_IMPORT_BOOKS) throw new Error(`书籍数量超限（最多 ${MAX_IMPORT_BOOKS} 本）`);

      const sanitized = [];
      let warnings = 0;
      for (let i = 0; i < raw.books.length; i++) {
        const book = raw.books[i];
        if (typeof book !== 'object' || book === null) { warnings++; continue; }
        if (!book.id || typeof book.id !== 'string') { warnings++; continue; }

        // Whitelist fields only
        const clean = {};
        for (const key of BOOK_FIELD_WHITELIST) {
          if (key in book) {
            let val = book[key];
            // Type/length checks for strings
            if (typeof val === 'string' && val.length > MAX_FIELD_LENGTH) val = val.slice(0, MAX_FIELD_LENGTH);
            // URL safety check
            if (key === 'coverUrl' && !isSafeUrl(val)) val = '';
            clean[key] = val;
          }
        }
        // Ensure required fields
        if (!clean.id) { warnings++; continue; }
        clean.title = clean.title || '';
        clean.author = clean.author || '';
        clean.createdAt = clean.createdAt || new Date().toISOString();
        clean.updatedAt = clean.updatedAt || new Date().toISOString();
        // Sanitize metadataSources
        if (clean.metadataSources && !Array.isArray(clean.metadataSources)) clean.metadataSources = [];
        sanitized.push(clean);
      }
      return { books: sanitized, meta: { schemaVersion: raw.meta.schemaVersion || 1, updatedAt: new Date().toISOString() }, warnings };
    }

    function normalizedIsbnKey(book) {
      const isbn = String(book?.isbn || '').replace(/[^0-9Xx]/g, '').toUpperCase();
      return isbn || null;
    }

    function newerBook(a, b) {
      return String(a?.updatedAt || a?.createdAt || '') >= String(b?.updatedAt || b?.createdAt || '') ? a : b;
    }

    function titleAuthorKey(book) {
      const t = String(book?.title || '').trim().toLowerCase();
      const a = String(book?.author || '').trim().toLowerCase();
      return (t && a) ? `${t}|||${a}` : null;
    }

    function mergeImportedBooks(localBooks, importedBooks) {
      const byKey = new Map();
      const byTitleAuthor = new Map();
      let added = 0, updated = 0, skipped = 0;

      for (const book of localBooks) {
        const key = normalizedIsbnKey(book);
        if (key) { byKey.set(key, book); }
        else {
          const taKey = titleAuthorKey(book);
          if (taKey) byTitleAuthor.set(taKey, book);
          else byKey.set(`_noid_${book.id || Math.random()}`, book);
        }
      }

      for (const incoming of importedBooks) {
        const key = normalizedIsbnKey(incoming);
        if (!key) {
          // Fallback: dedupe by title+author
          const taKey = titleAuthorKey(incoming);
          if (taKey) {
            const existing = byTitleAuthor.get(taKey);
            if (!existing) {
              byTitleAuthor.set(taKey, incoming);
              added += 1;
            } else {
              const winner = newerBook(existing, incoming);
              if (winner === incoming) { byTitleAuthor.set(taKey, incoming); updated += 1; }
              else skipped += 1;
            }
          } else {
            byKey.set(`_noid_${incoming.id || Math.random()}`, incoming);
            added += 1;
          }
          continue;
        }
        const existing = byKey.get(key);
        if (!existing) {
          byKey.set(key, incoming);
          added += 1;
          continue;
        }
        const winner = newerBook(existing, incoming);
        if (winner === incoming) {
          byKey.set(key, incoming);
          updated += 1;
        } else {
          skipped += 1;
        }
      }

      return {
        books: [...byKey.values(), ...byTitleAuthor.values()],
        diff: { added, updated, skipped }
      };
    }

    function summarizeImportResult(result, mode) {
      const bits = [`共 ${result.books.length} 本图书`];
      if (result.warnings > 0) bits.push(`${result.warnings} 条记录被跳过`);
      if (mode === 'merge' && result.diff) {
        bits.push(`新增 ${result.diff.added} 本`);
        bits.push(`更新 ${result.diff.updated} 本`);
        bits.push(`跳过 ${result.diff.skipped} 本`);
      }
      return bits.join(' · ');
    }

    function translateCategory(cat, _lang) {
      if (!cat) return '';
      // Already Chinese — keep as-is
      if (/[\u4e00-\u9fff]/.test(cat)) return cat;
      const trimmed = cat.trim();
      // 1. Exact match first (handles "Chinese fiction" → "中国小说" etc.)
      const key = trimmed.toLowerCase();
      if (EN_ZH_CATEGORY[key]) return EN_ZH_CATEGORY[key];
      // 2. Pattern match (handles "Biography & Autobiography" → "传记" etc.)
      for (const [re, zh] of CATEGORY_PATTERNS) {
        if (re.test(trimmed)) return zh;
      }
      // 3. Junk filter (only after translation attempts fail)
      if (JUNK_CAT_RE.test(trimmed) || JUNK_CAT_RE2.test(trimmed)) return '';
      // 4. Library classification codes (call numbers, Dewey, LOC, etc.)
      if (/^[A-Z]{0,2}\d/.test(trimmed)) return ''; // starts with optional letters then digit: "853", "Pq4817..."
      if (/^\d{1,3}$/.test(trimmed)) return ''; // pure short numbers
      // 5. If still English and no match, return empty (will show as 未分类)
      if (/^[a-zA-Z\s&,.()\-\/]+$/.test(trimmed)) return '';
      return trimmed;
    }

      if (!s) return false;

      if (/,\s*$/.test(s)) return false;
      if (/^\d{4}\s*[-–]\s*\d{4}$/.test(s)) return false;
      if (/^[A-Z]{1,3}$/.test(s)) return false;
      if (/^[A-Z]{0,2}\d/.test(s)) return false; // classification codes like "853", "Pq4817.i5"
      if (/^\d{1,3}$/.test(s)) return false;
      // Use translateCategory as the authority — if it returns non-empty, it's good
      const translated = translateCategory(s);
      return Boolean(translated);
    }
    function pickBestCategory(items) {
      for (const raw of items) {
        const s = String(raw?.name || raw || '').split(' / ')[0].trim().slice(0, 32);

      return '';
