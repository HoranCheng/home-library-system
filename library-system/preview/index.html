<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>毛毛图书管理系统</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://maomao-books-proxy.henrycdev26.workers.dev https://www.googleapis.com https://bookcover.longitood.com https://openlibrary.org https://api.crossref.org;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#F6F3ED; --bg2:#EDE8E0; --card:#FFFDF8; --line:rgba(44,38,31,.07);
      --text:#2C261F; --muted:#7A6F62; --accent:#3D5E4C; --accent-light:#E8EFE9;
      --accent2:#8B6F4E; --brown-light:#F5EDE2;
      --ok:#4A7C59; --ok-light:#EAF3EC; --warn:#B8863A; --warn-light:#FFF7E6; --danger:#A84E4E;
      --surface:#F3EFE8; --surface-2:#EBE6DC;
      --shadow:0 2px 12px rgba(44,38,31,.06);
      --shadow-md:0 4px 20px rgba(44,38,31,.10);
      --safe-bottom: env(safe-area-inset-bottom, 12px);
      --serif:"Noto Serif SC","Songti SC","STSong","Georgia",serif;
    }
    * { box-sizing:border-box; margin:0; }
    html { touch-action:pan-x pan-y; -ms-touch-action:pan-x pan-y; -webkit-text-size-adjust:100%; }
    body {
      margin:0; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Noto Sans SC",sans-serif;
      background:var(--bg);
    }
    .app { max-width:480px; margin:0 auto; min-height:100vh; position:relative; }
    @media (min-width:768px) { .app { max-width:600px; } }

    /* ── Top bar ── */
    .topbar {
      position:sticky; top:0; z-index:20; padding:50px 20px 14px;
      background:rgba(246,243,237,.92); backdrop-filter:blur(12px);
      display:flex; align-items:flex-end; justify-content:space-between;
    }
    .topbar-title { font-size:22px; font-family:var(--serif); font-weight:700; color:var(--text); line-height:1.2; }
    .mode-toggle {
      display:flex; background:var(--surface-2); border-radius:10px; padding:3px; gap:3px;
    }
    .mode-toggle button {
      padding:10px 20px; border:none; border-radius:10px; cursor:pointer; font-size:14px; font-weight:700;
      background:transparent; color:var(--muted); transition:all .2s;
    }
    .mode-toggle button.active { background:var(--card); color:var(--text); box-shadow:var(--shadow); }
    .mode-toggle button.accent-active { background:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(61,94,76,.25); }

    /* ── Content area ── */
    .content { padding:0 20px calc(var(--safe-bottom) + 72px); }
    .hidden { display:none !important; }

    /* ── Section title ── */
    .section-title { font-size:18px; font-family:var(--serif); font-weight:700; margin:0 0 14px; }
    .subsection-title { margin:20px 0 10px; font-size:12px; color:var(--muted); font-weight:600; letter-spacing:.04em; }

    /* ── Cards ── */
    .card { background:var(--card); border-radius:16px; padding:16px; box-shadow:var(--shadow); border:1px solid rgba(255,255,255,.6); }
    .card + .card { margin-top:12px; }

    /* ── Stats grid ── */
    .stat-grid { display:flex; justify-content:space-around; padding:16px 0; }
    .stat-item { text-align:center; }
    .stat-clickable { border-radius:12px; padding:8px 4px; transition:background .15s; }
    .stat-clickable:active { background:var(--accent-light); }
    .stat-num { font-size:26px; font-weight:800; line-height:1.1; color:var(--text); }
    .stat-num.green { color:var(--accent); }
    .stat-num.brown { color:var(--accent2); }
    .stat-num.warn { color:var(--warn); }
    .stat-label { font-size:11px; color:var(--muted); margin-top:3px; }

    /* ── Alert banner ── */
    .alert-banner {
      margin-top:12px; padding:10px 14px; border-radius:10px; display:flex; align-items:center; justify-content:space-between;
      font-size:12px;
    }
    .alert-banner.warn { background:var(--warn-light); color:#8B6A20; }
    .alert-banner .alert-action { font-weight:600; color:var(--warn); cursor:pointer; }

    /* ── (reading-hero removed — simplified to read/unread model) ── */

    /* ── Category bar chart ── */
    .cat-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .cat-bar-row:last-child { margin-bottom:0; }
    .cat-bar-label { font-size:12px; color:var(--text); width:48px; flex-shrink:0; text-align:right; }
    .cat-bar-track { flex:1; height:8px; background:var(--surface-2); border-radius:4px; overflow:hidden; }
    .cat-bar-fill { height:100%; border-radius:4px; }
    .cat-bar-count { font-size:12px; color:var(--muted); width:24px; text-align:right; }

    /* ── Recent items ── */
    .recent-item {
      display:flex; align-items:center; gap:12px; padding:12px 14px; cursor:pointer;
      background:var(--card); border-radius:14px; box-shadow:var(--shadow); margin-bottom:8px;
    }
    .recent-item:last-child { margin-bottom:0; }
    .recent-color { width:6px; height:44px; border-radius:3px; flex-shrink:0; }
    .recent-info { flex:1; min-width:0; }
    .recent-title { font-size:14px; font-weight:600; font-family:var(--serif); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .recent-author { font-size:12px; color:var(--muted); margin-top:2px; }

    /* ── Status badges ── */
    .status-badge {
      display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600;
    }
    .status-badge .dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
    .status-badge.done { background:var(--ok-light); color:#2D6A3A; }
    .status-badge.done .dot { background:var(--ok); }
    .status-badge.fav { background:#FFF0EB; color:#C2785C; }
    .status-badge.fav .dot { background:#C2785C; }
    .lib-badge {
      font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px;
    }
    .lib-badge.in { background:var(--accent-light); color:var(--accent); border:1px solid #C2D5C6; }
    .lib-badge.sort { background:#FFF3E0; color:#E65100; border:1px solid #FFCC80; }

    /* ── Actions row ── */
    .actions { display:flex; gap:10px; margin-top:14px; }
    button.btn {
      flex:1; border:0; border-radius:14px; padding:13px 16px; font-size:15px; font-weight:600; cursor:pointer;
    }
    .primary { background:var(--accent); color:#fff; }
    .secondary { background:var(--accent-light); color:var(--accent); }
    .ghost { background:transparent; color:var(--muted); border:1.5px solid var(--line); }

    /* ── Entry form ── */
    #saveBtn, #finishEntryBtn { appearance:none; -webkit-appearance:none; }
    #saveBtn { background:var(--accent) !important; color:#fff !important; }
    #finishEntryBtn { background:var(--accent-light) !important; color:var(--accent) !important; border:1px solid rgba(61,94,76,.15) !important; }
    .field { margin-top:14px; }
    .field label { display:block; margin-bottom:6px; font-size:12px; color:var(--muted); font-weight:600; }
    .field input, .field textarea {
      width:100%; border-radius:12px; border:1.5px solid var(--surface-2); background:var(--card); color:var(--text);
      padding:12px 14px; font-size:15px; outline:none; transition:border-color .2s;
    }
    .field input:focus, .field textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(61,94,76,.1); }
    .input-with-action { position:relative; }
    .input-with-action input { padding-right:54px; }
    .input-action-btn {
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      width:36px; height:36px; border-radius:10px; border:1px solid rgba(139,111,78,.2); background:var(--brown-light); color:var(--accent2); font-size:17px; cursor:pointer;
    }
    .field textarea { min-height:120px; resize:vertical; }
    .hint { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5; }
    .compact-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .compact-grid > * { min-width:0; }
    .sticky-actions { position:sticky; bottom:0; background:rgba(246,243,237,.96); padding-top:12px; margin-top:14px; border-top:1px solid var(--line); }
    .review-card { margin-top:12px; padding:14px 16px; border-radius:14px; background:var(--brown-light); border:1px solid rgba(139,111,78,.1); }
    .review-card .muted { color:var(--accent2); }

    /* ── Notice ── */
    .notice { margin-top:12px; padding:12px 14px; border-radius:12px; font-size:13px; line-height:1.5; }
    .notice.ok { background:var(--ok-light); color:var(--ok); }
    .notice.warn { background:var(--warn-light); color:#8B6A20; }
    .notice.err { background:#FDECEC; color:var(--danger); }

    /* ── Chips ── */
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .chip {
      display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:20px;
      background:var(--surface); border:1px solid var(--line); color:var(--muted); font-size:12px; font-weight:600;
    }
    button.chip { cursor:pointer; }
    .chip.active { background:var(--accent); color:#fff; border-color:transparent; }

    /* ── Search bar ── */
    .search-bar {
      display:flex; align-items:center; gap:10px; background:var(--card); border-radius:14px;
      padding:12px 16px; border:1.5px solid var(--surface-2); box-shadow:var(--shadow);
    }
    .search-bar input { border:none; background:transparent; font-size:14px; color:var(--text); outline:none; flex:1; }
    .search-bar .clear-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; line-height:1; padding:0; }

    /* ── Scanner ── */
    .scanner-box { display:none; margin-top:10px; border-radius:14px; overflow:hidden; position:relative; background:#000; }
    .scanner-video { width:100%; display:block; max-height:200px; object-fit:cover; transition:filter .15s ease; }
    .scanner-video.freeze { filter:brightness(1.15) contrast(1.05); }
    .scanner-freeze-flash { position:absolute; inset:0; background:rgba(255,255,255,.25); pointer-events:none; opacity:0; z-index:4; transition:opacity .12s ease; }
    .scanner-freeze-flash.active { opacity:1; }
    .scanner-aim { position:absolute; inset:0; pointer-events:none; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:4px; }
    .scanner-aim-inner { width:240px; height:48px; border:2px solid var(--accent); border-radius:6px; box-shadow:0 0 0 9999px rgba(0,0,0,.55); position:relative; overflow:hidden; }
    .scanner-aim-inner::after { content:''; position:absolute; left:8px; right:8px; height:2px; background:linear-gradient(90deg, transparent, var(--accent), transparent); animation:scanLine 1.8s ease-in-out infinite; }
    @keyframes scanLine { 0% { top:15%; opacity:.3; } 50% { top:85%; opacity:1; } 100% { top:15%; opacity:.3; } }
    .scanner-hint { color:rgba(255,255,255,.75); font-size:11px; font-weight:500; text-shadow:0 1px 3px rgba(0,0,0,.6); margin-top:2px; }
    .scanner-pro-backdrop { position:absolute; inset:0; background:rgba(0,0,0,.25); z-index:9; }
    .scanner-controls { position:absolute; top:10px; right:10px; display:flex; gap:8px; z-index:5; }
    .scanner-cancel { background:rgba(0,0,0,.65); color:#fff; border:0; border-radius:10px; padding:7px 14px; font-size:14px; cursor:pointer; font-weight:600; }
    .scanner-ctrl-btn { background:rgba(0,0,0,.65); color:#fff; border:0; border-radius:10px; padding:7px 14px; font-size:14px; cursor:pointer; font-weight:600; }
    .scanner-ctrl-btn.active { background:rgba(255,200,0,.85); color:#000; }
    @keyframes camBounce { 0%,100% { transform:translateY(0) scale(1); } 50% { transform:translateY(-10px) scale(1.1); } }
    .scanner-pro-panel { position:absolute; bottom:6px; left:6px; right:6px; background:rgba(0,0,0,.8); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); color:#fff; padding:10px 12px; border-radius:10px; animation:slideUp .2s ease; z-index:10; }
    .pro-panel-title { display:none; }
    .pro-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .pro-row:last-child { margin-bottom:0; }
    .pro-row label { font-size:11px; color:rgba(255,255,255,.6); min-width:36px; flex-shrink:0; }
    .pro-row select { flex:1; background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.2); border-radius:6px; padding:6px 8px; font-size:12px; -webkit-appearance:none; appearance:none; }
    .pro-row input[type=range] { flex:1; accent-color:var(--accent); }
    .pro-cam-chips { display:flex; gap:6px; flex-wrap:wrap; }
    .pro-cam-chip { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.2); border-radius:6px; padding:5px 10px; font-size:11px; cursor:pointer; transition:all .15s; }
    .pro-cam-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* Duplicate book modal */
    .dup-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:2000; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .2s ease; }
    .dup-modal { background:var(--card); border-radius:20px; padding:28px 24px; max-width:320px; width:100%; text-align:center; box-shadow:0 16px 40px rgba(0,0,0,.15); animation:slideUp .3s ease; }
    .dup-modal .dup-icon { font-size:40px; margin-bottom:12px; }
    .dup-modal .dup-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:8px; }
    .dup-modal .dup-detail { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:20px; }
    .dup-modal .dup-book { background:var(--surface); border-radius:12px; padding:10px 14px; margin-bottom:16px; text-align:left; }
    .dup-modal .dup-book-title { font-size:14px; font-weight:600; color:var(--text); }
    .dup-modal .dup-book-author { font-size:12px; color:var(--muted); margin-top:2px; }
    .dup-modal .dup-btns { display:flex; gap:10px; }
    .dup-modal .dup-btns button { flex:1; border:none; border-radius:12px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; }
    .dup-modal .dup-btn-stop { background:var(--surface-2); color:var(--text); }
    .dup-modal .dup-btn-stop:active { background:var(--line); }
    .dup-modal .dup-btn-continue { background:var(--accent); color:#fff; }
    .dup-modal .dup-btn-continue:active { background:#2e4a3a; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    /* Auto-filled field highlight */
    input.auto-filled {
      background:var(--accent-light) !important; border-color:var(--accent) !important;
      box-shadow:inset 0 0 0 1px rgba(61,94,76,.15);
    }
    .auto-fill-hint { font-size:10px; color:var(--accent); margin-top:2px; font-weight:600; }
    /* Scan success toast */
    .scan-toast {
      position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:999;
      background:var(--ok); color:#fff; padding:12px 24px; border-radius:14px;
      font-size:15px; font-weight:700; box-shadow:0 6px 20px rgba(74,124,89,.4);
      animation: toastIn .3s ease, toastOut .3s ease 1.5s forwards;
      pointer-events:none;
    }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; } }

    /* ── Book grid ── */
    .book-list { margin-top:12px; }
    .book-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(90px, 1fr)); gap:12px; margin-top:12px; }
    .book-grid-item { text-align:center; cursor:pointer; max-width:140px; }
    .book-grid-item .cover-wrap { position:relative; width:100%; padding-top:150%; border-radius:10px; overflow:hidden; background:var(--surface-2); border:1px solid var(--line); }
    .book-grid-item .cover-wrap img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; display:block; }
    .book-grid-item .cover-wrap .cover-placeholder { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--muted); }
    .book-grid-item .book-grid-title { font-size:12px; margin-top:6px; line-height:1.3; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .book-grid-item .book-grid-author { font-size:11px; color:var(--muted); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .shelf-letter-head { display:block; font-size:13px; font-weight:700; color:var(--accent); letter-spacing:.08em; padding:10px 2px 4px; margin-top:8px; border-bottom:1px solid var(--line); }
    .book-list > .book-grid { margin-top:0; }

    /* ── Book item row ── */
    .book-item { padding:12px 0; border-top:1px solid var(--line); position:relative; }
    .book-item:first-child { border-top:0; padding-top:0; }
    .book-item h3 { margin:0 0 4px; font-size:15px; }
    .book-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .link-btn { background:none; border:0; color:var(--accent); padding:0; font:inherit; cursor:pointer; font-weight:600; }

    /* ── Organize card ── */
    .organize-card {
      background:var(--card); border-radius:16px; padding:16px; box-shadow:var(--shadow);
      border-left:4px solid var(--warn); margin-bottom:10px; cursor:pointer;
    }
    .organize-card-head { display:flex; gap:12px; align-items:flex-start; }
    .organize-card-cover { width:38px; height:52px; border-radius:4px; flex-shrink:0; }
    .organize-card-info { flex:1; }
    .organize-card-title { font-size:15px; font-weight:600; font-family:var(--serif); }
    .organize-card-author { font-size:12px; color:var(--muted); margin-top:3px; }
    .missing-tag { font-size:10px; padding:2px 8px; border-radius:20px; background:#FFF3E0; color:#E65100; font-weight:600; display:inline-block; margin-right:4px; margin-top:6px; }
    .organize-actions { display:flex; gap:8px; margin-top:12px; }
    .organize-actions button {
      flex:1; padding:9px 0; border-radius:10px; font-size:12px; font-weight:600; cursor:pointer; border:none;
    }

    /* ── Settings ── */
    .setting-row {
      display:flex; align-items:center; gap:14px; background:var(--card); border-radius:14px;
      padding:14px 16px; margin-bottom:10px; cursor:pointer; box-shadow:var(--shadow);
    }
    .setting-icon { font-size:20px; }
    .setting-info { flex:1; }
    .setting-label { font-size:14px; font-weight:600; }
    .setting-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .setting-arrow { color:var(--muted); font-size:16px; }
    pre { margin:12px 0 0; padding:12px; border-radius:12px; background:#1E1A15; color:#D4CBB8; white-space:pre-wrap; word-break:break-word; font-size:12px; }

    /* ── Auth UI ── */
    .auth-card { background:var(--card); border-radius:16px; padding:20px; margin-bottom:14px; box-shadow:var(--shadow); }
    .auth-card .auth-title { font-size:16px; font-weight:700; margin-bottom:4px; }
    .auth-card .auth-sub { font-size:12px; color:var(--muted); margin-bottom:16px; }
    .auth-card .auth-field { margin-bottom:12px; }
    .auth-card .auth-field label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; font-weight:600; }
    .auth-card .auth-field input { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px; background:var(--surface); color:var(--text); outline:none; }
    .auth-card .auth-field input:focus { border-color:var(--accent); }
    .auth-btn { width:100%; padding:12px; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; }
    .auth-btn.primary { background:var(--accent); color:#fff; }
    .auth-btn.primary:disabled { opacity:.5; cursor:not-allowed; }
    .auth-btn.secondary { background:var(--surface); color:var(--text); border:1px solid var(--line); margin-top:8px; }
    /* .auth-btn.google reserved for future Google Sign-In */
    .auth-btn.danger { background:var(--danger); color:#fff; margin-top:8px; }
    .auth-toggle { text-align:center; margin-top:14px; font-size:13px; color:var(--muted); }
    .auth-toggle a { color:var(--accent); text-decoration:none; font-weight:600; cursor:pointer; }
    .auth-error { background:#FFF0F0; color:var(--danger); padding:10px 12px; border-radius:8px; font-size:13px; margin-bottom:12px; display:none; }
    .auth-user-card { display:flex; align-items:center; gap:14px; }
    .auth-avatar { width:48px; height:48px; border-radius:14px; background:var(--accent-light); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; overflow:hidden; }
    .auth-avatar img { width:100%; height:100%; object-fit:cover; }
    .auth-user-info { flex:1; }
    .auth-user-name { font-size:15px; font-weight:700; }
    .auth-user-email { font-size:12px; color:var(--muted); margin-top:2px; }
    .sync-status { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); margin-top:12px; padding:10px 12px; background:var(--surface); border-radius:8px; }
    .sync-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .sync-dot.synced { background:var(--ok); }
    .sync-dot.syncing { background:var(--warn); animation:pulse 1s infinite; }
    .sync-dot.error { background:var(--danger); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

    /* ── Menu ── */
    .menu-wrap { position:relative; }
    .menu-btn { width:auto !important; padding:8px 10px !important; border-radius:10px !important; background:var(--surface); color:var(--muted); border:1px solid var(--line); font-size:18px; line-height:1; cursor:pointer; }
    .menu-panel { position:absolute; top:42px; right:0; min-width:132px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:6px; z-index:10; box-shadow:var(--shadow-md); }
    .menu-panel button { width:100%; text-align:left; background:transparent; color:var(--text); border:0; border-radius:8px; padding:10px 12px; font-size:14px; cursor:pointer; }
    .menu-panel button:hover { background:var(--accent-light); }

    /* ── Modal bottom sheet ── */
    @keyframes modalFadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes modalScaleIn { from { opacity:0; transform:scale(.95) translateY(12px); } to { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes detailContentIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .modal-backdrop {
      position:fixed; inset:0; background:rgba(44,38,31,.45); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; z-index:50;
      animation:modalFadeIn .25s ease;
    }
    .modal-sheet {
      width:calc(100% - 32px); max-width:420px; background:var(--bg); border-radius:20px;
      padding:0 0 24px; max-height:82vh; overflow-y:auto;
      box-shadow:0 16px 48px rgba(44,38,31,.2);
      animation:modalScaleIn .3s ease;
    }
    .modal-sheet .detail-anim { opacity:0; animation:detailContentIn .35s ease forwards; }
    .modal-handle { display:flex; justify-content:center; padding:12px 0 0; }
    .modal-handle-bar { width:36px; height:4px; background:var(--surface-2); border-radius:2px; }
    .modal-header { display:flex; gap:16px; padding:16px 24px 20px; border-bottom:1px solid var(--line); }
    .modal-cover-mini { width:56px; height:80px; border-radius:6px; flex-shrink:0; box-shadow:3px 3px 10px rgba(0,0,0,.15); object-fit:cover; background:var(--accent2); }
    .modal-title { font-size:19px; font-family:var(--serif); line-height:1.3; }
    .modal-meta { color:var(--muted); font-size:13px; margin-top:4px; }
    .modal-body { padding:20px 24px; }
    .modal-meta-row { display:flex; padding:13px 16px; }
    .modal-meta-row + .modal-meta-row { border-top:1px solid var(--line); }
    .modal-meta-label { font-size:13px; color:var(--muted); width:72px; flex-shrink:0; }
    .modal-meta-value { font-size:13px; color:var(--text); }
    .option-row { display:flex; gap:8px; margin-top:10px; }
    @keyframes favBounce { 0%{transform:scale(1)} 30%{transform:scale(.85)} 60%{transform:scale(1.1)} 100%{transform:scale(1)} }
    .favorite-btn.bounce { animation:favBounce .35s ease; }
    .option-pill {
      flex:1; padding:10px 0; border:2px solid var(--surface-2); border-radius:12px;
      background:transparent; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; text-align:center;
    }
    .option-pill.active { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
    .progress-bar { height:4px; background:var(--surface-2); border-radius:4px; overflow:hidden; margin-top:10px; }
    .progress-fill { height:100%; background:var(--accent); border-radius:4px; transition:width .3s ease; }
    .range-row { display:flex; align-items:center; gap:10px; margin-top:10px; }
    .range-row input[type="range"] { flex:1; accent-color:var(--accent); }
    .range-value { width:60px !important; text-align:center; font-size:14px; }
    .modal-note { background:var(--warn-light); border:1px solid #F0E8C8; border-radius:14px; padding:14px 16px; margin-bottom:16px; }
    .modal-note-label { font-size:11px; font-weight:600; color:#9B8540; margin-bottom:6px; }
    .modal-note-text { font-size:13px; color:var(--text); line-height:1.6; }

    /* ── Bottom nav ── */
    /* ── Ghost Nav ── */
    .ghost-nav {
      position:fixed; bottom:calc(18px + var(--safe-bottom));
      left:50%; transform:translateX(-50%);
      display:flex; align-items:center; gap:0;
      background:rgba(44,38,31,.75); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-radius:22px; padding:0 6px;
      z-index:40; transition:opacity .35s ease, transform .35s ease;
      box-shadow:0 4px 24px rgba(44,38,31,.18);
    }
    .ghost-nav.hidden {
      opacity:0; transform:translateX(-50%) translateY(14px); pointer-events:none;
    }
    .ghost-nav button {
      border:none; background:transparent; cursor:pointer;
      padding:14px 16px;
      position:relative; display:flex; align-items:center; justify-content:center;
      -webkit-tap-highlight-color:transparent;
    }
    .ghost-nav button svg {
      width:20px; height:20px; stroke:rgba(255,253,248,.28); stroke-width:1.8;
      fill:none; stroke-linecap:round; stroke-linejoin:round;
    }
    .ghost-nav button.active svg { stroke:#FFFDF8; }
    .ghost-nav button .ghost-dot {
      position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
      width:3px; height:3px; border-radius:50%; background:#FFFDF8;
      opacity:0; transition:opacity .2s;
    }
    .ghost-nav button.active .ghost-dot { opacity:1; }
    .ghost-nav .ghost-fab { padding:12px 10px; }
    .ghost-nav .ghost-fab svg { width:22px; height:22px; stroke:rgba(255,253,248,.45); stroke-width:1.6; }

    /* ── Page header (collapsible) ── */
    .page-header { transition:max-height .25s ease, opacity .25s ease; overflow:hidden; }
    .page-header.collapsed { max-height:0; opacity:0; margin:0; padding:0; }
    .muted { color:var(--muted); font-size:13px; }
    .cover-card { display:flex; gap:14px; align-items:flex-start; }
    .cover-thumb { width:86px; height:122px; border-radius:12px; object-fit:cover; background:var(--surface-2); border:1px solid var(--line); }

    /* ── Category colors ── */
    .cat-c1 { background:#3D5E4C; } /* 文学 */
    .cat-c2 { background:#5E6B4E; } /* 历史 */
    .cat-c3 { background:#4A6B7B; } /* 科幻 */
    .cat-c4 { background:#6B5B7B; } /* 哲学 */
    .cat-c5 { background:#8B6F4E; } /* 其他 */
    .cat-c6 { background:#7B5B5B; } /* 随笔 */

    /* ── Warm Summary Card (replaces big numbers) ── */
    .summary-card{
      background:var(--card);border-radius:20px;padding:20px;box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.6);
    }
    .summary-headline{font-size:20px;font-family:var(--serif);font-weight:700;line-height:1.4;margin-bottom:4px;cursor:pointer}
    .summary-headline .num{color:var(--accent);font-weight:900}
    .summary-sub{font-size:13px;color:var(--muted);line-height:1.5;cursor:pointer}
    .summary-bar-wrap{margin-bottom:14px}
    .summary-bar{height:10px;border-radius:5px;background:var(--surface-2);overflow:hidden;display:flex}
    .summary-bar .seg{height:100%;transition:width .8s ease}
    .summary-bar-legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
    .summary-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer;padding:2px 0}
    .summary-legend-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .summary-legend-item .val{font-weight:700;color:var(--text)}

    /* ── Book Wandering Carousel · 重构版 ── */
    .wander-section { margin: 0 -20px; padding: 0 20px; position: relative; }
    .wander-card {
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(255,255,255,.7);
      display: flex;
      flex-direction: row;
      align-items: stretch;
      height: 192px;
      cursor: pointer;
      position: relative;
    }
    /* 左：封面区 */
    .wander-cover-area {
      width: 122px; flex-shrink: 0;
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      padding: 18px 14px;
      background: linear-gradient(145deg, #f0e8d8, #e2d6c4);
    }
    .wander-cover-bg {
      position: absolute; inset: 0;
      opacity: .18; filter: blur(26px) saturate(1.5);
      background-size: cover; background-position: center;
      transition: background .5s ease;
    }
    .wander-cover {
      width: 82px; height: 116px;
      border-radius: 5px; object-fit: cover;
      box-shadow: 0 8px 26px rgba(44,38,31,.22), 0 2px 6px rgba(44,38,31,.1);
      transition: opacity .4s ease, transform .4s ease;
      position: relative; z-index: 3; flex-shrink: 0;
    }
    .wander-cover.out { opacity: 0; transform: scale(.92) translateY(7px); }
    .wander-deco {
      position: absolute; font-size: 68px; opacity: .05;
      font-family: var(--serif); color: var(--accent2);
      pointer-events: none; right: -4px; bottom: -8px; line-height: 1;
      user-select: none;
    }
    /* 右：文字区 */
    .wander-info {
      flex: 1; min-width: 0;
      padding: 16px 14px 14px 12px;
      display: flex; flex-direction: column;
      justify-content: space-between;
    }
    .wander-cat {
      display: inline-block;
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      background: var(--accent-light); color: var(--accent);
      margin-bottom: 6px; width: fit-content;
    }
    .wander-title {
      font-size: 15px;
      font-family: var(--serif); font-weight: 700;
      line-height: 1.35; margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .wander-meta {
      font-size: 11px; color: var(--muted);
      margin-bottom: 7px;
      display: flex; align-items: center; gap: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .wander-summary {
      font-size: 12px;
      color: var(--muted); line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; flex: 1; min-height: 0; margin-bottom: 8px;
    }
    .wander-bottom {
      display: flex; align-items: center; justify-content: space-between;
    }
    /* 状态徽章 */
    .wander-status {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
    }
    .wander-status .sdot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
    .wander-status.done    { background: var(--ok-light); color: #2D6A3A; }
    .wander-status.done .sdot    { background: var(--ok); }
    .wander-status.unread  { background: #F3EFE8; color: #7A6F62; }
    .wander-status.unread .sdot  { background: #B0A99E; }
    /* 想读按钮 */
    .wander-wish-btn {
      width: 28px; height: 28px;
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--accent2); opacity: .45; border-radius: 50%; padding: 0;
      transition: opacity .2s, transform .18s, color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .wander-wish-btn:hover  { opacity: .75; transform: scale(1.12); }
    .wander-wish-btn:active { transform: scale(1.2); }
    .wander-wish-btn.wished { opacity: 1; color: #C2785C; }


    /* ── Organize: tabs ── */
    .org-tabs{display:flex;gap:0;background:var(--surface-2);border-radius:12px;padding:3px;margin-bottom:16px}
    .org-tab{flex:1;padding:9px 0;border:none;border-radius:10px;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;position:relative}
    .org-tab.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
    .org-tab .tab-badge{position:absolute;top:3px;right:calc(50% - 24px);background:var(--warn);color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:12px;text-align:center}
    .org-panel{display:none}
    .org-panel.active{display:block;animation:fadeIn .25s ease}

    /* Organize - Stats */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .stats-card{background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
    .stats-card .sc-icon{font-size:24px;margin-bottom:8px}
    .stats-card .sc-num{font-size:24px;font-weight:800;font-family:var(--serif);color:var(--text);line-height:1}
    .stats-card .sc-label{font-size:11px;color:var(--muted);margin-top:4px}
    .stats-card .sc-sub{font-size:10px;color:var(--accent);margin-top:6px;font-weight:600}
    .stats-timeline{margin-top:16px}
    .timeline-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .timeline-month{font-size:12px;color:var(--muted);width:40px;flex-shrink:0;text-align:right}
    .timeline-bar{flex:1;height:22px;background:var(--surface-2);border-radius:6px;overflow:hidden;position:relative}
    .timeline-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;transition:width .6s ease}
    .timeline-count{font-size:12px;color:var(--muted);width:24px;text-align:right}

    /* Organize - Locations */
    .loc-card{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;gap:12px}
    .loc-icon{font-size:20px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .loc-info{flex:1}
    .loc-name{font-size:14px;font-weight:600}
    .loc-count{font-size:12px;color:var(--muted);margin-top:2px}

    /* ── FAB (floating action button in bottom nav) ── */
    /* ── Section labels ── */
    .section-label {
      font-size:9px; font-weight:400; letter-spacing:.2em;
      text-transform:uppercase; color:rgba(44,38,31,.22);
      margin-left:2px; margin-top:-2px;
    }
    /* ── Favorites gallery ── */
    .fav-gallery {
      position:relative; margin-bottom:24px;

      display:flex; gap:12px; overflow-x:auto; padding:12px 0 14px;

      pointer-events:none;
    }
    /* (old FAB removed — now part of ghost-nav) */
  </style>

  <script>
    // ── Universal zoom lock (all browsers, all platforms) ──────────────
    // 1. iOS Safari gesture events (pinch zoom)
    document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
    document.addEventListener('gestureend', e => e.preventDefault(), { passive: false });
    // 2. Multi-touch: block 2+ finger touches (pinch zoom on Android/iOS)
    document.addEventListener('touchstart', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    // 3. Track touch distance to block pinch-zoom mid-gesture (Android Chrome etc.)
    let lastTouchDistance = 0;
    document.addEventListener('touchmove', e => {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });
    // 4. Keyboard zoom: block Ctrl+Plus/Minus/0 and Cmd+Plus/Minus/0
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
        e.preventDefault();
      }
    });
    // 5. Mouse wheel zoom: block Ctrl+scroll (desktop browsers)
    document.addEventListener('wheel', e => {
      if (e.ctrlKey) e.preventDefault();
    }, { passive: false });
    // 6. Double-tap zoom prevention (all mobile browsers)
    let lastTapTime = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTapTime < 300) {
        e.preventDefault();
      }
      lastTapTime = now;
    }, { passive: false });
    // ── End zoom lock ────────────────────────────────────────────────────

    const BOOKS_KEY = 'lib:books:v1';
    const META_KEY = 'lib:meta:v1';
    const MODE_KEY = 'lib:home:mode:v1';
    const PAGE_KEY = 'lib:page:v1';
    const ENTRY_KEY = 'lib:entry:v1';
    const LOCATION_PRESETS_KEY = 'lib:location-presets:v1';
    // ── Google Books API 代理 ─────────────────────────────
    // API Key 安全存在 Cloudflare Worker 里，前端不暴露任何 key
    const GBOOKS_PROXY = 'https://maomao-books-proxy.henrycdev26.workers.dev';
    // ────────────────────────────────────────────────────────

    // ── Auth & Sync ──────────────────────────────────────────────────────
    const AUTH_TOKEN_KEY = 'lib:auth:token:v1';
    const AUTH_USER_KEY = 'lib:auth:user:v1';
    const SYNC_LAST_KEY = 'lib:sync:last:v1';
    const API_BASE = GBOOKS_PROXY; // same Worker

    // Auth state
    const auth = {
      token: localStorage.getItem(AUTH_TOKEN_KEY) || null,
      user: (() => { try { return JSON.parse(localStorage.getItem(AUTH_USER_KEY)); } catch { return null; } })(),
      isLoggedIn() { return !!this.token && !!this.user; },
      setSession(token, user) {
        this.token = token;
        this.user = user;
        localStorage.setItem(AUTH_TOKEN_KEY, token);
        localStorage.setItem(AUTH_USER_KEY, JSON.stringify(user));
      },
      clear() {
        this.token = null;
        this.user = null;
        localStorage.removeItem(AUTH_TOKEN_KEY);
        localStorage.removeItem(AUTH_USER_KEY);
        localStorage.removeItem(SYNC_LAST_KEY);
      },
    };

    // API helper
    async function apiFetch(path, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (auth.token) headers['Authorization'] = `Bearer ${auth.token}`;
      const resp = await fetch(`${API_BASE}${path}`, { ...options, headers });
      const data = await resp.json();
      if (!resp.ok) throw { status: resp.status, ...data };
      return data;
    }

    // Sync manager
    const syncManager = {
      _timer: null,
      _syncing: false,

      async push(force = false) {
        if (!auth.isLoggedIn()) return;
        if (this._syncing && !force) return;
        this._syncing = true;
        this._updateUI('syncing');
        try {
          const books = loadBooks();
          const presets = loadLocationPresets();
          const resp = await apiFetch('/sync/push', {
            method: 'POST',
            body: JSON.stringify({ books, locationPresets: presets }),
          });
          localStorage.setItem(SYNC_LAST_KEY, new Date().toISOString());

          // Handle conflicts: if server has newer versions, pull them
          if (resp.conflicts && resp.conflicts.length > 0) {
            this._updateUI('syncing', `检测到 ${resp.conflicts.length} 条冲突，正在同步云端版本…`);
            await this._pullOnly();
            this._updateUI('synced', `${resp.accepted || 0} 本已上传 · ${resp.conflicts.length} 本与云端冲突，已保留云端较新版本`);
          } else {
            this._updateUI('synced', `已同步 ${resp.accepted || 0} 本书到云端`);
          }
          return resp;
        } catch (e) {
          console.warn('Sync push failed:', e);
          if (e.status === 401) { auth.clear(); render(); showToast('登录已过期，请重新登录'); }
          this._updateUI('error');
          throw e;
        } finally {
          this._syncing = false;
        }
      },

      /** Internal pull without syncing guard (for use after push conflicts) */
      async _pullOnly() {
        try {
          const data = await apiFetch('/sync/pull', {
            method: 'POST',
            body: JSON.stringify({}),
          });
          this._mergeFromCloud(data);
        } catch (e) {
          console.warn('Conflict pull failed:', e);
        }
      },

      /** Merge cloud data into localStorage */
      _mergeFromCloud(data) {
        const localBooks = loadBooks();
        const localMap = new Map(localBooks.map(b => [b.id, b]));
        let cloudNew = 0, cloudDeleted = 0, cloudUpdated = 0;

        if (data.books && data.books.length > 0) {
          for (const remote of data.books) {
            const local = localMap.get(remote.id);
            if (remote._deleted) {
              // Tombstone: delete from local if exists and remote delete is newer
              if (local) {
                if (remote.updatedAt >= (local.updatedAt || '')) {
                  localMap.delete(remote.id);
                  cloudDeleted++;
                }
                // else: local edit is newer than delete, keep local
              }
            } else if (!local) {
              localMap.set(remote.id, remote);
              cloudNew++;
            } else if (remote.updatedAt > (local.updatedAt || '')) {
              localMap.set(remote.id, remote);
              cloudUpdated++;
            }
          }
        }

        const merged = Array.from(localMap.values());
        localStorage.setItem(BOOKS_KEY, JSON.stringify(merged));
        localStorage.setItem(META_KEY, JSON.stringify({ schemaVersion: 1, updatedAt: new Date().toISOString() }));

        if (data.locationPresets && data.locationPresets.length > 0) {
          const localPresets = loadLocationPresets();
          const mergedPresets = [...new Set([...localPresets, ...data.locationPresets])].slice(0, 8);
          localStorage.setItem(LOCATION_PRESETS_KEY, JSON.stringify(mergedPresets));
        }

        localStorage.setItem(SYNC_LAST_KEY, data.syncedAt || new Date().toISOString());
        return { total: merged.length, cloudNew, cloudDeleted, cloudUpdated };
      },

      async pull(force = false) {
        if (!auth.isLoggedIn()) return;
        if (this._syncing && !force) return;
        this._syncing = true;
        this._updateUI('syncing');
        try {
          // Full pull including tombstones
          const data = await apiFetch('/sync/pull', {
            method: 'POST',
            body: JSON.stringify({}),
          });

          const result = this._mergeFromCloud(data);

          let msg = '数据已是最新';
          const parts = [];
          if (result.cloudNew > 0) parts.push(`${result.cloudNew} 本新书`);
          if (result.cloudUpdated > 0) parts.push(`${result.cloudUpdated} 本已更新`);
          if (result.cloudDeleted > 0) parts.push(`${result.cloudDeleted} 本已删除`);
          if (parts.length > 0) msg = `从云端同步：${parts.join('、')}`;

          this._updateUI('synced', msg);
          render();
          return result;
        } catch (e) {
          console.warn('Sync pull failed:', e);
          if (e.status === 401) { auth.clear(); render(); showToast('登录已过期，请重新登录'); }
          this._updateUI('error');
          throw e;
        } finally {
          this._syncing = false;
        }
      },

      schedulePush() {
        if (!auth.isLoggedIn()) return;
        clearTimeout(this._timer);
        this._timer = setTimeout(() => this.push(), 2000);
        this._updateUI('syncing');
      },

      _updateUI(state, detail) {
        const el = document.getElementById('syncStatusDot');
        const label = document.getElementById('syncStatusLabel');
        if (!el || !label) return;
        el.className = 'sync-dot ' + state;
        if (detail) {
          label.textContent = detail;
          return;
        }
        const labels = { synced: '已同步', syncing: '同步中…', error: '同步失败' };
        const lastSync = localStorage.getItem(SYNC_LAST_KEY);
        if (state === 'synced' && lastSync) {
          label.textContent = '已同步 · ' + new Date(lastSync).toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        } else {
          label.textContent = labels[state] || '';
        }
      },

      async initialSync() {
        if (!auth.isLoggedIn()) return;
        // Step 1: Pull cloud data (including tombstones) and merge into local
        const pullResult = await this.pull(true);
        // Step 2: Push merged local data to cloud
        const pushResult = await this.push(true);
        // Show summary
        const localTotal = loadActiveBooks().length;
        const pushed = pushResult?.accepted || 0;
        const conflicts = pushResult?.conflicts?.length || 0;
        const pulled = pullResult?.cloudNew || 0;
        let msg = `同步完成 · 共 ${localTotal} 本书`;
        if (pulled > 0) msg += ` · 拉取 ${pulled} 本`;
        if (pushed > 0) msg += ` · 上传 ${pushed} 本`;
        if (conflicts > 0) msg += ` · ${conflicts} 本冲突已处理`;
        this._updateUI('synced', msg);
      },
    };

    // Auth actions
    async function authRegister(email, password, displayName) {
      const data = await apiFetch('/auth/register', {
        method: 'POST',
        body: JSON.stringify({ email, password, displayName }),
      });
      auth.setSession(data.token, data.user);
      await syncManager.initialSync();

    async function authLogin(email, password) {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password }),

      auth.setSession(data.token, data.user);
      await syncManager.initialSync();
      render();
    }

    async function authLogout() {

      render();
    }

    // ── End Auth & Sync ─────────────────────────────────────────────────

    function makeId() {
      try {
        if (globalThis.crypto && typeof globalThis.crypto.randomUUID === 'function') {
          return globalThis.crypto.randomUUID();
        }
      } catch {}
      return `book-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    }
    function loadBooks() {
      try { return JSON.parse(localStorage.getItem(BOOKS_KEY) || '[]'); }
      catch { return []; }
    }
    /** Load only non-deleted books (for rendering/counting) */
    function loadActiveBooks() {
      return loadBooks().filter(b => !b._deleted);
    }
    function loadMeta() {
      try { return JSON.parse(localStorage.getItem(META_KEY) || '{"schemaVersion":1,"updatedAt":"1970-01-01T00:00:00.000Z"}'); }
      catch { return { schemaVersion: 1, updatedAt: new Date(0).toISOString() }; }
    }
    function saveBooks(books) {
      const meta = { ...loadMeta(), schemaVersion: 1, updatedAt: new Date().toISOString() };
      localStorage.setItem(BOOKS_KEY, JSON.stringify(books));
      localStorage.setItem(META_KEY, JSON.stringify(meta));
      // Trigger cloud sync (debounced)
      syncManager.schedulePush();
    }
    function loadLocationPresets() {
      try { return JSON.parse(localStorage.getItem(LOCATION_PRESETS_KEY) || '[]'); }
      catch { return []; }
    }
    function rememberLocationPreset(value) {
      const v = String(value || '').trim();
      if (!v) return;
      const next = [v, ...loadLocationPresets().filter(item => item !== v)].slice(0, 8);
      localStorage.setItem(LOCATION_PRESETS_KEY, JSON.stringify(next));
    }
    function getMode() {
      const mode = localStorage.getItem(MODE_KEY);
      return ['dashboard', 'entry'].includes(mode) ? mode : 'dashboard';

    function getEntryMode() { return localStorage.getItem(ENTRY_KEY) === 'manual' ? 'manual' : 'scan'; }
    function setEntryMode(mode) { localStorage.setItem(ENTRY_KEY, mode); render(); }

    function normalizeReadingStatus(v) {
      const s = String(v || '').trim();

      return '';  // 未读（默认）

    function coverUrl(book) {
      // Only use stored coverUrl — don't fallback to OL's 1x1 GIF placeholder
      return book?.coverUrl || '';
    }
    // Detect 1x1 placeholder images from OpenLibrary and hide them
    function onCoverLoad(img) {
      const w = img.naturalWidth, h = img.naturalHeight;
      // 1x1 GIF from Open Library
      if (w <= 2 && h <= 2) { showCoverPlaceholder(img); return; }
      // Google Books "image not available" placeholder is exactly 128x196
      // Catch any small cover from books.google.com (real covers are 300+px wide)
      const src = img.src || '';
      if (src.includes('books.google.com') && w <= 200) { showCoverPlaceholder(img); return; }
      // Generic small placeholder detection
      if (w <= 80 && h <= 120) { showCoverPlaceholder(img); return; }
    }
    function coverHtml(cu, title) {
      if (cu) return `<div class="cover-wrap"><img src="${escapeHtml(cu)}" alt="${escapeHtml(title || '')}" onload="onCoverLoad(this)" onerror="showCoverPlaceholder(this)" /></div>`;
      const initial = (title || '').charAt(0) || '📖';
      return `<div class="cover-wrap"><div class="cover-placeholder">${escapeHtml(initial)}</div></div>`;
    }
    function showCoverPlaceholder(img) {
      const title = img.alt || '';
      const initial = title.charAt(0) || '📖';
      const ph = document.createElement('div');
      ph.className = 'cover-placeholder';
      ph.textContent = initial;
      // Replace img inside its .cover-wrap parent
      if (img.parentElement?.classList.contains('cover-wrap')) {
        img.parentElement.replaceChild(ph, img);
      } else {
        img.replaceWith(ph);
      }
    }

    // ISBN-10 ↔ ISBN-13 conversion
    function isbn13to10(isbn13) {
      const c = String(isbn13 || '').replace(/[^0-9]/g, '');
      if (c.length !== 13 || !c.startsWith('978')) return null;
      const core = c.slice(3, 12);
      let sum = 0;
      for (let i = 0; i < 9; i++) sum += (10 - i) * parseInt(core[i]);
      const check = (11 - (sum % 11)) % 11;
      return core + (check === 10 ? 'X' : String(check));
    }
    function isbn10to13(isbn10) {
      const c = String(isbn10 || '').replace(/[^0-9Xx]/g, '').toUpperCase();
      if (c.length !== 10) return null;
      const body = '978' + c.slice(0, 9);
      let sum = 0;
      for (let i = 0; i < 12; i++) sum += parseInt(body[i]) * (i % 2 === 0 ? 1 : 3);
      const check = (10 - (sum % 10)) % 10;
      return body + String(check);
    }

    // Pinyin initial letter for Chinese characters
    function getPinyinInitial(ch) {
      // Boundary characters in zh-CN-u-co-pinyin order
      const map = [
        ['A','啊'],['B','芭'],['C','擦'],['D','搭'],['E','蛾'],['F','发'],
        ['G','噶'],['H','哈'],['J','击'],['K','喀'],['L','垃'],['M','妈'],
        ['N','拿'],['O','哦'],['P','啪'],['Q','期'],['R','然'],['S','撒'],
        ['T','塌'],['W','挖'],['X','昔'],['Y','压'],['Z','匝']
      ];
      for (let i = map.length - 1; i >= 0; i--) {
        if (ch.localeCompare(map[i][1], 'zh-CN-u-co-pinyin') >= 0) return map[i][0];
      }
      return '#';
    }
    function getSortKey(title) {
      const first = String(title || '').trim().charAt(0);
      if (!first) return '#';
      const code = first.charCodeAt(0);
      if (code >= 0x4e00 && code <= 0x9fff) return getPinyinInitial(first);
      const upper = first.toUpperCase();
      return (upper >= 'A' && upper <= 'Z') ? upper : '#';
    }
    function sortByTitle(arr) {
      return arr.slice().sort((a, b) =>
        String(a.title || '').localeCompare(String(b.title || ''), 'zh-CN-u-co-pinyin')
      );
    }

    function updateBook(id, updater) {
      const books = loadBooks();
      const index = books.findIndex(b => b.id === id);
      if (index < 0) return null;
      const current = books[index];
      const next = typeof updater === 'function' ? updater(current) : { ...current, ...updater };
      books[index] = { ...current, ...next, updatedAt: new Date().toISOString() };
      saveBooks(books);
      return books[index];
    }

    function validIsbn(v) {
      const s = (v || '').replace(/[^0-9Xx]/g, '');
      return s.length === 0 || s.length === 10 || s.length === 13;

      btn.addEventListener('click', () => {
        // Always stop scanner when tapping nav (regardless of page)

        if (getPage() === page && !(page === 'home' && getMode() !== (opts?.mode || 'dashboard'))) {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          setPage(page, opts);
          window.scrollTo({ top: 0 });
        }
      });

    {
      const ghostNav = document.getElementById('ghostNav');

    function clearDraftFields(options = {}) {
      const keepIsbn = options.keepIsbn === true;
      const keepLocation = options.keepLocation === true;
      const clearNotices = options.clearNotices !== false;
      if (!keepIsbn) els.isbn.value = '';
      els.title.value = '';
      els.author.value = '';
      els.category.value = '';
      els.publishedYear.value = '';
      if (!keepLocation) els.location.value = '';
      if (els.description) els.description.value = '';
      if (els.readingStatus) els.readingStatus.value = '';
      if (els.notes) els.notes.value = '';
      delete els.manualCard.dataset.bookLang;
      delete els.manualCard.dataset.bookSources;
      delete els.manualCard.dataset.pendingCoverUrl;
      lookupCompleted = false;
      if (clearNotices) {
        els.scanNotice.innerHTML = '';
        els.manualNotice.innerHTML = '';
      }
    }

    async function lookupCurrentIsbn() {
      const isbn = els.isbn.value.trim();
      const compact = isbn.replace(/[^0-9Xx]/g, '');
      if (!(compact.length === 10 || compact.length === 13)) {
        els.manualNotice.innerHTML = makeNotice('warn', '请先输入有效的 10 位或 13 位 ISBN。');
        return false;
      }
      clearDraftFields({ keepIsbn: true });
      const result = await fillBookMetaByIsbn(isbn, 'manual', '已搜索 ISBN');
      lookupCompleted = Boolean(result?.found || els.title.value.trim() || els.author.value.trim());
      render();
      return lookupCompleted;
    }

    function showDuplicateModal(existingBook) {
      return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.className = 'dup-overlay';
        overlay.innerHTML = `
          <div class="dup-modal">
            <div class="dup-icon">📚</div>
            <div class="dup-title">这本书已经在库里了</div>
            <div class="dup-book">
              <div class="dup-book-title">${escapeHtml(existingBook.title || '未命名')}</div>
              <div class="dup-book-author">${escapeHtml(existingBook.author || '未知作者')}</div>
            </div>
            <div class="dup-detail">不用重复导入哦，要继续扫下一本吗？</div>
            <div class="dup-btns">
              <button class="dup-btn-stop">到此为止</button>
              <button class="dup-btn-continue">继续扫码</button>
            </div>
          </div>`;

        const cleanup = (result) => {
          overlay.style.animation = 'fadeIn .15s ease reverse';
          setTimeout(() => { overlay.remove(); resolve(result); }, 150);
        };

        overlay.querySelector('.dup-btn-stop').onclick = () => cleanup('stop');
        overlay.querySelector('.dup-btn-continue').onclick = () => cleanup('continue');

        // Auto-dismiss after 6 seconds → continue scanning
        const timer = setTimeout(() => cleanup('continue'), 6000);
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) { clearTimeout(timer); cleanup('stop'); }
        });

        document.body.appendChild(overlay);
      });
    }

    function showSuccessModal(title, author, coverUrl, count, onContinue, onFinish) {
      const overlay = document.createElement('div');
      overlay.className = 'dup-overlay';
      const coverEl = coverUrl
        ? `<div style="width:60px;height:90px;border-radius:8px;overflow:hidden;margin:0 auto 12px;box-shadow:0 4px 12px rgba(0,0,0,.12)"><img src="${escapeHtml(coverUrl)}" style="width:100%;height:100%;object-fit:cover" /></div>`
        : '';
      const emoji = count <= 1 ? '🎉' : count <= 5 ? '🔥' : count <= 10 ? '⚡' : '🏆';
      const cheers = count <= 1 ? '第一本！' : count <= 3 ? `已录入 ${count} 本！` : count <= 10 ? `${count} 本了，继续！` : `${count} 本！停不下来！`;
      overlay.innerHTML = `
        <div class="dup-modal">
          <div class="dup-icon">${emoji}</div>
          ${coverEl}
          <div class="dup-title">${escapeHtml(title)}</div>
          <div class="dup-book-author" style="color:var(--muted);font-size:13px;margin-bottom:6px">${escapeHtml(author || '')}</div>
          <div style="font-size:20px;font-weight:800;color:var(--accent);margin-bottom:16px">${cheers}</div>

            <button class="dup-btn-stop">结束录入</button>
            <button class="dup-btn-continue">继续扫码 📷</button>
          </div>
        </div>`;

      overlay.querySelector('.dup-btn-stop').onclick = () => {
        overlay.style.animation = 'fadeIn .15s ease reverse';
        setTimeout(() => { overlay.remove(); onFinish(); }, 150);
      };
      overlay.querySelector('.dup-btn-continue').onclick = () => {
        overlay.style.animation = 'fadeIn .15s ease reverse';
        setTimeout(() => { overlay.remove(); onContinue(); }, 150);
      };
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          overlay.style.animation = 'fadeIn .15s ease reverse';
          setTimeout(() => { overlay.remove(); onFinish(); }, 150);
        }

      document.body.appendChild(overlay);

    async function saveCurrentBook(options = {}) {
      const isbn = els.isbn.value.trim();
      let title = els.title.value.trim();
      let author = els.author.value.trim();
      let category = els.category.value.trim();
      let readingStatus = String(els.readingStatus?.value || '').trim();
      let readingProgress = 0;
      let publishedYear = els.publishedYear.value.trim();
      let location = els.location.value.trim();
      let description = String(els.description?.value || '').trim();
      let notes = String(els.notes?.value || '').trim();
      let bookLang = String(els.manualCard.dataset.bookLang || '').trim();
      let metadataSources = String(els.manualCard.dataset.bookSources || '').trim().split(/\s*\/\s*/).filter(Boolean);
      let coverUrl = String(els.manualCard.dataset.pendingCoverUrl || '').trim();

      if (!validIsbn(isbn)) {
        els.manualNotice.innerHTML = makeNotice('err', 'ISBN 格式不合法，请输入 10 位或 13 位。');
        return false;
      }

      if (!title && (isbn.replace(/[^0-9Xx]/g, '').length === 10 || isbn.replace(/[^0-9Xx]/g, '').length === 13)) {
        await fillBookMetaByIsbn(isbn, 'manual', '已识别 ISBN');
        lookupCompleted = true;
        title = els.title.value.trim();
        author = els.author.value.trim();
        category = els.category.value.trim();
        publishedYear = els.publishedYear.value.trim();
        description = String(els.description?.value || '').trim();
      }

      if (!title || !author) {
        els.manualNotice.innerHTML = makeNotice('err', '请至少补齐书名和作者。其他缺失信息可以后续再完善。');
        return false;
      }

      // If we have ISBN but no cover, try Bookcover API
      if (!coverUrl && isbn) {
        const compact = isbn.replace(/[^0-9Xx]/g, '');
        if (compact) {
          try {
            const bcRes = await fetch(`https://bookcover.longitood.com/bookcover/${encodeURIComponent(compact)}`);
            if (bcRes.ok) {
              const bcData = await bcRes.json();
              if (bcData.url) coverUrl = bcData.url;
            }
          } catch (_) {}
        }
      }

      const wasEditing = Boolean(editingBookId);
      const books = loadBooks();
      const activeBooks = books.filter(b => !b._deleted);
      const duplicate = activeBooks.find(b => b.id !== editingBookId && ((isbn && b.isbn === isbn) || (b.title === title && b.author === author)));
      const isCompleteRecord = Boolean(category && publishedYear && location);
      if (duplicate) {
        const dupAction = await showDuplicateModal(duplicate);
        if (dupAction === 'stop') return false;
        if (dupAction === 'continue') {
          // User chose to continue scanning — clear fields and restart
          const shouldResumeScan = lastEntryMethod === 'scan';
          clearDraftFields({ keepIsbn: false, keepLocation: true, clearNotices: shouldResumeScan });
          lookupCompleted = false;
          if (shouldResumeScan) { scannerIntent = 'entry'; startScanner(); }
          else { els.isbn.focus(); }
          return false;
        }
      }

      rememberLocationPreset(location);

      if (editingBookId) {
        const target = books.find(b => b.id === editingBookId);
        if (!target) throw new Error('未找到要编辑的图书');
        target.isbn = isbn;
        target.title = title;
        target.author = author;
        target.category = category;
        target.readingStatus = readingStatus;
        target.readingProgress = readingProgress;
        target.publishedYear = publishedYear;
        target.location = location;
        target.description = description;
        target.notes = notes;
        target.bookLang = bookLang;
        target.metadataSources = metadataSources;
        if (coverUrl) target.coverUrl = coverUrl;
        target.status = isCompleteRecord ? 'in_library' : 'to_be_sorted';
        target.updatedAt = new Date().toISOString();
        saveBooks(books);
        hapticSaved();
        els.manualNotice.innerHTML = makeNotice('ok', `已更新：${title}${isCompleteRecord ? '（已入库）' : '（信息待补充）'}`);
        editingBookId = null;
        els.saveBtn.textContent = '导入库中';
        clearDraftFields({ keepIsbn: false, keepLocation: false, clearNotices: false });
        setPage(editReturnPage, { mode: editReturnMode });
        setTimeout(() => window.scrollTo({ top: editReturnScrollY, behavior: 'auto' }), 0);
        return true;
      } else {
        books.push({
          id: makeId(), isbn, title, author, category, readingStatus, readingProgress, publishedYear, location, description, notes, bookLang, metadataSources,
          ...(coverUrl ? { coverUrl } : {}),
          status: isCompleteRecord ? 'in_library' : 'to_be_sorted', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
        });
        saveBooks(books);
        entrySessionCount += 1;
        hapticSaved();

        // Stop scanner during modal
        if (scannerActive) stopScanner();

        // Show success modal (dopamine!)
        return new Promise(resolve => {
          showSuccessModal(title, author, coverUrl, entrySessionCount, () => {
            // Continue scanning
            clearDraftFields({ keepIsbn: false, keepLocation: true });
            lookupCompleted = false;
            lastEntryMethod = 'scan';
            scannerIntent = 'entry';
            startScanner();
            render();
            resolve(true);
          }, () => {
            // Finish entry
            entrySessionCount = 0;
            clearDraftFields({ keepIsbn: false, keepLocation: false });
            lookupCompleted = false;
            setPage('home', { mode: 'dashboard' });
            resolve(true);
          });
        });
      }
      // Edit path already returned above
      return true;
    }

    document.addEventListener('click', (event) => {

        showBookDetail(detailBtn.dataset.id);
        return;
      }

      const readingStatusBtn = event.target.closest('.reading-status-btn');
      if (readingStatusBtn) {
        const id = readingStatusBtn.dataset.id;
        const newStatus = readingStatusBtn.dataset.status;
        updateBook(id, { readingStatus: newStatus || '' });
        render();
        showBookDetail(id);
        return;
      }

      const favoriteBtn = event.target.closest('.favorite-btn');
      if (favoriteBtn) {
        const id = favoriteBtn.dataset.id;
        const book = loadActiveBooks().find(b => b.id === id);
        if (book) {
          favoriteBtn.classList.remove('bounce');
          void favoriteBtn.offsetWidth; // force reflow
          favoriteBtn.classList.add('bounce');
          updateBook(id, { favorite: !book.favorite });
          render();
          showBookDetail(id);
        }
        return;
      }

      if (event.target.closest('#closeDetailBtn') || (event.target.id === 'detailBackdrop')) {
        els.detailModalRoot.innerHTML = '';
        return;
      }

      // Delete book
      const deleteBtn = event.target.closest('.delete-book-btn');
      if (deleteBtn) {

    // ── Import validation ──
    const BOOK_FIELD_WHITELIST = new Set([
      'id', 'isbn', 'title', 'author', 'category', 'readingStatus', 'readingProgress',
      'publishedYear', 'location', 'description', 'notes', 'bookLang', 'coverUrl',
      'metadataSources', 'status', 'createdAt', 'updatedAt', '_deleted', 'favorite',
    ]);
    const SAFE_URL_PROTOCOLS = new Set(['http:', 'https:', 'data:']);
    const MAX_IMPORT_BOOKS = 5000;
    const MAX_FIELD_LENGTH = 2000;

    function isSafeUrl(str) {
      if (!str) return true;
      try { return SAFE_URL_PROTOCOLS.has(new URL(str).protocol); }
      catch { return false; }
    }

    function validateAndSanitizeImport(raw) {
      if (typeof raw !== 'object' || raw === null) throw new Error('无效的 JSON 对象');
      if (!Array.isArray(raw.books)) throw new Error('缺少 books 数组');
      if (!raw.meta || typeof raw.meta !== 'object') throw new Error('缺少 meta 字段');
      if (raw.books.length > MAX_IMPORT_BOOKS) throw new Error(`书籍数量超限（最多 ${MAX_IMPORT_BOOKS} 本）`);

      const sanitized = [];
      let warnings = 0;
      for (let i = 0; i < raw.books.length; i++) {
        const book = raw.books[i];
        if (typeof book !== 'object' || book === null) { warnings++; continue; }
        if (!book.id || typeof book.id !== 'string') { warnings++; continue; }

        // Whitelist fields only
        const clean = {};
        for (const key of BOOK_FIELD_WHITELIST) {
          if (key in book) {
            let val = book[key];
            // Type/length checks for strings
            if (typeof val === 'string' && val.length > MAX_FIELD_LENGTH) val = val.slice(0, MAX_FIELD_LENGTH);
            // URL safety check
            if (key === 'coverUrl' && !isSafeUrl(val)) val = '';
            clean[key] = val;
          }
        }
        // Ensure required fields
        if (!clean.id) { warnings++; continue; }
        clean.title = clean.title || '';
        clean.author = clean.author || '';
        clean.createdAt = clean.createdAt || new Date().toISOString();
        clean.updatedAt = clean.updatedAt || new Date().toISOString();
        // Sanitize metadataSources
        if (clean.metadataSources && !Array.isArray(clean.metadataSources)) clean.metadataSources = [];
        sanitized.push(clean);
      }
      return { books: sanitized, meta: { schemaVersion: raw.meta.schemaVersion || 1, updatedAt: new Date().toISOString() }, warnings };
    }

    els.validateBtn.onclick = () => {

        let msg = `校验通过：共 ${result.books.length} 本图书。`;
        if (result.warnings > 0) msg += ` （${result.warnings} 条记录被跳过）`;
        els.settingsNotice.innerHTML = makeNotice('ok', msg);

        els.settingsNotice.innerHTML = makeNotice('err', `校验失败：${e.message}`);

    async function handleAuthSubmit() {
      const email = (document.getElementById('authEmail')?.value || '').trim();
      const password = document.getElementById('authPassword')?.value || '';
      const displayName = (document.getElementById('authName')?.value || '').trim();
      const errorEl = document.getElementById('authError');
      const submitBtn = document.getElementById('authSubmitBtn');

      if (!email || !password) {
        if (errorEl) { errorEl.textContent = '请输入邮箱和密码'; errorEl.style.display = 'block'; }
        return;
      }

      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '请稍候…'; }
      if (errorEl) errorEl.style.display = 'none';

      try {
        if (authIsRegisterMode) {
          await authRegister(email, password, displayName);
        } else {
          await authLogin(email, password);
        }
      } catch (e) {
        const msg = e.message || (authIsRegisterMode ? '注册失败' : '登录失败');
        if (errorEl) { errorEl.textContent = msg; errorEl.style.display = 'block'; }
      } finally {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = authIsRegisterMode ? '注册' : '登录';
        }
      }
    }
