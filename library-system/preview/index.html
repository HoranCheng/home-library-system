<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>毛毛图书管理系统</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#F6F3ED; --bg2:#EDE8E0; --card:#FFFDF8; --line:rgba(44,38,31,.07);
      --text:#2C261F; --muted:#7A6F62; --accent:#3D5E4C; --accent-light:#E8EFE9;
      --accent2:#8B6F4E; --brown-light:#F5EDE2;
      --ok:#4A7C59; --ok-light:#EAF3EC; --warn:#B8863A; --warn-light:#FFF7E6; --danger:#A84E4E;
      --surface:#F3EFE8; --surface-2:#EBE6DC;
      --shadow:0 2px 12px rgba(44,38,31,.06);
      --shadow-md:0 4px 20px rgba(44,38,31,.10);
      --safe-bottom: env(safe-area-inset-bottom, 12px);
      --serif:"Noto Serif SC","Songti SC","STSong","Georgia",serif;
    }
    * { box-sizing:border-box; margin:0; }
    html { touch-action:pan-x pan-y; -ms-touch-action:pan-x pan-y; -webkit-text-size-adjust:100%; }
    body {
      margin:0; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Noto Sans SC",sans-serif;
      background:var(--bg);
    }
    .app { max-width:480px; margin:0 auto; min-height:100vh; position:relative; }
    @media (min-width:768px) { .app { max-width:600px; } }

    /* ── Top bar ── */
    .topbar {
      position:sticky; top:0; z-index:20; padding:50px 20px 14px;
      background:rgba(246,243,237,.92); backdrop-filter:blur(12px);
      display:flex; align-items:flex-end; justify-content:space-between;
    }
    .topbar-title { font-size:22px; font-family:var(--serif); font-weight:700; color:var(--text); line-height:1.2; }
    .topbar-sub { font-size:12px; color:var(--muted); margin-bottom:2px; letter-spacing:.03em; }
    .mode-toggle {
      display:flex; background:var(--surface-2); border-radius:10px; padding:3px; gap:3px;
    }
    .mode-toggle button {
      padding:10px 20px; border:none; border-radius:10px; cursor:pointer; font-size:14px; font-weight:700;
      background:transparent; color:var(--muted); transition:all .2s;
    }
    .mode-toggle button.active { background:var(--card); color:var(--text); box-shadow:var(--shadow); }
    .mode-toggle button.accent-active { background:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(61,94,76,.25); }

    /* ── Content area ── */
    .content { padding:0 20px calc(var(--safe-bottom) + 88px); }
    .hidden { display:none !important; }

    /* ── Section title ── */
    .section-title { font-size:18px; font-family:var(--serif); font-weight:700; margin:0 0 14px; }
    .subsection-title { margin:20px 0 10px; font-size:12px; color:var(--muted); font-weight:600; letter-spacing:.04em; }

    /* ── Cards ── */
    .card { background:var(--card); border-radius:16px; padding:16px; box-shadow:var(--shadow); border:1px solid rgba(255,255,255,.6); }
    .card + .card { margin-top:12px; }

    /* ── Stats grid ── */
    .stat-grid { display:flex; justify-content:space-around; padding:16px 0; }
    .stat-item { text-align:center; }
    .stat-clickable { border-radius:12px; padding:8px 4px; transition:background .15s; }
    .stat-clickable:active { background:var(--accent-light); }
    .stat-num { font-size:26px; font-weight:800; line-height:1.1; color:var(--text); }
    .stat-num.green { color:var(--accent); }
    .stat-num.brown { color:var(--accent2); }
    .stat-num.warn { color:var(--warn); }
    .stat-label { font-size:11px; color:var(--muted); margin-top:3px; }

    /* ── Alert banner ── */
    .alert-banner {
      margin-top:12px; padding:10px 14px; border-radius:10px; display:flex; align-items:center; justify-content:space-between;
      font-size:12px;
    }
    .alert-banner.warn { background:var(--warn-light); color:#8B6A20; }
    .alert-banner .alert-action { font-weight:600; color:var(--warn); cursor:pointer; }

    /* ── Currently reading card ── */
    .reading-hero {
      border-radius:16px; padding:18px 20px; cursor:pointer; margin-top:12px;
      color:#fff; position:relative; overflow:hidden;
    }
    .reading-hero-inner { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
    .reading-hero-cover { width:44px; height:62px; background:rgba(255,255,255,.18); border-radius:4px; flex-shrink:0; }
    .reading-hero-author { color:rgba(255,255,255,.7); font-size:12px; }
    .reading-hero-title { font-size:17px; font-family:var(--serif); margin-top:3px; }
    .reading-hero-pct { margin-left:auto; color:rgba(255,255,255,.7); font-size:13px; font-weight:700; }
    .reading-hero-bar { height:4px; background:rgba(255,255,255,.2); border-radius:4px; overflow:hidden; }
    .reading-hero-fill { height:100%; background:rgba(255,255,255,.8); border-radius:4px; }

    /* ── Category bar chart ── */
    .cat-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .cat-bar-row:last-child { margin-bottom:0; }
    .cat-bar-label { font-size:12px; color:var(--text); width:48px; flex-shrink:0; text-align:right; }
    .cat-bar-track { flex:1; height:8px; background:var(--surface-2); border-radius:4px; overflow:hidden; }
    .cat-bar-fill { height:100%; border-radius:4px; }
    .cat-bar-count { font-size:12px; color:var(--muted); width:24px; text-align:right; }

    /* ── Recent items ── */
    .recent-item {
      display:flex; align-items:center; gap:12px; padding:12px 14px; cursor:pointer;
      background:var(--card); border-radius:14px; box-shadow:var(--shadow); margin-bottom:8px;
    }
    .recent-item:last-child { margin-bottom:0; }
    .recent-color { width:6px; height:44px; border-radius:3px; flex-shrink:0; }
    .recent-info { flex:1; min-width:0; }
    .recent-title { font-size:14px; font-weight:600; font-family:var(--serif); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .recent-author { font-size:12px; color:var(--muted); margin-top:2px; }

    /* ── Status badges ── */
    .status-badge {
      display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600;
    }
    .status-badge .dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
    .status-badge.want { background:#EBF2F8; color:#2D6A9F; }
    .status-badge.want .dot { background:#5B9BD5; }
    .status-badge.reading { background:var(--warn-light); color:#8B6A20; }
    .status-badge.reading .dot { background:var(--warn); }
    .status-badge.done { background:var(--ok-light); color:#2D6A3A; }
    .status-badge.done .dot { background:var(--ok); }
    .lib-badge {
      font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px;
    }
    .lib-badge.in { background:var(--accent-light); color:var(--accent); border:1px solid #C2D5C6; }
    .lib-badge.sort { background:#FFF3E0; color:#E65100; border:1px solid #FFCC80; }

    /* ── Actions row ── */
    .actions { display:flex; gap:10px; margin-top:14px; }
    button.btn {
      flex:1; border:0; border-radius:14px; padding:13px 16px; font-size:15px; font-weight:600; cursor:pointer;
    }
    .primary { background:var(--accent); color:#fff; }
    .secondary { background:var(--accent-light); color:var(--accent); }
    .ghost { background:transparent; color:var(--muted); border:1.5px solid var(--line); }

    /* ── Entry form ── */
    #saveBtn, #finishEntryBtn { appearance:none; -webkit-appearance:none; }
    #saveBtn { background:var(--accent) !important; color:#fff !important; }
    #finishEntryBtn { background:var(--accent-light) !important; color:var(--accent) !important; border:1px solid rgba(61,94,76,.15) !important; }
    .field { margin-top:14px; }
    .field label { display:block; margin-bottom:6px; font-size:12px; color:var(--muted); font-weight:600; }
    .field input, .field textarea {
      width:100%; border-radius:12px; border:1.5px solid var(--surface-2); background:var(--card); color:var(--text);
      padding:12px 14px; font-size:15px; outline:none; transition:border-color .2s;
    }
    .field input:focus, .field textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(61,94,76,.1); }
    .input-with-action { position:relative; }
    .input-with-action input { padding-right:54px; }
    .input-action-btn {
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      width:36px; height:36px; border-radius:10px; border:1px solid rgba(139,111,78,.2); background:var(--brown-light); color:var(--accent2); font-size:17px; cursor:pointer;
    }
    .field textarea { min-height:120px; resize:vertical; }
    .hint { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5; }
    .compact-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .compact-grid > * { min-width:0; }
    .sticky-actions { position:sticky; bottom:0; background:rgba(246,243,237,.96); padding-top:12px; margin-top:14px; border-top:1px solid var(--line); }
    .review-card { margin-top:12px; padding:14px 16px; border-radius:14px; background:var(--brown-light); border:1px solid rgba(139,111,78,.1); }
    .review-card .muted { color:var(--accent2); }

    /* ── Notice ── */
    .notice { margin-top:12px; padding:12px 14px; border-radius:12px; font-size:13px; line-height:1.5; }
    .notice.ok { background:var(--ok-light); color:var(--ok); }
    .notice.warn { background:var(--warn-light); color:#8B6A20; }
    .notice.err { background:#FDECEC; color:var(--danger); }

    /* ── Chips ── */
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .chip {
      display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:20px;
      background:var(--surface); border:1px solid var(--line); color:var(--muted); font-size:12px; font-weight:600;
    }
    button.chip { cursor:pointer; }
    .chip.active { background:var(--accent); color:#fff; border-color:transparent; }

    /* ── Search bar ── */
    .search-bar {
      display:flex; align-items:center; gap:10px; background:var(--card); border-radius:14px;
      padding:12px 16px; border:1.5px solid var(--surface-2); box-shadow:var(--shadow);
    }
    .search-bar input { border:none; background:transparent; font-size:14px; color:var(--text); outline:none; flex:1; }
    .search-bar .clear-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; line-height:1; padding:0; }

    /* ── Scanner ── */
    .scanner-box { display:none; margin-top:14px; border-radius:16px; overflow:hidden; position:relative; background:#000; }
    .scanner-video { width:100%; display:block; max-height:420px; object-fit:cover; }
    .scanner-aim { position:absolute; inset:0; pointer-events:none; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
    .scanner-aim-inner { width:240px; height:100px; border:2.5px solid var(--accent); border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,.45); position:relative; overflow:hidden; }
    .scanner-aim-inner::after { content:''; position:absolute; left:8px; right:8px; height:2px; background:linear-gradient(90deg, transparent, var(--accent), transparent); animation:scanLine 2s ease-in-out infinite; }
    @keyframes scanLine { 0% { top:10%; opacity:.3; } 50% { top:90%; opacity:1; } 100% { top:10%; opacity:.3; } }
    .scanner-hint { color:rgba(255,255,255,.85); font-size:13px; font-weight:500; text-shadow:0 1px 3px rgba(0,0,0,.5); margin-top:4px; }
    .scanner-controls { position:absolute; top:10px; right:10px; display:flex; gap:8px; z-index:5; }
    .scanner-cancel { background:rgba(0,0,0,.65); color:#fff; border:0; border-radius:10px; padding:7px 14px; font-size:14px; cursor:pointer; font-weight:600; }
    .scanner-ctrl-btn { background:rgba(0,0,0,.65); color:#fff; border:0; border-radius:10px; padding:7px 14px; font-size:14px; cursor:pointer; font-weight:600; }
    .scanner-ctrl-btn.active { background:rgba(255,200,0,.85); color:#000; }
    @keyframes camBounce { 0%,100% { transform:translateY(0) scale(1); } 50% { transform:translateY(-10px) scale(1.1); } }
    .scanner-pro-panel { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,.85); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); color:#fff; padding:16px; border-radius:16px 16px 0 0; animation:slideUp .25s ease; z-index:10; }
    .pro-panel-title { font-size:14px; font-weight:700; margin-bottom:12px; text-align:center; }
    .pro-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .pro-row label { font-size:12px; color:rgba(255,255,255,.7); min-width:52px; flex-shrink:0; }
    .pro-row select { flex:1; background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.2); border-radius:8px; padding:8px 10px; font-size:13px; -webkit-appearance:none; appearance:none; }
    .pro-row input[type=range] { flex:1; accent-color:var(--accent); }

    /* Duplicate book modal */
    .dup-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:2000; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .2s ease; }
    .dup-modal { background:var(--card); border-radius:20px; padding:28px 24px; max-width:320px; width:100%; text-align:center; box-shadow:0 16px 40px rgba(0,0,0,.15); animation:slideUp .3s ease; }
    .dup-modal .dup-icon { font-size:40px; margin-bottom:12px; }
    .dup-modal .dup-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:8px; }
    .dup-modal .dup-detail { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:20px; }
    .dup-modal .dup-book { background:var(--surface); border-radius:12px; padding:10px 14px; margin-bottom:16px; text-align:left; }
    .dup-modal .dup-book-title { font-size:14px; font-weight:600; color:var(--text); }
    .dup-modal .dup-book-author { font-size:12px; color:var(--muted); margin-top:2px; }
    .dup-modal .dup-btns { display:flex; gap:10px; }
    .dup-modal .dup-btns button { flex:1; border:none; border-radius:12px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; }
    .dup-modal .dup-btn-stop { background:var(--surface-2); color:var(--text); }
    .dup-modal .dup-btn-stop:active { background:var(--line); }
    .dup-modal .dup-btn-continue { background:var(--accent); color:#fff; }
    .dup-modal .dup-btn-continue:active { background:#2e4a3a; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    /* Auto-filled field highlight */
    input.auto-filled {
      background:var(--accent-light) !important; border-color:var(--accent) !important;
      box-shadow:inset 0 0 0 1px rgba(61,94,76,.15);
    }
    .auto-fill-hint { font-size:10px; color:var(--accent); margin-top:2px; font-weight:600; }
    /* Scan success toast */
    .scan-toast {
      position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:999;
      background:var(--ok); color:#fff; padding:12px 24px; border-radius:14px;
      font-size:15px; font-weight:700; box-shadow:0 6px 20px rgba(74,124,89,.4);
      animation: toastIn .3s ease, toastOut .3s ease 1.5s forwards;
      pointer-events:none;
    }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; } }

    /* ── Book grid ── */
    .book-list { margin-top:12px; }
    .book-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(90px, 1fr)); gap:12px; margin-top:12px; }
    .book-grid-item { text-align:center; cursor:pointer; max-width:140px; }
    .book-grid-item .cover-wrap { position:relative; width:100%; padding-top:150%; border-radius:10px; overflow:hidden; background:var(--surface-2); border:1px solid var(--line); }
    .book-grid-item .cover-wrap img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; display:block; }
    .book-grid-item .cover-wrap .cover-placeholder { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--muted); }
    .book-grid-item .book-grid-title { font-size:12px; margin-top:6px; line-height:1.3; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .book-grid-item .book-grid-author { font-size:11px; color:var(--muted); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .shelf-letter-head { display:block; font-size:13px; font-weight:700; color:var(--accent); letter-spacing:.08em; padding:10px 2px 4px; margin-top:8px; border-bottom:1px solid var(--line); }
    .book-list > .book-grid { margin-top:0; }

    /* ── Book item row ── */
    .book-item { padding:12px 0; border-top:1px solid var(--line); position:relative; }
    .book-item:first-child { border-top:0; padding-top:0; }
    .book-item h3 { margin:0 0 4px; font-size:15px; }
    .book-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .link-btn { background:none; border:0; color:var(--accent); padding:0; font:inherit; cursor:pointer; font-weight:600; }

    /* ── Organize card ── */
    .organize-card {
      background:var(--card); border-radius:16px; padding:16px; box-shadow:var(--shadow);
      border-left:4px solid var(--warn); margin-bottom:10px; cursor:pointer;
    }
    .organize-card-head { display:flex; gap:12px; align-items:flex-start; }
    .organize-card-cover { width:38px; height:52px; border-radius:4px; flex-shrink:0; }
    .organize-card-info { flex:1; }
    .organize-card-title { font-size:15px; font-weight:600; font-family:var(--serif); }
    .organize-card-author { font-size:12px; color:var(--muted); margin-top:3px; }
    .missing-tag { font-size:10px; padding:2px 8px; border-radius:20px; background:#FFF3E0; color:#E65100; font-weight:600; display:inline-block; margin-right:4px; margin-top:6px; }
    .organize-actions { display:flex; gap:8px; margin-top:12px; }
    .organize-actions button {
      flex:1; padding:9px 0; border-radius:10px; font-size:12px; font-weight:600; cursor:pointer; border:none;
    }

    /* ── Settings ── */
    .setting-row {
      display:flex; align-items:center; gap:14px; background:var(--card); border-radius:14px;
      padding:14px 16px; margin-bottom:10px; cursor:pointer; box-shadow:var(--shadow);
    }
    .setting-icon { font-size:20px; }
    .setting-info { flex:1; }
    .setting-label { font-size:14px; font-weight:600; }
    .setting-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .setting-arrow { color:var(--muted); font-size:16px; }
    pre { margin:12px 0 0; padding:12px; border-radius:12px; background:#1E1A15; color:#D4CBB8; white-space:pre-wrap; word-break:break-word; font-size:12px; }

    /* ── Menu ── */
    .menu-wrap { position:relative; }
    .menu-btn { width:auto !important; padding:8px 10px !important; border-radius:10px !important; background:var(--surface); color:var(--muted); border:1px solid var(--line); font-size:18px; line-height:1; cursor:pointer; }
    .menu-panel { position:absolute; top:42px; right:0; min-width:132px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:6px; z-index:10; box-shadow:var(--shadow-md); }
    .menu-panel button { width:100%; text-align:left; background:transparent; color:var(--text); border:0; border-radius:8px; padding:10px 12px; font-size:14px; cursor:pointer; }
    .menu-panel button:hover { background:var(--accent-light); }

    /* ── Modal bottom sheet ── */
    .modal-backdrop { position:fixed; inset:0; background:rgba(44,38,31,.5); backdrop-filter:blur(6px); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
    .modal-sheet {
      width:100%; max-width:480px; background:var(--bg); border-radius:24px 24px 0 0;
      padding:0 0 40px; max-height:85vh; overflow-y:auto;
    }
    .modal-handle { display:flex; justify-content:center; padding:12px 0 0; }
    .modal-handle-bar { width:36px; height:4px; background:var(--surface-2); border-radius:2px; }
    .modal-header { display:flex; gap:16px; padding:16px 24px 20px; border-bottom:1px solid var(--line); }
    .modal-cover-mini { width:56px; height:80px; border-radius:6px; flex-shrink:0; box-shadow:3px 3px 10px rgba(0,0,0,.15); object-fit:cover; background:var(--accent2); }
    .modal-title { font-size:19px; font-family:var(--serif); line-height:1.3; }
    .modal-meta { color:var(--muted); font-size:13px; margin-top:4px; }
    .modal-body { padding:20px 24px; }
    .modal-meta-row { display:flex; padding:13px 16px; }
    .modal-meta-row + .modal-meta-row { border-top:1px solid var(--line); }
    .modal-meta-label { font-size:13px; color:var(--muted); width:72px; flex-shrink:0; }

  <script>
    // ── Universal zoom lock (all browsers, all platforms) ──────────────
    // 1. iOS Safari gesture events (pinch zoom)
    document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
    document.addEventListener('gestureend', e => e.preventDefault(), { passive: false });
    // 2. Multi-touch: block 2+ finger touches (pinch zoom on Android/iOS)
    document.addEventListener('touchstart', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    // 3. Track touch distance to block pinch-zoom mid-gesture (Android Chrome etc.)
    let lastTouchDistance = 0;
    document.addEventListener('touchmove', e => {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });
    // 4. Keyboard zoom: block Ctrl+Plus/Minus/0 and Cmd+Plus/Minus/0
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
        e.preventDefault();
      }
    });
    // 5. Mouse wheel zoom: block Ctrl+scroll (desktop browsers)
    document.addEventListener('wheel', e => {
      if (e.ctrlKey) e.preventDefault();
    }, { passive: false });
    // 6. Double-tap zoom prevention (all mobile browsers)
    let lastTapTime = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTapTime < 300) {
        e.preventDefault();
      }
      lastTapTime = now;
    }, { passive: false });
    // ── End zoom lock ────────────────────────────────────────────────────

    const BOOKS_KEY = 'lib:books:v1';
    const META_KEY = 'lib:meta:v1';
    const MODE_KEY = 'lib:home:mode:v1';
    const PAGE_KEY = 'lib:page:v1';
    const ENTRY_KEY = 'lib:entry:v1';
    const LOCATION_PRESETS_KEY = 'lib:location-presets:v1';
    // ── Google Books API 代理 ─────────────────────────────
    // API Key 安全存在 Cloudflare Worker 里，前端不暴露任何 key
    const GBOOKS_PROXY = 'https://maomao-books-proxy.henrycdev26.workers.dev';
    // ────────────────────────────────────────────────────────

    function makeId() {
      try {
        if (globalThis.crypto && typeof globalThis.crypto.randomUUID === 'function') {
          return globalThis.crypto.randomUUID();
        }
      } catch {}
      return `book-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    }
    function loadBooks() {
      try { return JSON.parse(localStorage.getItem(BOOKS_KEY) || '[]'); }
      catch { return []; }
    }
    function loadMeta() {
      try { return JSON.parse(localStorage.getItem(META_KEY) || '{"schemaVersion":1,"updatedAt":"1970-01-01T00:00:00.000Z"}'); }
      catch { return { schemaVersion: 1, updatedAt: new Date(0).toISOString() }; }
    }
    function saveBooks(books) {
      const meta = { ...loadMeta(), schemaVersion: 1, updatedAt: new Date().toISOString() };
      localStorage.setItem(BOOKS_KEY, JSON.stringify(books));
      localStorage.setItem(META_KEY, JSON.stringify(meta));
    }
    function loadLocationPresets() {
      try { return JSON.parse(localStorage.getItem(LOCATION_PRESETS_KEY) || '[]'); }
      catch { return []; }
    }
    function rememberLocationPreset(value) {
      const v = String(value || '').trim();
      if (!v) return;
      const next = [v, ...loadLocationPresets().filter(item => item !== v)].slice(0, 8);
      localStorage.setItem(LOCATION_PRESETS_KEY, JSON.stringify(next));
    }
    function getMode() {
      const mode = localStorage.getItem(MODE_KEY);
      return ['dashboard', 'entry'].includes(mode) ? mode : 'dashboard';
    }
    function setMode(mode) { localStorage.setItem(MODE_KEY, mode); render(); }
    function getEntryMode() { return localStorage.getItem(ENTRY_KEY) === 'manual' ? 'manual' : 'scan'; }
    function setEntryMode(mode) { localStorage.setItem(ENTRY_KEY, mode); render(); }
    function getPage() {
      const page = localStorage.getItem(PAGE_KEY);
      return ['home', 'search', 'organize', 'settings'].includes(page) ? page : 'home';
    }
    function setPage(page, options = {}) {
      localStorage.setItem(PAGE_KEY, page);
      if (options.mode) localStorage.setItem(MODE_KEY, options.mode);
      render();
    }
    function makeNotice(kind, text) { return `<div class="notice ${kind}">${text}</div>`; }
    function escapeHtml(v) {
      return String(v ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
    }

    function normalizeReadingStatus(v) {
      const s = String(v || '').trim();
      if (!s) return '要读';
      if (['要读', '想读'].includes(s)) return '要读';
      if (['在读', '正在读'].includes(s)) return '在读';
      if (['读完', '已读完', '已完成'].includes(s)) return '读完';
      return s;
    }

    function coverUrl(book) {
      // Only use stored coverUrl — don't fallback to OL's 1x1 GIF placeholder
      return book?.coverUrl || '';
    }
    // Detect 1x1 placeholder images from OpenLibrary and hide them
    function onCoverLoad(img) {
      const w = img.naturalWidth, h = img.naturalHeight;
      // 1x1 GIF from Open Library
      if (w <= 2 && h <= 2) { showCoverPlaceholder(img); return; }
      // Google Books "image not available" placeholder is exactly 128x196
      // Catch any small cover from books.google.com (real covers are 300+px wide)
      const src = img.src || '';
      if (src.includes('books.google.com') && w <= 200) { showCoverPlaceholder(img); return; }
      // Generic small placeholder detection
      if (w <= 80 && h <= 120) { showCoverPlaceholder(img); return; }
    }
    function coverHtml(cu, title) {
      if (cu) return `<div class="cover-wrap"><img src="${escapeHtml(cu)}" alt="${escapeHtml(title || '')}" onload="onCoverLoad(this)" onerror="showCoverPlaceholder(this)" /></div>`;
      const initial = (title || '').charAt(0) || '📖';
      return `<div class="cover-wrap"><div class="cover-placeholder">${escapeHtml(initial)}</div></div>`;
    }
    function showCoverPlaceholder(img) {
      const title = img.alt || '';
      const initial = title.charAt(0) || '📖';
      const ph = document.createElement('div');
      ph.className = 'cover-placeholder';
      ph.textContent = initial;
      // Replace img inside its .cover-wrap parent
      if (img.parentElement?.classList.contains('cover-wrap')) {
        img.parentElement.replaceChild(ph, img);
      } else {
        img.replaceWith(ph);
      }
    }

    // ISBN-10 ↔ ISBN-13 conversion
    function isbn13to10(isbn13) {
      const c = String(isbn13 || '').replace(/[^0-9]/g, '');
      if (c.length !== 13 || !c.startsWith('978')) return null;
      const core = c.slice(3, 12);
      let sum = 0;
      for (let i = 0; i < 9; i++) sum += (10 - i) * parseInt(core[i]);
      const check = (11 - (sum % 11)) % 11;
      return core + (check === 10 ? 'X' : String(check));
    }
    function isbn10to13(isbn10) {
      const c = String(isbn10 || '').replace(/[^0-9Xx]/g, '').toUpperCase();
      if (c.length !== 10) return null;
      const body = '978' + c.slice(0, 9);
      let sum = 0;
      for (let i = 0; i < 12; i++) sum += parseInt(body[i]) * (i % 2 === 0 ? 1 : 3);
      const check = (10 - (sum % 10)) % 10;
      return body + String(check);
    }

    // Pinyin initial letter for Chinese characters
    function getPinyinInitial(ch) {
      // Boundary characters in zh-CN-u-co-pinyin order
      const map = [
        ['A','啊'],['B','芭'],['C','擦'],['D','搭'],['E','蛾'],['F','发'],
        ['G','噶'],['H','哈'],['J','击'],['K','喀'],['L','垃'],['M','妈'],
        ['N','拿'],['O','哦'],['P','啪'],['Q','期'],['R','然'],['S','撒'],
        ['T','塌'],['W','挖'],['X','昔'],['Y','压'],['Z','匝']
      ];
      for (let i = map.length - 1; i >= 0; i--) {
        if (ch.localeCompare(map[i][1], 'zh-CN-u-co-pinyin') >= 0) return map[i][0];
      }
      return '#';
    }
    function getSortKey(title) {
      const first = String(title || '').trim().charAt(0);
      if (!first) return '#';
      const code = first.charCodeAt(0);
      if (code >= 0x4e00 && code <= 0x9fff) return getPinyinInitial(first);
      const upper = first.toUpperCase();
      return (upper >= 'A' && upper <= 'Z') ? upper : '#';
    }
    function sortByTitle(arr) {
      return arr.slice().sort((a, b) =>
        String(a.title || '').localeCompare(String(b.title || ''), 'zh-CN-u-co-pinyin')
      );
    }

    function updateBook(id, updater) {
      const books = loadBooks();
      const index = books.findIndex(b => b.id === id);
      if (index < 0) return null;
      const current = books[index];
      const next = typeof updater === 'function' ? updater(current) : { ...current, ...updater };
      books[index] = { ...current, ...next, updatedAt: new Date().toISOString() };
      saveBooks(books);
      return books[index];
    }

      // Settings — user-friendly
      const bookCount = books.length;

      els.settingsRows.innerHTML = `

              <div style="font-size:16px;font-weight:700">我的藏书数据</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px">${bookCount} 本书 · 最后更新 ${escapeHtml(lastUpdated)}</div>
            </div>

          <div style="font-size:12px;color:var(--muted);background:var(--surface);padding:10px 12px;border-radius:8px">
            💡 数据保存在你的浏览器本地，建议定期备份。换设备时需要导出再导入。
          </div>
        </div>` + [
        { icon: '💾', label: '备份数据', sub: '导出完整的藏书记录', action: 'exportJson' },

    }

    function validIsbn(v) {
      const s = (v || '').replace(/[^0-9Xx]/g, '');

    // Nav tab: tap current tab → scroll to top; tap other tab → switch page

    function clearDraftFields(options = {}) {
      const keepIsbn = options.keepIsbn === true;
      const keepLocation = options.keepLocation === true;
      const clearNotices = options.clearNotices !== false;
      if (!keepIsbn) els.isbn.value = '';
      els.title.value = '';
      els.author.value = '';
      els.category.value = '';
      els.publishedYear.value = '';
      if (!keepLocation) els.location.value = '';
      if (els.description) els.description.value = '';
      if (els.readingStatus) els.readingStatus.value = '';
      if (els.readingProgress) els.readingProgress.value = '';
      if (els.notes) els.notes.value = '';
      delete els.manualCard.dataset.bookLang;
      delete els.manualCard.dataset.bookSources;
      delete els.manualCard.dataset.pendingCoverUrl;
      lookupCompleted = false;
      if (clearNotices) {
        els.scanNotice.innerHTML = '';
        els.manualNotice.innerHTML = '';
      }
    }

    async function lookupCurrentIsbn() {
      const isbn = els.isbn.value.trim();
      const compact = isbn.replace(/[^0-9Xx]/g, '');
      if (!(compact.length === 10 || compact.length === 13)) {
        els.manualNotice.innerHTML = makeNotice('warn', '请先输入有效的 10 位或 13 位 ISBN。');
        return false;
      }
      clearDraftFields({ keepIsbn: true });
      const result = await fillBookMetaByIsbn(isbn, 'manual', '已搜索 ISBN');
      lookupCompleted = Boolean(result?.found || els.title.value.trim() || els.author.value.trim());
      render();
      return lookupCompleted;
    }

    function showDuplicateModal(existingBook) {
      return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.className = 'dup-overlay';
        overlay.innerHTML = `
          <div class="dup-modal">
            <div class="dup-icon">📚</div>
            <div class="dup-title">这本书已经在库里了</div>
            <div class="dup-book">
              <div class="dup-book-title">${escapeHtml(existingBook.title || '未命名')}</div>
              <div class="dup-book-author">${escapeHtml(existingBook.author || '未知作者')}</div>
            </div>
            <div class="dup-detail">不用重复导入哦，要继续扫下一本吗？</div>
            <div class="dup-btns">
              <button class="dup-btn-stop">到此为止</button>
              <button class="dup-btn-continue">继续扫码</button>
            </div>
          </div>`;

        const cleanup = (result) => {
          overlay.style.animation = 'fadeIn .15s ease reverse';
          setTimeout(() => { overlay.remove(); resolve(result); }, 150);
        };

        overlay.querySelector('.dup-btn-stop').onclick = () => cleanup('stop');
        overlay.querySelector('.dup-btn-continue').onclick = () => cleanup('continue');

        // Auto-dismiss after 6 seconds → continue scanning
        const timer = setTimeout(() => cleanup('continue'), 6000);
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) { clearTimeout(timer); cleanup('stop'); }
        });

        document.body.appendChild(overlay);
      });
    }

    async function saveCurrentBook(options = {}) {
      const isbn = els.isbn.value.trim();
      let title = els.title.value.trim();
      let author = els.author.value.trim();
      let category = els.category.value.trim();
      let readingStatus = normalizeReadingStatus(String(els.readingStatus?.value || '').trim());
      let readingProgress = Math.max(0, Math.min(100, Number(els.readingProgress?.value || 0)));
      let publishedYear = els.publishedYear.value.trim();
      let location = els.location.value.trim();
      let description = String(els.description?.value || '').trim();
      let notes = String(els.notes?.value || '').trim();
      let bookLang = String(els.manualCard.dataset.bookLang || '').trim();
      let metadataSources = String(els.manualCard.dataset.bookSources || '').trim();
      let coverUrl = String(els.manualCard.dataset.pendingCoverUrl || '').trim();

      if (!validIsbn(isbn)) {
        els.manualNotice.innerHTML = makeNotice('err', 'ISBN 格式不合法，请输入 10 位或 13 位。');
        return false;
      }

      if (!title && (isbn.replace(/[^0-9Xx]/g, '').length === 10 || isbn.replace(/[^0-9Xx]/g, '').length === 13)) {
        await fillBookMetaByIsbn(isbn, 'manual', '已识别 ISBN');
        lookupCompleted = true;
        title = els.title.value.trim();
        author = els.author.value.trim();
        category = els.category.value.trim();
        publishedYear = els.publishedYear.value.trim();
        description = String(els.description?.value || '').trim();
      }

      if (!title || !author) {
        els.manualNotice.innerHTML = makeNotice('err', '请至少补齐书名和作者。其他缺失信息可以后续再完善。');
        return false;
      }

      // If we have ISBN but no cover, try Bookcover API
      if (!coverUrl && isbn) {
        const compact = isbn.replace(/[^0-9Xx]/g, '');
        if (compact) {
          try {
            const bcRes = await fetch(`https://bookcover.longitood.com/bookcover/${encodeURIComponent(compact)}`);
            if (bcRes.ok) {
              const bcData = await bcRes.json();
              if (bcData.url) coverUrl = bcData.url;
            }
          } catch (_) {}
        }
      }

      const wasEditing = Boolean(editingBookId);
      const books = loadBooks();
      const duplicate = books.find(b => b.id !== editingBookId && ((isbn && b.isbn === isbn) || (b.title === title && b.author === author)));
      const isCompleteRecord = Boolean(category && publishedYear && location);
      if (duplicate) {
        const dupAction = await showDuplicateModal(duplicate);
        if (dupAction === 'stop') return false;
        if (dupAction === 'continue') {
          // User chose to continue scanning — clear fields and restart
          const shouldResumeScan = lastEntryMethod === 'scan';
          clearDraftFields({ keepIsbn: false, keepLocation: true, clearNotices: shouldResumeScan });
          lookupCompleted = false;
          if (shouldResumeScan) { scannerIntent = 'entry'; startScanner(); }
          else { els.isbn.focus(); }
          return false;
        }
      }

      rememberLocationPreset(location);

      if (editingBookId) {
        const target = books.find(b => b.id === editingBookId);
        if (!target) throw new Error('未找到要编辑的图书');
        target.isbn = isbn;
        target.title = title;
        target.author = author;
        target.category = category;
        target.readingStatus = readingStatus;
        target.readingProgress = readingProgress;
        target.publishedYear = publishedYear;
        target.location = location;
        target.description = description;
        target.notes = notes;
        target.bookLang = bookLang;
        target.metadataSources = metadataSources;
        if (coverUrl) target.coverUrl = coverUrl;
        target.status = isCompleteRecord ? 'in_library' : 'to_be_sorted';
        target.updatedAt = new Date().toISOString();
        saveBooks(books);
        els.manualNotice.innerHTML = makeNotice('ok', `已更新：${title}${isCompleteRecord ? '（已入库）' : '（信息待补充）'}`);
        editingBookId = null;
        els.saveBtn.textContent = '导入库中';
        clearDraftFields({ keepIsbn: false, keepLocation: false, clearNotices: false });
        setPage(editReturnPage, { mode: editReturnMode });
        setTimeout(() => window.scrollTo({ top: editReturnScrollY, behavior: 'auto' }), 0);
        return true;
      } else {
        books.push({
          id: makeId(), isbn, title, author, category, readingStatus, readingProgress, publishedYear, location, description, notes, bookLang, metadataSources,
          ...(coverUrl ? { coverUrl } : {}),
          status: isCompleteRecord ? 'in_library' : 'to_be_sorted', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
        });
        saveBooks(books);
        entrySessionCount += 1;
        els.manualNotice.innerHTML = makeNotice('ok', `已导入：${title}${isCompleteRecord ? '（已入库）' : '（信息待补充，后续可完善）'}。继续下一本吧。`);
      }
      const shouldResumeScan = !wasEditing && lastEntryMethod === 'scan';
      clearDraftFields({ keepIsbn: false, keepLocation: true, clearNotices: shouldResumeScan });
      lookupCompleted = false;
      if (shouldResumeScan) {
        scannerIntent = 'entry';
        startScanner();
      } else {
        els.isbn.focus();
      }
      render();
      return true;
    }

        if (action === 'entry') { entrySessionCount = 0; setPage('home', { mode: 'entry' }); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        if (action === 'organize') setPage('organize');

        const action = settingAction.dataset.action;

      URL.revokeObjectURL(url);

    // Pattern-based category rules (checked in order after exact match fails)

    // Junk categories that should be discarded entirely
    const JUNK_CAT_RE = /^(China|Chinese|Japan|Japanese|Korea|Korean|English|French|German|America|United States|Europe|Asia|Africa|India|Australia|Canadian|British|Irish|Russian|Latin|Italian|Spanish|Portuguese|Swedish|Norwegian|Danish|Dutch|Polish|Arab|Middle East|Beijing|Shanghai|Tokyo|Seoul|London|New York|Paris|Berlin|General|Collections|Miscellaneous|Nonfiction|Fiction and nonfiction|Accessible book|Protected DAISY|Internet Archive Wishlist|In library|OverDrive|Large type|Lending library|Place|People|Geography|Social|Will|Grief|Belief|Doubt|Influence|Totalitarian)(\b.*)?$/i;
    const JUNK_CAT_RE2 = /language\s+materials|[A-Z][a-z]+\s+(Xian|County|City|Province|Region|Prefecture)\b|[A-Z][a-z]+,\s*[A-Z]|\d{2,4}(th|st|nd|rd)?\s*(century|Century)/i;

    function translateCategory(cat, _lang) {
      if (!cat) return '';
      // Already Chinese — keep as-is
      if (/[\u4e00-\u9fff]/.test(cat)) return cat;
      const trimmed = cat.trim();
      // 1. Exact match first (handles "Chinese fiction" → "中国小说" etc.)
      const key = trimmed.toLowerCase();
      if (EN_ZH_CATEGORY[key]) return EN_ZH_CATEGORY[key];
      // 2. Pattern match (handles "Biography & Autobiography" → "传记" etc.)
      for (const [re, zh] of CATEGORY_PATTERNS) {
        if (re.test(trimmed)) return zh;
      }
      // 3. Junk filter (only after translation attempts fail)
      if (JUNK_CAT_RE.test(trimmed) || JUNK_CAT_RE2.test(trimmed)) return '';
      // 4. If still English and no match, return empty (will show as 未分类)
      if (/^[a-zA-Z\s&,.()\-\/]+$/.test(trimmed)) return '';
      return trimmed;
    }

    // Category quality filter — used in both render() and fillBookMetaByIsbn
    function isGoodCategory(raw) {
      const s = String(raw || '').trim();
      if (!s) return false;
      if (/[=:]/.test(s)) return false;
      if (/,\s*$/.test(s)) return false;
      if (/^\d{4}\s*[-–]\s*\d{4}$/.test(s)) return false;
      if (/^[A-Z]{1,3}$/.test(s)) return false;
      // Use translateCategory as the authority — if it returns non-empty, it's good
      const translated = translateCategory(s);
      return Boolean(translated);
    }
    function pickBestCategory(items) {
      for (const raw of items) {
        const s = String(raw?.name || raw || '').split(' / ')[0].trim().slice(0, 32);
        if (isGoodCategory(s)) return translateCategory(s);
      }
      return '';
    }

    async function fillBookMetaByIsbn(isbn, noticeTarget = 'scan', sourceLabel = '扫码成功') {
      const setNotice = (kind, text) => {
        const html = makeNotice(kind, text);
        if (noticeTarget === 'scan') els.scanNotice.innerHTML = html;
        else els.manualNotice.innerHTML = html;
      };

      // Infer preferred language from ISBN prefix
      function inferLang(isbnStr) {
        const c = String(isbnStr || '').replace(/[^0-9Xx]/g, '');
        if (c.startsWith('9787') || c.startsWith('9797')) return 'zh';
        if (c.startsWith('9784') || c.startsWith('9794')) return 'ja';
        if (c.startsWith('97889') || c.startsWith('9789')) return 'ko';
        if (c.startsWith('9782')) return 'fr';
        if (c.startsWith('9783')) return 'de';
        return null;
      }

      // Extract data from each API into a neutral object
      function parseOpenLibrary(book) {
        if (!book) return null;
        const title = book.title || '';
        const authors = (Array.isArray(book.authors) ? book.authors.map(a => a.name) : []).filter(Boolean);
        const subjects = Array.isArray(book.subjects) ? book.subjects : [];
        const category = pickBestCategory(subjects);
        const description = Array.isArray(book.excerpts) && book.excerpts.length ? String(book.excerpts[0]?.text || '').slice(0, 280) : '';
        if (!description && typeof book.description === 'string') {
          // Some OL entries have description as a string instead of excerpts
        }
        const desc = description || (typeof book.description === 'object' ? String(book.description?.value || '').slice(0, 280) : typeof book.description === 'string' ? book.description.slice(0, 280) : '');
        const yearMatch = String(book.publish_date || '').match(/(19|20)\d{2}/);
        const year = yearMatch ? yearMatch[0] : '';
        const langKey = Array.isArray(book.languages) && book.languages.length ? String(book.languages[0]?.key || '').split('/').pop() : '';
        // OL cover — try cover object first, fall back to cover_id URL
        let coverThumb = book.cover ? (book.cover.large || book.cover.medium || book.cover.small || '') : '';
        if (!coverThumb && book.cover_i) coverThumb = `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg`;
        return { title, authors, category, description: desc, year, lang: langKey || null, coverUrl: coverThumb };
      }

      function parseGoogleBooks(item) {
        if (!item) return null;
        const info = item.volumeInfo || {};
        const title = info.title || '';
        const authors = Array.isArray(info.authors) ? info.authors : [];
        const cats = Array.isArray(info.categories) ? info.categories : [];
        const category = pickBestCategory(cats);
        const description = info.description ? String(info.description).replace(/<[^>]+>/g, '').slice(0, 280) : '';
        const yearMatch = String(info.publishedDate || '').match(/(19|20)\d{2}/);
        const year = yearMatch ? yearMatch[0] : '';
        const lang = info.language || null;
        // Google Books thumbnail — ensure HTTPS, improve quality, filter placeholders
        const thumb = info.imageLinks?.thumbnail || info.imageLinks?.smallThumbnail || '';
        let coverUrl = thumb ? thumb.replace(/^http:/, 'https:').replace('&edge=curl', '').replace('zoom=1', 'zoom=2') : '';
        if (isGBPlaceholderUrl(coverUrl)) coverUrl = '';
        return { title, authors, category, description, year, lang, coverUrl };
      }

      // Check if a Google Books volume likely has no real cover
      function isGBPlaceholderUrl(url) {
        if (!url) return true;
        // Volume IDs ending with ACAAJ typically have no real cover image
        const m = url.match(/[?&]id=([^&]+)/);
        return m && m[1].endsWith('ACAAJ');
      }

      // Extract cover from ANY Google Books item (not just best-language match)
      function extractAnyCover(gbData) {
        if (!gbData?.items?.length) return '';
        for (const item of gbData.items) {
          const imgs = item?.volumeInfo?.imageLinks;
          if (imgs?.thumbnail || imgs?.smallThumbnail) {
            const url = (imgs.thumbnail || imgs.smallThumbnail).replace(/^http:/, 'https:').replace('&edge=curl', '').replace('zoom=1', 'zoom=2');
            if (!isGBPlaceholderUrl(url)) return url;
          }
        }
        return '';
      }

      function parseCrossref(item) {
        if (!item) return null;
        const title = Array.isArray(item.title) && item.title[0] ? item.title[0] : '';
        const authors = Array.isArray(item.author)
          ? item.author.map(a => [a.given, a.family].filter(Boolean).join(' ')).filter(Boolean)
          : [];
        const yearVal = item.published?.['date-parts']?.[0]?.[0] || item.published_print?.['date-parts']?.[0]?.[0];
        const year = yearVal ? String(yearVal) : '';
        return { title, authors, category: '', description: '', year, lang: null, coverUrl: '' };
      }

      // Open Library Search API — more reliable cover_i and broader data
      function parseOLSearch(data) {
        if (!data?.docs?.length) return null;
        const doc = data.docs[0];
        const title = doc.title || '';
        const authors = Array.isArray(doc.author_name) ? doc.author_name : [];
        const subjects = Array.isArray(doc.subject) ? doc.subject : [];
        const category = pickBestCategory(subjects);
        const year = doc.first_publish_year ? String(doc.first_publish_year) : '';
        const langs = Array.isArray(doc.language) ? doc.language : [];
        const lang = langs.includes('chi') ? 'zh' : langs.includes('jpn') ? 'ja' : langs.includes('kor') ? 'ko' : langs[0] || null;
        // cover_i → reliable cover URL (much better than ISBN-based)
        const coverUrl = doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg` : '';
        return { title, authors, category, description: '', year, lang, coverUrl };
      }

      // Merge multiple results, preferring language-matched sources
      function mergeResults(results, preferredLang) {
        // results is array of {source, data} where data may be null
        const valid = results.filter(r => r.data && r.data.title);

        // Pick best item per field
        const pick = (getter) => {
          // First try language-preferred sources
          if (preferredLang) {
            const langMatch = valid.find(r => r.data.lang && String(r.data.lang).startsWith(preferredLang));
            if (langMatch) { const v = getter(langMatch.data); if (v) return { value: v, source: langMatch.source, lang: langMatch.data.lang }; }
          }
          // Then any source with a value
          for (const r of valid) {
            const v = getter(r.data); if (v) return { value: v, source: r.source, lang: r.data.lang };
          }
          return null;
        };

        const titleR = pick(d => d.title);
        const authorsR = pick(d => d.authors?.length ? d.authors : null);
        const categoryR = pick(d => d.category);
        const descR = pick(d => d.description);
        const yearR = pick(d => d.year);
        const coverR = pick(d => d.coverUrl);
        const langR = pick(d => d.lang);

        const sourceSet = new Set();
        [titleR, authorsR, categoryR, yearR].forEach(r => r && sourceSet.add(r.source));

        return {
          title: titleR?.value || '',
          authors: authorsR?.value || [],
          category: categoryR?.value || '',
          description: descR?.value || '',
          year: yearR?.value || '',
          coverUrl: coverR?.value || '',
          lang: langR?.value || preferredLang || null,
          sources: [...sourceSet]
        };
      }

      const compact = String(isbn).replace(/[^0-9Xx]/g, '');
      const altIsbn = compact.length === 13 ? isbn13to10(compact) : isbn10to13(compact);
      const preferredLang = inferLang(compact);

      setNotice('warn', `已识别 ISBN：${isbn}，正在查询…`);

      try {
        const _gb = GBOOKS_PROXY;

        // Helper: apply data to form
        function applyToForm(m) {
          if (m.title) els.title.value = m.title;
          if (m.authors.length) els.author.value = m.authors.join(', ');
          if (m.category && !els.category.value) els.category.value = m.category;
          if (m.year && !els.publishedYear.value) els.publishedYear.value = m.year;
          if (m.description && els.description && !els.description.value) els.description.value = m.description;
          markAutoFilled('title', 'author', 'category', 'publishedYear');
          if (m.coverUrl) els.manualCard.dataset.pendingCoverUrl = m.coverUrl;
          if (m.lang) els.manualCard.dataset.bookLang = m.lang;
          if (m.sources.length) els.manualCard.dataset.bookSources = m.sources.join(' / ');
        }

        function bestGbItem(data) {
          if (!data?.items?.length) return null;
          if (preferredLang) {
            return data.items.find(i => String(i?.volumeInfo?.language || '').startsWith(preferredLang)) || data.items[0];
          }
          return data.items[0];
        }

        // ── Phase 1: Fast path — Google Books + Bookcover in parallel (~300-800ms) ──
        const gbUrl = `${_gb}/?q=isbn:${encodeURIComponent(compact)}&maxResults=5`;
        const gbLangUrl = preferredLang
          ? `${_gb}/?q=isbn:${encodeURIComponent(compact)}&langRestrict=${encodeURIComponent(preferredLang)}&maxResults=5`
          : null;
        const bcUrl = `https://bookcover.longitood.com/bookcover/${encodeURIComponent(compact)}`;

        const phase1Urls = [gbUrl, gbLangUrl, bcUrl].filter(Boolean);
        const phase1 = await Promise.allSettled(phase1Urls.map(u =>
          fetch(u).then(r => r.ok ? r.json() : null).catch(() => null)
        ));

        const gbRes = phase1[0].status === 'fulfilled' ? phase1[0].value : null;
        const gbLangRes = gbLangUrl ? (phase1[1].status === 'fulfilled' ? phase1[1].value : null) : null;
        const bcIdx = gbLangUrl ? 2 : 1;
        const bcCover = (phase1[bcIdx]?.status === 'fulfilled' ? phase1[bcIdx].value : null)?.url || '';

        const gbParsed = parseGoogleBooks(bestGbItem(gbRes));
        const gbLangParsed = parseGoogleBooks(bestGbItem(gbLangRes));

        const fastResult = [];
        if (gbLangParsed) fastResult.push({ source: 'Google Books', data: gbLangParsed });
        if (gbParsed) fastResult.push({ source: 'Google Books', data: gbParsed });

        let merged = mergeResults(fastResult, preferredLang);
        if (!merged.coverUrl) merged.coverUrl = bcCover || extractAnyCover(gbLangRes) || extractAnyCover(gbRes) || '';
        if (merged.category) merged.category = translateCategory(merged.category);

        // Must have title + author + category to show results instantly
        const hasEnough = Boolean(merged.title && merged.authors.length && merged.category);

        if (hasEnough) {
          // ✅ Fast path — show results immediately, enrich in background
          applyToForm(merged);

          // Background enrichment (fills gaps without blocking user)
          (async () => {
            try {
              const olSearchUrl = `https://openlibrary.org/search.json?isbn=${encodeURIComponent(compact)}&fields=title,author_name,subject,first_publish_year,cover_i,language&limit=3`;
              const enrichUrls = [olSearchUrl];
              if (altIsbn) enrichUrls.push(`${_gb}/?q=isbn:${encodeURIComponent(altIsbn)}&maxResults=3`);
              const enrichRes = await Promise.allSettled(enrichUrls.map(u =>
                fetch(u).then(r => r.ok ? r.json() : null).catch(() => null)
              ));
              const olSearchParsed = parseOLSearch(enrichRes[0].status === 'fulfilled' ? enrichRes[0].value : null);
              if (!els.category.value && olSearchParsed?.category) {
                const cat = translateCategory(olSearchParsed.category);
                if (cat) { els.category.value = cat; markAutoFilled('category'); }
              }
              if (!els.publishedYear.value && olSearchParsed?.year) {
                els.publishedYear.value = olSearchParsed.year; markAutoFilled('publishedYear');
              }
              if (!els.manualCard.dataset.pendingCoverUrl) {
                const fallback = olSearchParsed?.coverUrl || '';
                if (fallback) els.manualCard.dataset.pendingCoverUrl = fallback;
              }
            } catch (_) {}
          })();

        } else {
          // ── Slow path: Google Books insufficient — query all sources ──
          setNotice('warn', `正在查询更多数据源…`);

          const slowUrls = [
            `https://openlibrary.org/api/books?bibkeys=ISBN:${encodeURIComponent(compact)}&format=json&jscmd=data`,
            `https://openlibrary.org/search.json?isbn=${encodeURIComponent(compact)}&fields=title,author_name,subject,first_publish_year,cover_i,language&limit=3`,
            `https://api.crossref.org/works?filter=isbn:${encodeURIComponent(compact)}&rows=3`,
            altIsbn ? `${_gb}/?q=isbn:${encodeURIComponent(altIsbn)}&maxResults=3` : null,
            altIsbn ? `https://openlibrary.org/api/books?bibkeys=ISBN:${encodeURIComponent(altIsbn)}&format=json&jscmd=data` : null,
            preferredLang === 'zh' ? `${_gb}/?q=isbn:${encodeURIComponent(compact)}&langRestrict=zh&printType=books&maxResults=5` : null
          ].filter(Boolean);

          const slowRes = await Promise.allSettled(slowUrls.map(u =>
            fetch(u).then(r => r.ok ? r.json() : null).catch(() => null)
          ));
          const val = (i) => slowRes[i]?.status === 'fulfilled' ? slowRes[i].value : null;

          let si = 0;
          const olRes = val(si++);
          const olSearchRes = val(si++);
          const crRes = val(si++);
          const gbAltRes = altIsbn ? val(si++) : null;
          const olAltRes = altIsbn ? val(si++) : null;
          const gbTitleRes = preferredLang === 'zh' ? val(si++) : null;

          const olData = olRes ? (olRes[`ISBN:${compact}`] || null) : null;
          const olAltData = olAltRes ? (olAltRes[`ISBN:${altIsbn}`] || null) : null;
          const olParsed = parseOpenLibrary(olData) || parseOpenLibrary(olAltData);
          const olSearchParsed = parseOLSearch(olSearchRes);
          const gbAltParsed = parseGoogleBooks(bestGbItem(gbAltRes));
          const gbTitleParsed = parseGoogleBooks(bestGbItem(gbTitleRes));
          const crParsed = parseCrossref(crRes?.message?.items?.[0]);

          const allResults = [...fastResult];
          if (olParsed) allResults.push({ source: 'Open Library', data: olParsed });
          if (olSearchParsed) allResults.push({ source: 'Open Library', data: olSearchParsed });
          if (gbAltParsed) allResults.push({ source: 'Google Books', data: gbAltParsed });
          if (gbTitleParsed) allResults.push({ source: 'Google Books', data: gbTitleParsed });
          if (crParsed) allResults.push({ source: 'Crossref', data: crParsed });

          merged = mergeResults(allResults, preferredLang);
          if (!merged.coverUrl) merged.coverUrl = bcCover || extractAnyCover(gbAltRes) || extractAnyCover(gbTitleRes) || '';
          if (!merged.coverUrl) merged.coverUrl = `https://covers.openlibrary.org/b/isbn/${compact}-M.jpg`;
          if (merged.category) merged.category = translateCategory(merged.category);
          applyToForm(merged);
        }

        const titleFilled = Boolean(els.title.value);
        const anyFilled = Boolean(els.title.value || els.author.value || els.category.value || els.publishedYear.value);
        if (!anyFilled) {
          setNotice('warn', `${sourceLabel}：${isbn}，暂未查到书目信息，请手动补充后保存。`);
          return { found: false };
        }

        const parts = [
          els.title.value,
          els.author.value,
          merged.category,
          merged.year
        ].filter(Boolean).map(escapeHtml);
        const srcText = merged.sources.length ? `（来源：${merged.sources.join(' / ')}${merged.lang ? `；${merged.lang}` : ''}）` : '';
        setNotice('ok', `${sourceLabel}：${isbn} · ${parts.join(' · ')} ${escapeHtml(srcText)}`);
        return { found: true, language: merged.lang, sources: merged.sources };

      } catch (e) {
        const partialFound = Boolean(els.title.value || els.author.value || els.category.value || els.publishedYear.value);
        setNotice('warn', `${sourceLabel}：${isbn}，${partialFound ? '已拿到部分书目信息，审阅后可导入。' : '联网查询失败，请手动补充后保存。'}`);
        return { found: partialFound, error: e };
      }
    }

    function showToast(text) { showScanToast(text); }
    function showScanToast(text) {
      const existing = document.querySelector('.scan-toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'scan-toast';
      toast.textContent = text;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function markAutoFilled(...fieldIds) {
      fieldIds.forEach(id => {
        const el = els[id];
        if (el && el.value) {
          el.classList.add('auto-filled');
          el.addEventListener('input', function handler() { el.classList.remove('auto-filled'); el.removeEventListener('input', handler); }, { once: true });
        }
      });
    }

    function handleScanResult(rawValue) {
      stopScanner();
      const isbn = rawValue.replace(/[^0-9Xx]/g, '');
      if (isbn.length === 10 || isbn.length === 13) {
        showScanToast(`✓ 扫到了！ISBN: ${isbn}`);
        if (scannerIntent === 'search') {
          selectedCategoryFilter = '';
          els.searchInput.value = isbn;
          setPage('search');
          render();
          els.scanNotice.innerHTML = makeNotice('ok', `已扫码搜索 ISBN：${escapeHtml(isbn)}`);
          return;
        }
        els.isbn.value = isbn;
        els.isbn.classList.add('auto-filled');
        fillBookMetaByIsbn(isbn, 'scan');
      } else {
        els.scanNotice.innerHTML = makeNotice('warn', `识别到条码但非 ISBN 格式（${escapeHtml(rawValue)}），请手动录入 ISBN。`);
        setEntryMode('manual');
      }
    }

    let torchOn = false;
    const BEST_CAM_KEY = 'lib:best-camera:v1';

    // Select the best camera for barcode scanning (prefer macro/shortest focus distance)
    // Caches result in localStorage so subsequent scans are instant.
    async function pickBestCamera() {
      // Return cached camera if available
      const cached = localStorage.getItem(BEST_CAM_KEY);
      if (cached) {
        try {
          const { deviceId } = JSON.parse(cached);
          // Verify it still exists
          const devices = await navigator.mediaDevices.enumerateDevices();
          if (devices.some(d => d.deviceId === deviceId)) return { deviceId, fromCache: true };
        } catch (_) {}
        localStorage.removeItem(BEST_CAM_KEY);
      }

      try {
        // First get permission with any rear camera
        const tempStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } }
        });
        tempStream.getTracks().forEach(t => t.stop());

        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoCams = devices.filter(d => d.kind === 'videoinput');
        if (videoCams.length <= 1) {
          const id = videoCams[0]?.deviceId || null;
          if (id) localStorage.setItem(BEST_CAM_KEY, JSON.stringify({ deviceId: id }));
          return { deviceId: id, fromCache: false };
        }

        // Probe each camera for capabilities (focus distance, torch, etc.)
        let best = null;
        let bestScore = -Infinity;
        for (const cam of videoCams) {
          try {
            const probe = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: cam.deviceId } } });
            const track = probe.getVideoTracks()[0];
            const caps = track.getCapabilities ? track.getCapabilities() : {};
            probe.getTracks().forEach(t => t.stop());

            const label = (cam.label || '').toLowerCase();
            const facing = caps.facingMode || [];

            // Skip front-facing cameras
            if (facing.includes('user') || label.includes('front') || label.includes('facetime')) continue;

            let score = 0;
            if (caps.focusDistance && caps.focusDistance.min !== undefined) {
              score += Math.max(0, 100 - (caps.focusDistance.min * 500));
            }
            if (label.includes('ultra') || label.includes('wide') || label.includes('macro') || label.includes('0.5')) score += 50;
            if (caps.torch) score += 10;
            if (caps.width && caps.width.max) score += caps.width.max / 10000;
            if (facing.includes('environment') || label.includes('back') || label.includes('rear')) score += 20;

            if (score > bestScore) { bestScore = score; best = cam.deviceId; }
          } catch (_) {}
        }
        if (best) localStorage.setItem(BEST_CAM_KEY, JSON.stringify({ deviceId: best }));
        return { deviceId: best, fromCache: false };
      } catch (_) {
        return { deviceId: null, fromCache: false };
      }
    }

    // Toggle flashlight
    function toggleTorch() {
      if (!scannerStream) return;
      const track = scannerStream.getVideoTracks()[0];
      if (!track) return;
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if (!caps.torch) {
        els.scanNotice.innerHTML = makeNotice('warn', '该摄像头不支持闪光灯');
        return;
      }
      torchOn = !torchOn;
      track.applyConstraints({ advanced: [{ torch: torchOn }] }).catch(() => { torchOn = false; });
      els.torchBtn.textContent = torchOn ? '🔦 开' : '🔦 关';
      els.torchBtn.classList.toggle('active', torchOn);
    }

    els.torchBtn.onclick = toggleTorch;

    // Pro mode panel
    let proVisible = false;
    els.proBtn.onclick = async () => {
      proVisible = !proVisible;
      els.proPanelBox.style.display = proVisible ? '' : 'none';
      els.proBtn.classList.toggle('active', proVisible);
      if (!proVisible) return;

      // Populate camera list (rear cameras only, friendly labels)
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d => {
          if (d.kind !== 'videoinput') return false;
          const l = (d.label || '').toLowerCase();
          // Filter out front/selfie cameras
          return !l.includes('front') && !l.includes('facetime') && !l.includes('selfie') && !l.includes('前置');
        });
        const currentDeviceId = scannerStream?.getVideoTracks()[0]?.getSettings?.()?.deviceId;
        els.proCameraSelect.innerHTML = cams.map((c, i) => {
          const raw = c.label || '';
          // Friendly label translation
          let label = raw;
          const rl = raw.toLowerCase();
          if (rl.includes('ultra wide') || rl.includes('超广角')) label = '超广角（微距）';
          else if (rl.includes('telephoto') || rl.includes('长焦')) label = '长焦';
          else if (rl.includes('wide') || rl.includes('广角')) label = '主摄（广角）';
          else if (rl.includes('back') || rl.includes('rear') || rl.includes('后置')) label = `后置 ${i + 1}`;
          else if (!raw) label = `镜头 ${i + 1}`;
          return `<option value="${c.deviceId}" ${c.deviceId === currentDeviceId ? 'selected' : ''}>${label}</option>`;
        }).join('');
      } catch (_) {}

      // Show focus controls based on current camera capabilities
      if (scannerStream) {
        const track = scannerStream.getVideoTracks()[0];
        const caps = track?.getCapabilities ? track.getCapabilities() : {};
        if (caps.focusDistance) {
          els.proFocusDistRow.style.display = els.proFocusSelect.value === 'manual' ? '' : 'none';
          els.proFocusDist.min = caps.focusDistance.min;
          els.proFocusDist.max = caps.focusDistance.max;
          els.proFocusDist.step = (caps.focusDistance.max - caps.focusDistance.min) / 100;
          const settings = track.getSettings?.() || {};
          els.proFocusDist.value = settings.focusDistance || caps.focusDistance.min;
        } else {
          els.proFocusDistRow.style.display = 'none';
        }
      }
    };

    els.proFocusSelect.onchange = () => {
      els.proFocusDistRow.style.display = els.proFocusSelect.value === 'manual' ? '' : 'none';
      // Apply focus mode change immediately
      if (!scannerStream) return;
      const track = scannerStream.getVideoTracks()[0];
      if (!track) return;
      try {
        if (els.proFocusSelect.value === 'manual') {
          track.applyConstraints({ advanced: [{ focusMode: 'manual', focusDistance: parseFloat(els.proFocusDist.value) }] });
        } else {
          track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
        }
      } catch (_) {}
    };

    els.proFocusDist.oninput = () => {
      const val = parseFloat(els.proFocusDist.value);
      const label = document.getElementById('proFocusDistLabel');
      if (label) label.textContent = val < 0.1 ? `${Math.round(val * 100)}cm` : `${val.toFixed(1)}m`;
      if (!scannerStream) return;
      const track = scannerStream.getVideoTracks()[0];
      if (!track) return;
      try {
        track.applyConstraints({ advanced: [{ focusMode: 'manual', focusDistance: val }] });
      } catch (_) {}
    };

    els.proApplyBtn.onclick = async () => {
      const selectedDeviceId = els.proCameraSelect.value;
      const focusMode = els.proFocusSelect.value;

      // Save as preferred camera
      localStorage.setItem(BEST_CAM_KEY, JSON.stringify({ deviceId: selectedDeviceId }));

      // Restart scanner with selected camera
      stopScanner();
      proVisible = false;
      await startScanner();

      // Apply focus after camera starts
      if (scannerStream && focusMode === 'manual') {
        const track = scannerStream.getVideoTracks()[0];
        try {
          await track.applyConstraints({ advanced: [{ focusMode: 'manual', focusDistance: parseFloat(els.proFocusDist.value) }] });
        } catch (_) {}
      }
    };

    function showCameraDetectAnim() {
      els.scannerBox.style.display = 'block';
      els.scannerVideo.style.display = 'none';
      const overlay = document.createElement('div');
      overlay.id = 'camDetectOverlay';
      overlay.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;background:var(--bg);border-radius:16px;gap:16px">
          <div style="font-size:48px;animation:camBounce 1.2s ease-in-out infinite">🔍📷</div>
          <div style="color:var(--muted);font-size:14px;font-weight:600">正在寻找最佳镜头…</div>
          <div style="color:var(--muted);font-size:12px;opacity:.7">首次使用需要检测，之后会记住</div>
        </div>`;
      els.scannerBox.appendChild(overlay);
    }
    function hideCameraDetectAnim() {
      els.scannerVideo.style.display = '';
      const overlay = document.getElementById('camDetectOverlay');
      if (overlay) overlay.remove();
    }

    async function startScanner() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        els.scanNotice.innerHTML = makeNotice('err', '该浏览器不支持摄像头访问（需要 HTTPS 或本地环境）。请手动录入 ISBN。');
        return;
      }

      torchOn = false;
      els.torchBtn.textContent = '🔦 关';
      els.torchBtn.classList.remove('active');

      // Check if we need first-time camera detection
      const hasCachedCam = !!localStorage.getItem(BEST_CAM_KEY);
      if (!hasCachedCam) {
        showCameraDetectAnim();
        render();
      }

      // Smart camera selection — prefer macro/shortest focus distance (cached after first use)
      const { deviceId: bestDeviceId, fromCache } = await pickBestCamera();
      if (!hasCachedCam) hideCameraDetectAnim();

      const videoConstraints = bestDeviceId
        ? { deviceId: { exact: bestDeviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        : { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } };

      // Path 1: Native BarcodeDetector (Chrome, iOS 17.4+)
      if ('BarcodeDetector' in window) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints });
          scannerStream = stream;
          const video = els.scannerVideo;
          video.srcObject = stream;
          await video.play();
          scannerActive = true;
          els.scannerBox.style.display = 'block';
          render();

          // Try to enable continuous autofocus for barcode scanning
          const track = stream.getVideoTracks()[0];
          const caps = track.getCapabilities ? track.getCapabilities() : {};
          if (caps.focusMode && caps.focusMode.includes('continuous')) {
            try { await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch (_) {}
          }

          // Show torch button only if supported
          els.torchBtn.style.display = caps.torch ? '' : 'none';

          els.scanNotice.innerHTML = '';

          const detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'itf', 'upc_a', 'upc_e', 'qr_code'] });
          const scan = async () => {
            if (!scannerActive) return;
            try {
              if (video.readyState >= 2) {
                const barcodes = await detector.detect(video);
                if (barcodes.length > 0) { handleScanResult(barcodes[0].rawValue); return; }
              }
            } catch (_) {}
            scannerAnimFrame = requestAnimationFrame(scan);
          };
          scan();
          return;
        } catch (e) {
          const msg = e.name === 'NotAllowedError' ? '摄像头权限被拒绝，请在浏览器设置中允许访问摄像头后重试。'
            : e.name === 'NotFoundError' ? '未检测到摄像头设备。'
            : `摄像头启动失败：${e.message || e.name}`;
          els.scanNotice.innerHTML = makeNotice('err', msg + ' 请手动录入 ISBN。');
          stopScanner();
          return;
        }
      }

      // Path 2: ZXing fallback (iPhone Safari iOS < 17.4, Firefox)
      if (!window.ZXingBrowser || !window.ZXingBrowser.BrowserMultiFormatReader) {
        els.scanNotice.innerHTML = makeNotice('err', '该设备浏览器暂不支持条码扫描，请手动录入 ISBN。');
        return;
      }

      try {
        zxingReader = new window.ZXingBrowser.BrowserMultiFormatReader();
        scannerActive = true;
        els.scannerBox.style.display = 'block';
        render();
        els.scanNotice.innerHTML = '';
        // Use best camera if found, otherwise let ZXing pick
        zxingScanControl = await zxingReader.decodeFromVideoDevice(
          bestDeviceId || null, els.scannerVideo,
          (result, err) => { if (result && result.text) handleScanResult(result.text); }
        );
        // Try to show torch button for ZXing path
        if (els.scannerVideo.srcObject) {
          const track = els.scannerVideo.srcObject.getVideoTracks()[0];
          scannerStream = els.scannerVideo.srcObject;
          const caps = track?.getCapabilities ? track.getCapabilities() : {};
          els.torchBtn.style.display = caps.torch ? '' : 'none';
          if (caps.focusMode && caps.focusMode.includes('continuous')) {
            try { await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch (_) {}
          }
        }
      } catch (e) {
        const msg = e.name === 'NotAllowedError' ? '摄像头权限被拒绝，请在浏览器设置中允许访问摄像头后重试。'
          : e.name === 'NotFoundError' ? '未检测到摄像头设备。'
          : `摄像头启动失败：${e.message || e.name}`;
        els.scanNotice.innerHTML = makeNotice('err', msg + ' 请手动录入 ISBN。');
        stopScanner();
      }
    }

    els.scannerCancelBtn.onclick = stopScanner;
    // ── End Scanner ───────────────────────────────────────────────────────────

    // One-time migration: re-translate all existing categories to Chinese
    (function migrateCategories() {
      const MIGRATION_KEY = 'lib:cat-migration:v3';
      if (localStorage.getItem(MIGRATION_KEY)) return;
      const books = loadBooks();
      let changed = false;
      for (const b of books) {
        if (b.category) {
          const translated = translateCategory(b.category);
          if (translated !== b.category) {
            b.category = translated;
            b.updatedAt = new Date().toISOString();
            changed = true;
          }
        }
      }
      if (changed) saveBooks(books);
      localStorage.setItem(MIGRATION_KEY, Date.now().toString());
    })();

    render();

    // One-time migration: fetch missing/placeholder covers from Bookcover API
    (async function migrateCovers() {
      const COVER_MIG_KEY = 'lib:cover-migration:v2';
      if (localStorage.getItem(COVER_MIG_KEY)) return;
      const books = loadBooks();
      // Need cover: no coverUrl, OR Google Books placeholder URL (often fake "image not available")
      const isGBPlaceholder = (url) => url && url.includes('books.google.com') && url.includes('ACAAJ');
      const needCover = books.filter(b => b.isbn && (!b.coverUrl || isGBPlaceholder(b.coverUrl)));
      if (!needCover.length) { localStorage.setItem(COVER_MIG_KEY, Date.now().toString()); return; }
      let changed = false;
      for (const b of needCover) {
        const isbn = String(b.isbn).replace(/[^0-9Xx]/g, '');
        if (!isbn) continue;
        try {
          const res = await fetch(`https://bookcover.longitood.com/bookcover/${encodeURIComponent(isbn)}`);
          if (res.ok) {
            const data = await res.json();
            if (data.url) { b.coverUrl = data.url; b.updatedAt = new Date().toISOString(); changed = true; }
          }
        } catch (_) {}
        // Small delay to be nice to the API
        await new Promise(r => setTimeout(r, 300));
      }
      if (changed) { saveBooks(books); render(); }
      localStorage.setItem(COVER_MIG_KEY, Date.now().toString());
    })();

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
