<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>毛毛图书管理系统</title>
  <style>
    :root {
      --bg:#0b1020; --bg2:#111935; --card:#151f42; --line:rgba(255,255,255,.09);
      --text:#eef2ff; --muted:#97a3cc; --accent:#6ea8fe; --accent2:#89b9ff;
      --ok:#39d98a; --warn:#ffcc66; --danger:#ff7a7a;
      --safe-bottom: env(safe-area-inset-bottom, 12px);
    }
    * { box-sizing:border-box; }
    body {
      margin:0; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif;
      background:linear-gradient(180deg,var(--bg),var(--bg2));
    }
    .app { max-width:480px; margin:0 auto; min-height:100vh; padding:16px 16px calc(var(--safe-bottom) + 24px); }
    .topbar { display:flex; align-items:center; justify-content:space-between; }
    .pill { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; background:#1a244d; border-radius:999px; color:#c7d5ff; font-size:12px; }
    h1 { margin:12px 0 6px; font-size:28px; }
    .muted { color:var(--muted); }
    .card {
      margin-top:16px; background:rgba(21,31,66,.94); border:1px solid var(--line);
      border-radius:20px; padding:16px; box-shadow:0 12px 36px rgba(0,0,0,.25);
    }
    .segmented { display:flex; gap:8px; background:#0d1533; border-radius:16px; padding:6px; margin-top:14px; }
    .segmented button {
      flex:1; border:0; border-radius:12px; padding:12px; font-size:15px; font-weight:700;
      background:transparent; color:#c8d3ff;
    }
    .segmented button.active { background:var(--accent); color:#091122; }
    .hero { margin-top:14px; padding:16px; border-radius:18px; background:linear-gradient(180deg,#1a2754,#131c3e); border:1px solid var(--line); }
    .hero h2 { margin:0 0 8px; font-size:22px; }
    .hero p { margin:0; color:#c8d3ff; line-height:1.45; }
    .actions { display:flex; gap:10px; margin-top:14px; }
    button.btn {
      width:100%; border:0; border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700;
      cursor:pointer;
    }
    .primary { background:var(--accent); color:#081120; }
    .secondary { background:#26335f; color:#eef2ff; }
    .ghost { background:transparent; color:#eef2ff; border:1px solid var(--line); }
    .section-title { font-size:18px; margin:0 0 10px; }
    .field { margin-top:12px; }
    .field label { display:block; margin-bottom:6px; font-size:14px; color:#d7e0ff; }
    .field input, .field textarea {
      width:100%; border-radius:14px; border:1px solid var(--line); background:#0b1430; color:#eef2ff;
      padding:13px 14px; font-size:16px;
    }
    .input-with-action { position:relative; }
    .input-with-action input { padding-right:54px; }
    .input-action-btn {
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      width:38px; height:38px; border-radius:12px; border:1px solid var(--line); background:#1a244d; color:#eef2ff; font-size:18px;
    }
    .field textarea { min-height:120px; resize:vertical; }
    .hint { font-size:13px; color:var(--muted); margin-top:8px; line-height:1.45; }
    .notice { margin-top:12px; padding:12px 14px; border-radius:14px; font-size:14px; line-height:1.5; }
    .notice.ok { background:rgba(57,217,138,.14); color:#baf5da; }
    .notice.warn { background:rgba(255,204,102,.14); color:#ffe4a6; }
    .notice.err { background:rgba(255,122,122,.14); color:#ffd0d0; }
    .summary { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
    .metric { background:#10193a; border:1px solid var(--line); border-radius:16px; padding:12px; text-align:center; }
    .metric strong { display:block; font-size:22px; }
    .book-list { margin-top:12px; }
    .book-item { padding:12px 0; border-top:1px solid var(--line); position:relative; }
    .book-item:first-child { border-top:0; padding-top:0; }
    .book-item h3 { margin:0 0 4px; font-size:16px; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .chip { display:inline-flex; align-items:center; gap:6px; padding:8px 10px; border-radius:999px; background:#10193a; border:1px solid var(--line); color:#d7e0ff; font-size:13px; }
    .subsection-title { margin:16px 0 8px; font-size:15px; color:#d7e0ff; }
    .book-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .menu-wrap { position:relative; }
    .menu-btn { width:auto !important; padding:8px 10px !important; border-radius:10px !important; background:#10193a; color:#eef2ff; border:1px solid var(--line); font-size:18px; line-height:1; }
    .menu-panel { position:absolute; top:42px; right:0; min-width:132px; background:#10193a; border:1px solid var(--line); border-radius:14px; padding:6px; z-index:10; box-shadow:0 12px 24px rgba(0,0,0,.35); }
    .menu-panel button { width:100%; text-align:left; background:transparent; color:#eef2ff; border:0; border-radius:10px; padding:10px 12px; font-size:14px; }
    .menu-panel button:hover { background:#1a244d; }
    pre { margin:12px 0 0; padding:12px; border-radius:14px; background:#0a1128; color:#d7e0ff; white-space:pre-wrap; word-break:break-word; font-size:12px; }
    .bottom-nav {
      position:sticky; bottom:0; display:flex; gap:8px; margin-top:18px; padding:10px;
      background:rgba(8,12,28,.86); border:1px solid var(--line); border-radius:18px; backdrop-filter:blur(10px);
    }
    .bottom-nav div { flex:1; text-align:center; padding:10px 8px; color:#c8d3ff; font-size:13px; }
    .scanner-box { display:none; margin-top:14px; border-radius:18px; overflow:hidden; position:relative; background:#000; }
    .scanner-video { width:100%; display:block; max-height:300px; object-fit:cover; }
    .scanner-aim { position:absolute; inset:0; pointer-events:none; display:flex; align-items:center; justify-content:center; }
    .scanner-aim-inner { width:220px; height:90px; border:2.5px solid var(--accent); border-radius:10px; box-shadow:0 0 0 9999px rgba(0,0,0,.45); }
    .scanner-cancel { position:absolute; top:10px; right:10px; background:rgba(0,0,0,.65); color:#fff; border:0; border-radius:10px; padding:7px 14px; font-size:14px; cursor:pointer; font-weight:600; }
    .hidden { display:none !important; }
    .bottom-nav button { flex:1; text-align:center; padding:10px 8px; color:#c8d3ff; font-size:13px; background:transparent; border:0; border-radius:12px; }
    .bottom-nav button.active { background:#1a244d; color:#eef2ff; font-weight:700; }
    .cover-card { display:flex; gap:14px; align-items:flex-start; }
    .cover-thumb { width:86px; height:122px; border-radius:14px; object-fit:cover; background:#0b1430; border:1px solid var(--line); }
    .progress-bar { height:8px; border-radius:999px; background:#0b1430; overflow:hidden; margin-top:10px; border:1px solid var(--line); }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),#8bd3ff); }
    .link-btn { background:none; border:0; color:#9cc2ff; padding:0; font:inherit; cursor:pointer; }
    .modal-backdrop { position:fixed; inset:0; background:rgba(3,7,18,.72); display:flex; align-items:flex-end; justify-content:center; padding:16px; z-index:30; }
    .modal-card { width:100%; max-width:480px; max-height:90vh; overflow:auto; background:rgba(21,31,66,.98); border:1px solid var(--line); border-radius:20px; padding:16px; }
    .compact-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .sticky-actions { position:sticky; bottom:0; background:rgba(21,31,66,.98); padding-top:12px; margin-top:14px; }
    .review-card { margin-top:12px; padding:14px; border-radius:16px; background:#10193a; border:1px solid var(--line); }
  </style>
  <script src="./vendor/zxing-browser.min.js"></script>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="pill">📚 毛毛图书管理系统</div>
      <div class="pill" id="modePill">当前模式：扫码</div>
    </div>

    <h1>毛毛图书管理系统</h1>
    <p class="muted">把家里的书一本本收进来，随手查、随手整理，手机上就能完成。</p>

    <div class="card hidden" id="scanSection"></div>

    <div class="card hidden" id="manualCard">
      <h2 class="section-title">录入图书</h2>
      <div class="field">
        <label>ISBN</label>
        <div class="input-with-action">
          <input id="isbn" placeholder="9787111128069" />
          <button class="input-action-btn" id="isbnScanBtn" title="扫码填入 ISBN">📷</button>
        </div>
      </div>
      <div class="scanner-box" id="scannerBox">
        <video id="scannerVideo" autoplay playsinline muted class="scanner-video"></video>
        <div class="scanner-aim"><div class="scanner-aim-inner"></div></div>
        <button class="scanner-cancel" id="scannerCancelBtn">取消</button>
      </div>
      <div id="scanNotice"></div>
      <div class="review-card" id="reviewCard">
        <div class="muted">先输入或扫描 ISBN。系统识别到完整 ISBN 后会自动补全信息，你再审阅并导入库中。</div>
      </div>
      <div class="field">
        <label>书名</label>
        <input id="title" placeholder="例如：计算机程序的构造和解释" />
      </div>
      <div class="field">
        <label>作者</label>
        <input id="author" placeholder="例如：Harold Abelson" />
      </div>
      <div class="compact-grid">
        <div class="field">
          <label>分类</label>
          <input id="category" placeholder="例如：技术 / 小说" />
        </div>
        <div class="field">
          <label>出版年份</label>
          <input id="publishedYear" placeholder="例如：2021" />
        </div>
      </div>
      <div class="field">
        <label>存放位置</label>
        <input id="location" placeholder="例如：客厅书架 / 书房左柜 / 床头" />
        <div class="chips" id="locationPresetChips"></div>
      </div>
      <div class="sticky-actions">
        <div class="actions">
          <button class="btn primary" id="saveBtn">导入库中</button>
        </div>
      </div>
      <div class="hint">建议流程：输入或扫描 ISBN → 自动补全信息 → 审阅/补充 → 导入库中。</div>
      <div id="manualNotice"></div>
    </div>

    <div class="card" id="homeSection">
      <h2 class="section-title">首页</h2>
      <div id="currentReadingCard"></div>
      <h2 class="section-title" style="margin-top:16px">图书概览</h2>
      <div class="summary">
        <div class="metric"><strong id="totalCount">0</strong><span class="muted">总图书</span></div>
        <div class="metric"><strong id="sortCount">0</strong><span class="muted">待整理</span></div>
        <div class="metric"><strong id="inCount">0</strong><span class="muted">已入库</span></div>
      </div>
      <div class="subsection-title">分类分布</div>
      <div class="chips" id="categoryChips"></div>
      <div class="subsection-title">最近新增</div>
      <div class="book-list" id="bookList"></div>
    </div>

    <div class="card hidden" id="searchSection">
      <h2 class="section-title">搜索图书</h2>
      <div class="field">
        <label>关键词</label>
        <input id="searchInput" placeholder="搜书名 / 作者 / ISBN / 分类" />
      </div>
      <div class="chips" id="searchSummary"></div>
      <div class="book-list" id="searchResults"></div>
    </div>

    <div class="card hidden" id="organizeSection">
      <h2 class="section-title">整理图书</h2>
      <div class="actions">
        <button class="btn secondary" id="markAllSortedBtn">全部标记为已入库</button>
        <button class="btn ghost" id="markAllTodoBtn">全部恢复待整理</button>
      </div>
      <div class="subsection-title">待整理列表</div>
      <div class="book-list" id="organizeList"></div>
      <div id="organizeNotice"></div>
    </div>

    <div class="card hidden" id="settingsSection">
      <h2 class="section-title">设置与数据管理</h2>
      <div class="actions">
        <button class="btn secondary" id="exportJsonBtn">导出 JSON</button>
        <button class="btn secondary" id="exportCsvBtn">导出 CSV</button>
      </div>
      <div class="field">
        <label>导入 JSON（把之前导出的内容贴进来）</label>
        <textarea id="importText" placeholder="粘贴 JSON 后，先点“校验导入”，再点“执行导入”"></textarea>
      </div>
      <div class="actions">
        <button class="btn primary" id="validateBtn">校验导入</button>
        <button class="btn ghost" id="importBtn">执行导入</button>
      </div>
      <div id="settingsNotice"></div>
      <pre id="exportOutput">这里会显示导出内容预览…</pre>
    </div>

    <div class="bottom-nav">
      <button id="navHome" class="active">🏠 首页</button>
      <button id="navSearch">🔎 搜索</button>
      <button id="navOrganize">🧹 整理</button>
      <button id="navSettings">⚙️ 设置</button>
    </div>
    <div id="detailModalRoot"></div>
  </div>

  <script>
    const BOOKS_KEY = 'lib:books:v1';
    const META_KEY = 'lib:meta:v1';
    const MODE_KEY = 'lib:home:mode:v1';
    const PAGE_KEY = 'lib:page:v1';
    const ENTRY_KEY = 'lib:entry:v1';
    const LOCATION_PRESETS_KEY = 'lib:location-presets:v1';

    function makeId() {
      try {
        if (globalThis.crypto && typeof globalThis.crypto.randomUUID === 'function') {
          return globalThis.crypto.randomUUID();
        }
      } catch {}
      return `book-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    }
    function loadBooks() {
      try { return JSON.parse(localStorage.getItem(BOOKS_KEY) || '[]'); }
      catch { return []; }
    }
    function loadMeta() {
      try { return JSON.parse(localStorage.getItem(META_KEY) || '{"schemaVersion":1,"updatedAt":"1970-01-01T00:00:00.000Z"}'); }
      catch { return { schemaVersion: 1, updatedAt: new Date(0).toISOString() }; }
    }
    function saveBooks(books) {
      const meta = { ...loadMeta(), schemaVersion: 1, updatedAt: new Date().toISOString() };
      localStorage.setItem(BOOKS_KEY, JSON.stringify(books));
      localStorage.setItem(META_KEY, JSON.stringify(meta));
    }
    function loadLocationPresets() {
      try { return JSON.parse(localStorage.getItem(LOCATION_PRESETS_KEY) || '[]'); }
      catch { return []; }
    }
    function rememberLocationPreset(value) {
      const v = String(value || '').trim();
      if (!v) return;
      const next = [v, ...loadLocationPresets().filter(item => item !== v)].slice(0, 8);
      localStorage.setItem(LOCATION_PRESETS_KEY, JSON.stringify(next));
    }
    function getMode() { return localStorage.getItem(MODE_KEY) === 'manual' ? 'manual' : 'scan'; }
    function setMode(mode) { localStorage.setItem(MODE_KEY, mode); render(); }
    function getEntryMode() { return localStorage.getItem(ENTRY_KEY) === 'manual' ? 'manual' : 'scan'; }
    function setEntryMode(mode) { localStorage.setItem(ENTRY_KEY, mode); render(); }
    function getPage() {
      const page = localStorage.getItem(PAGE_KEY);
      return ['home', 'search', 'organize', 'settings'].includes(page) ? page : 'home';
    }
    function setPage(page) { localStorage.setItem(PAGE_KEY, page); render(); }
    function makeNotice(kind, text) { return `<div class="notice ${kind}">${text}</div>`; }
    function escapeHtml(v) {
      return String(v ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
    }

    const els = {
      modePill: document.getElementById('modePill'),
      scanNotice: document.getElementById('scanNotice'),
      isbn: document.getElementById('isbn'),
      isbnScanBtn: document.getElementById('isbnScanBtn'),
      title: document.getElementById('title'),
      author: document.getElementById('author'),
      category: document.getElementById('category'),
      readingStatus: null,
      readingProgress: null,
      publishedYear: document.getElementById('publishedYear'),
      location: document.getElementById('location'),
      locationPresetChips: document.getElementById('locationPresetChips'),
      description: null,
      notes: null,
      saveBtn: document.getElementById('saveBtn'),
      manualNotice: document.getElementById('manualNotice'),
      reviewCard: document.getElementById('reviewCard'),
      currentReadingCard: document.getElementById('currentReadingCard'),
      detailModalRoot: document.getElementById('detailModalRoot'),
      totalCount: document.getElementById('totalCount'),
      sortCount: document.getElementById('sortCount'),
      inCount: document.getElementById('inCount'),
      categoryChips: document.getElementById('categoryChips'),
      bookList: document.getElementById('bookList'),
      scanSection: document.getElementById('scanSection'),
      manualCard: document.getElementById('manualCard'),
      homeSection: document.getElementById('homeSection'),
      searchSection: document.getElementById('searchSection'),
      organizeSection: document.getElementById('organizeSection'),
      settingsSection: document.getElementById('settingsSection'),
      searchInput: document.getElementById('searchInput'),
      searchSummary: document.getElementById('searchSummary'),
      searchResults: document.getElementById('searchResults'),
      markAllSortedBtn: document.getElementById('markAllSortedBtn'),
      markAllTodoBtn: document.getElementById('markAllTodoBtn'),
      organizeList: document.getElementById('organizeList'),
      organizeNotice: document.getElementById('organizeNotice'),
      navHome: document.getElementById('navHome'),
      navSearch: document.getElementById('navSearch'),
      navOrganize: document.getElementById('navOrganize'),
      navSettings: document.getElementById('navSettings'),
      exportJsonBtn: document.getElementById('exportJsonBtn'),
      exportCsvBtn: document.getElementById('exportCsvBtn'),
      importText: document.getElementById('importText'),
      validateBtn: document.getElementById('validateBtn'),
      importBtn: document.getElementById('importBtn'),
      settingsNotice: document.getElementById('settingsNotice'),
      exportOutput: document.getElementById('exportOutput'),
      scannerBox: document.getElementById('scannerBox'),
      scannerVideo: document.getElementById('scannerVideo'),
      scannerCancelBtn: document.getElementById('scannerCancelBtn')
    };

    function normalizeReadingStatus(v) {
      const s = String(v || '').trim();
      if (!s) return '想读';
      if (['在读', '正在读'].includes(s)) return '在读';
      if (['读完', '已读完', '已完成'].includes(s)) return '读完';
      return s;
    }

    function coverUrl(book) {
      const isbn = String(book?.isbn || '').replace(/[^0-9Xx]/g, '');
      return isbn ? `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(isbn)}-M.jpg` : '';
    }

    function renderBookRow(b, options = {}) {
      const actionHtml = options.actionHtml || '';
      const showMenu = options.showMenu !== false;
      const metaLine = [b.author || '未知作者', b.category || '未分类', b.isbn || '无 ISBN', normalizeReadingStatus(b.readingStatus || ''), b.status === 'to_be_sorted' ? '待整理' : '已入库'].join(' · ');
      return `
        <div class="book-item">
          <div class="book-head">
            <div>
              <h3><button class="link-btn book-detail-btn" data-id="${escapeHtml(b.id)}">${escapeHtml(b.title || '未命名图书')}</button></h3>
              <div class="muted">${escapeHtml(metaLine)}</div>
            </div>
            ${showMenu ? `<div class="menu-wrap"><button class="menu-btn" data-menu-id="${escapeHtml(b.id)}">⋯</button></div>` : ''}
          </div>
          ${actionHtml}
        </div>`;
    }

    function render() {
      const page = getPage();
      els.modePill.textContent = `当前页面：${page === 'home' ? '首页' : page === 'search' ? '搜索' : page === 'organize' ? '整理' : '设置'}`;

      els.navHome.classList.toggle('active', page === 'home');
      els.navSearch.classList.toggle('active', page === 'search');
      els.navOrganize.classList.toggle('active', page === 'organize');
      els.navSettings.classList.toggle('active', page === 'settings');
      els.scanSection.classList.add('hidden');
      els.manualCard.classList.toggle('hidden', page !== 'home');
      els.homeSection.classList.toggle('hidden', page !== 'home');
      els.searchSection.classList.toggle('hidden', page !== 'search');
      els.organizeSection.classList.toggle('hidden', page !== 'organize');
      els.settingsSection.classList.toggle('hidden', page !== 'settings');

      const currentDraftTitle = String(els.title?.value || '').trim();
      const currentDraftAuthor = String(els.author?.value || '').trim();
      const currentDraftCategory = String(els.category?.value || '').trim();
      const currentDraftYear = String(els.publishedYear?.value || '').trim();
      const currentDraftLocation = String(els.location?.value || '').trim();
      const canImport = Boolean(currentDraftTitle && currentDraftAuthor);
      els.reviewCard.innerHTML = (lookupCompleted || currentDraftTitle || currentDraftAuthor)
        ? `<div><strong>${escapeHtml(currentDraftTitle || '待补充书名')}</strong></div>
           <div class="muted" style="margin-top:6px">${escapeHtml(currentDraftAuthor || '待补充作者')} · ${escapeHtml(currentDraftCategory || '待补充分类')} ${currentDraftYear ? `· ${escapeHtml(currentDraftYear)}` : ''}</div>
           <div class="muted" style="margin-top:6px">${currentDraftLocation ? `存放位置：${escapeHtml(currentDraftLocation)}` : '只要补齐书名和作者，就可以先导入库中；其他缺失信息后续可在整理里继续完善。'}</div>`
        : '<div class="muted">先输入或扫描 ISBN。系统识别到完整 ISBN 后会自动补全信息，你再审阅并导入库中。</div>';
      els.saveBtn.disabled = !(canImport || editingBookId);

      const books = loadBooks();
      els.totalCount.textContent = String(books.length);
      els.sortCount.textContent = String(books.filter(b => b.status === 'to_be_sorted').length);
      els.inCount.textContent = String(books.filter(b => b.status === 'in_library').length);

      const currentReading = books.find(b => normalizeReadingStatus(b.readingStatus) === '在读') || null;
      els.currentReadingCard.innerHTML = currentReading
        ? `<div class="cover-card">
            <img class="cover-thumb" src="${escapeHtml(coverUrl(currentReading))}" alt="封面" onerror="this.style.display='none'" />
            <div style="flex:1">
              <div class="pill">📖 现在在读</div>
              <h3 style="margin:10px 0 6px">${escapeHtml(currentReading.title || '未命名图书')}</h3>
              <div class="muted">${escapeHtml(currentReading.author || '未知作者')} · ${escapeHtml(currentReading.category || '未分类')}</div>
              <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(0, Math.min(100, Number(currentReading.readingProgress || 0)))}%"></div></div>
              <div class="muted" style="margin-top:8px">阅读进度：${Math.max(0, Math.min(100, Number(currentReading.readingProgress || 0)))}%</div>
            </div>
          </div>`
        : '<div class="muted">还没有标记“在读”的书。你可以在编辑里把某本书设为在读，它就会显示在首页。</div>';

      const categoryCounts = books.reduce((acc, book) => {
        const key = (book.category || '未分类').trim() || '未分类';
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
      const sortedCategories = Object.entries(categoryCounts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-CN'));
      els.categoryChips.innerHTML = sortedCategories.length
        ? sortedCategories.map(([name, count]) => `<div class="chip">${escapeHtml(name)} · ${count}</div>`).join('')
        : '<div class="muted">还没有分类数据，先录入几本书试试。</div>';

      els.bookList.innerHTML = books.length
        ? books.slice().sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || ''))).slice(0, 8).map(b => renderBookRow(b)).join('')
        : '<div class="muted" style="margin-top:12px">还没有图书，先录入一本试试。</div>';

      const locationPresets = loadLocationPresets();
      els.locationPresetChips.innerHTML = locationPresets.length
        ? locationPresets.map(v => `<button class="chip location-preset-btn" data-value="${escapeHtml(v)}">${escapeHtml(v)}</button>`).join('')
        : '<div class="muted">先填写一次存放位置，后面这里就会自动记住。</div>';

      const query = String(els.searchInput?.value || '').trim().toLowerCase();
      const matchedBooks = query
        ? books.filter(b => [b.title, b.author, b.isbn, b.category].some(v => String(v || '').toLowerCase().includes(query)))
        : books;
      els.searchSummary.innerHTML = books.length
        ? `<div class="chip">共 ${books.length} 本</div><div class="chip">匹配 ${matchedBooks.length} 本</div>`
        : '<div class="muted">当前还没有图书数据。</div>';
      els.searchResults.innerHTML = matchedBooks.length
        ? matchedBooks.map(b => renderBookRow(b)).join('')
        : '<div class="muted" style="margin-top:12px">没有找到匹配的图书。</div>';

      const todoBooks = books.filter(b => b.status === 'to_be_sorted');
      els.organizeList.innerHTML = todoBooks.length
        ? todoBooks.map((b, index) => renderBookRow(b, {
            actionHtml: `<div class="actions"><button class="btn secondary organize-done-btn" data-index="${index}">标记为已入库</button></div>`
          })).join('')
        : '<div class="muted" style="margin-top:12px">当前没有待整理图书。</div>';
    }

    function validIsbn(v) {
      const s = (v || '').replace(/[^0-9Xx]/g, '');
      return s.length === 0 || s.length === 10 || s.length === 13;
    }

    function clearDraftFields(options = {}) {
      const keepIsbn = options.keepIsbn === true;
      if (!keepIsbn) els.isbn.value = '';
      els.title.value = '';
      els.author.value = '';
      els.category.value = '';
      els.publishedYear.value = '';
      els.location.value = '';
      if (els.description) els.description.value = '';
      if (els.readingStatus) els.readingStatus.value = '';
      if (els.readingProgress) els.readingProgress.value = '';
      if (els.notes) els.notes.value = '';
      lookupCompleted = false;
    }

    async function lookupCurrentIsbn() {
      const isbn = els.isbn.value.trim();
      const compact = isbn.replace(/[^0-9Xx]/g, '');
      if (!(compact.length === 10 || compact.length === 13)) {
        els.manualNotice.innerHTML = makeNotice('warn', '请先输入有效的 10 位或 13 位 ISBN。');
        return false;
      }
      clearDraftFields({ keepIsbn: true });
      const result = await fillBookMetaByIsbn(isbn, 'manual', '已搜索 ISBN');
      lookupCompleted = Boolean(result?.found || els.title.value.trim() || els.author.value.trim());
      render();
      return lookupCompleted;
    }

    async function saveCurrentBook(options = {}) {
      const isbn = els.isbn.value.trim();
      let title = els.title.value.trim();
      let author = els.author.value.trim();
      let category = els.category.value.trim();
      let readingStatus = normalizeReadingStatus(String(els.readingStatus?.value || '').trim());
      let readingProgress = Math.max(0, Math.min(100, Number(els.readingProgress?.value || 0)));
      let publishedYear = els.publishedYear.value.trim();
      let location = els.location.value.trim();
      let description = String(els.description?.value || '').trim();
      let notes = String(els.notes?.value || '').trim();

      if (!validIsbn(isbn)) {
        els.manualNotice.innerHTML = makeNotice('err', 'ISBN 格式不合法，请输入 10 位或 13 位。');
        return false;
      }

      if (!title && (isbn.replace(/[^0-9Xx]/g, '').length === 10 || isbn.replace(/[^0-9Xx]/g, '').length === 13)) {
        await fillBookMetaByIsbn(isbn, 'manual', '已识别 ISBN');
        lookupCompleted = true;
        title = els.title.value.trim();
        author = els.author.value.trim();
        category = els.category.value.trim();
        publishedYear = els.publishedYear.value.trim();
        description = String(els.description?.value || '').trim();
      }

      if (!title || !author) {
        els.manualNotice.innerHTML = makeNotice('err', '请至少补齐书名和作者。其他缺失信息可以后续再完善。');
        return false;
      }

      const books = loadBooks();
      const duplicate = books.find(b => b.id !== editingBookId && ((isbn && b.isbn === isbn) || (b.title === title && b.author === author)));
      if (duplicate) {
        els.manualNotice.innerHTML = makeNotice('warn', '疑似重复：系统发现相同 ISBN 或书名+作者组合。');
        return false;
      }

      rememberLocationPreset(location);

      if (editingBookId) {
        const target = books.find(b => b.id === editingBookId);
        if (!target) throw new Error('未找到要编辑的图书');
        target.isbn = isbn;
        target.title = title;
        target.author = author;
        target.category = category;
        target.readingStatus = readingStatus;
        target.readingProgress = readingProgress;
        target.publishedYear = publishedYear;
        target.location = location;
        target.description = description;
        target.notes = notes;
        target.updatedAt = new Date().toISOString();
        saveBooks(books);
        els.manualNotice.innerHTML = makeNotice('ok', `已更新：${title}`);
        editingBookId = null;
        els.saveBtn.textContent = '保存图书';
      } else {
        books.push({
          id: makeId(), isbn, title, author, category, readingStatus, readingProgress, publishedYear, location, description, notes,
          status: 'to_be_sorted', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
        });
        saveBooks(books);
        els.manualNotice.innerHTML = makeNotice('ok', `保存成功：${title}`);
      }
      els.isbn.value = ''; els.title.value = ''; els.author.value = ''; els.category.value = '';
      if (els.readingStatus) els.readingStatus.value = ''; if (els.readingProgress) els.readingProgress.value = '';
      els.publishedYear.value = ''; els.location.value = '';
      if (els.description) els.description.value = ''; if (els.notes) els.notes.value = '';
      lookupCompleted = false;
      if (options.next) {
        els.manualNotice.innerHTML = makeNotice('ok', '已加入图书，继续下一本。');
        els.isbn.focus();
      }
      render();
      return true;
    }

      const compact = String(els.isbn.value || '').replace(/[^0-9Xx]/g, '');

                  <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(0, Math.min(100, Number(book.readingProgress || 0)))}%"></div></div>
                  <div class="muted" style="margin-top:8px">阅读进度：${Math.max(0, Math.min(100, Number(book.readingProgress || 0)))}%</div>
                </div>

        wrap.appendChild(panel);
        return;
      }

      const menuAction = event.target.closest('.menu-panel button');
      if (menuAction) {
        const id = menuAction.dataset.id;
        const books = loadBooks();
        const book = books.find(b => b.id === id);
        if (!book) return;
        if (menuAction.dataset.action === 'edit') {
          editingBookId = id;
          els.isbn.value = book.isbn || '';
          els.title.value = book.title || '';
          els.author.value = book.author || '';
          els.category.value = book.category || '';
          if (els.readingStatus) els.readingStatus.value = book.readingStatus || '';
          if (els.readingProgress) els.readingProgress.value = book.readingProgress ?? '';
          els.publishedYear.value = book.publishedYear || '';
          els.location.value = book.location || '';
          if (els.description) els.description.value = book.description || '';
          if (els.notes) els.notes.value = book.notes || '';
          els.saveBtn.textContent = '保存修改';
          lookupCompleted = true;
          setEntryMode('manual');
          setPage('home');
          els.manualNotice.innerHTML = makeNotice('warn', `正在编辑：${escapeHtml(book.title || '未命名图书')}`);
        } else if (menuAction.dataset.action === 'delete') {
          if (!confirm(`确定删除《${book.title || '未命名图书'}》吗？`)) return;
          saveBooks(books.filter(b => b.id !== id));
          els.manualNotice.innerHTML = makeNotice('ok', `已删除：${escapeHtml(book.title || '未命名图书')}`);
          if (editingBookId === id) {
            editingBookId = null;
            els.saveBtn.textContent = '保存图书';
            els.isbn.value = ''; els.title.value = ''; els.author.value = ''; els.category.value = '';
            if (els.readingStatus) els.readingStatus.value = ''; if (els.readingProgress) els.readingProgress.value = '';
            els.publishedYear.value = ''; els.location.value = '';
            if (els.description) els.description.value = ''; if (els.notes) els.notes.value = '';
          }
          render();
        }
        document.querySelectorAll('.menu-panel').forEach(el => el.remove());
        openMenuBookId = null;
        return;

      const btn = event.target.closest('.organize-done-btn');

    function stopScanner() {
      scannerActive = false;
      if (scannerAnimFrame) { cancelAnimationFrame(scannerAnimFrame); scannerAnimFrame = null; }
      if (zxingScanControl) {
        try { zxingScanControl.stop(); } catch (_) {}

    async function fillBookMetaByIsbn(isbn, noticeTarget = 'scan', sourceLabel = '扫码成功') {
      const setNotice = (kind, text) => {
        const html = makeNotice(kind, text);
        if (noticeTarget === 'scan') els.scanNotice.innerHTML = html;
        else els.manualNotice.innerHTML = html;
      };
      const applyOpenLibrary = (book) => {
        if (!book) return;
        if (!els.title.value && book.title) els.title.value = book.title;
        if (!els.author.value && Array.isArray(book.authors) && book.authors.length) {
          els.author.value = book.authors.map(a => a.name).filter(Boolean).join(', ');
        }
        if (!els.category.value) {
          const subject = Array.isArray(book.subjects) && book.subjects.length ? (book.subjects[0]?.name || book.subjects[0]) : '';
          if (subject) els.category.value = String(subject).split(' / ')[0].slice(0, 24);
        }
        if (!els.description.value && book.excerpts && book.excerpts.length) {
          const excerpt = book.excerpts[0]?.text || '';
          if (excerpt) els.description.value = String(excerpt).slice(0, 280);
        }
        if (!els.publishedYear.value && book.publish_date) {
          const match = String(book.publish_date).match(/(19|20)\d{2}/);
          if (match) els.publishedYear.value = match[0];
        }
      };
      const applyGoogleBooks = (item) => {
        const info = item?.volumeInfo || {};
        if (!els.title.value && info.title) els.title.value = info.title;
        if (!els.author.value && Array.isArray(info.authors) && info.authors.length) els.author.value = info.authors.join(', ');
        if (!els.category.value && Array.isArray(info.categories) && info.categories.length) els.category.value = String(info.categories[0]).slice(0, 24);
        if (!els.description.value && info.description) els.description.value = String(info.description).replace(/<[^>]+>/g, '').slice(0, 280);
        if (!els.publishedYear.value && info.publishedDate) {
          const match = String(info.publishedDate).match(/(19|20)\d{2}/);
          if (match) els.publishedYear.value = match[0];
        }
      };
      const applyCrossref = (item) => {
        if (!item) return;
        if (!els.title.value && Array.isArray(item.title) && item.title[0]) els.title.value = item.title[0];
        if (!els.author.value && Array.isArray(item.author) && item.author.length) {
          els.author.value = item.author.map(a => [a.given, a.family].filter(Boolean).join(' ')).filter(Boolean).join(', ');
        }
        if (!els.publishedYear.value) {
          const year = item.published?.['date-parts']?.[0]?.[0] || item.published_print?.['date-parts']?.[0]?.[0];
          if (year) els.publishedYear.value = String(year);
        }
      };

      setNotice('warn', `已识别 ISBN：${isbn}，正在查询书名、作者、分类和简介…`);
      try {
        const olResp = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${encodeURIComponent(isbn)}&format=json&jscmd=data`);
        if (olResp.ok) {
          const olData = await olResp.json();
          applyOpenLibrary(olData[`ISBN:${isbn}`]);
        }

        let sourceHits = [];
        if (els.title.value || els.author.value || els.category.value || els.description.value || els.publishedYear.value) sourceHits.push('Open Library');

        let stillMissing = !els.title.value || !els.author.value || !els.category.value || !els.description.value || !els.publishedYear.value;
        if (stillMissing) {
          const gbResp = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${encodeURIComponent(isbn)}`);
          if (gbResp.ok) {
            const gbData = await gbResp.json();
            if (Array.isArray(gbData.items) && gbData.items.length) {
              applyGoogleBooks(gbData.items[0]);
              sourceHits.push('Google Books');
            }
          }
        }

        stillMissing = !els.title.value || !els.author.value || !els.publishedYear.value;
        if (stillMissing) {
          const crResp = await fetch(`https://api.crossref.org/works?filter=isbn:${encodeURIComponent(isbn)}&rows=1`);
          if (crResp.ok) {
            const crData = await crResp.json();
            const item = crData?.message?.items?.[0];
            if (item) {
              applyCrossref(item);
              sourceHits.push('Crossref');
            }
          }
        }

        const titleFilled = Boolean(els.title.value);
        const anyFilled = Boolean(els.title.value || els.author.value || els.category.value || els.publishedYear.value || (els.description && els.description.value));
        if (!titleFilled && !anyFilled) {
          setNotice('warn', `${sourceLabel}：${isbn}，但暂时没有查到完整书目信息，请手动补充后保存。`);
          return { found: false };
        }
        const authorFilled = Boolean(els.author.value);
        const categoryFilled = Boolean(els.category.value);
        const yearFilled = Boolean(els.publishedYear.value);
        const sourceText = sourceHits.length ? `（来源：${sourceHits.join(' / ')}）` : '';
        setNotice('ok', `${sourceLabel}：${isbn}${titleFilled ? ` · ${escapeHtml(els.title.value)}` : ''}${authorFilled ? ` · ${escapeHtml(els.author.value)}` : ''}${categoryFilled ? ` · ${escapeHtml(els.category.value)}` : ''}${yearFilled ? ` · ${escapeHtml(els.publishedYear.value)}` : ''} ${escapeHtml(sourceText)}`);
        return { found: true };
      } catch (e) {
        const partialFound = Boolean(els.title.value || els.author.value || els.category.value || els.publishedYear.value || (els.description && els.description.value));
        setNotice('warn', `${sourceLabel}：${isbn}，${partialFound ? '已拿到部分书目信息，你可以继续审阅后导入。' : '但联网查询书目信息失败，请手动补充后保存。'}`);
        return { found: partialFound, error: e };
      }
    }

    function handleScanResult(rawValue) {
      stopScanner();
      const isbn = rawValue.replace(/[^0-9Xx]/g, '');
      if (isbn.length === 10 || isbn.length === 13) {
        els.isbn.value = isbn;
        fillBookMetaByIsbn(isbn, 'scan');
      } else {
        els.scanNotice.innerHTML = makeNotice('warn', `识别到条码但非 ISBN 格式（${escapeHtml(rawValue)}），请手动录入 ISBN。`);
        setEntryMode('manual');
      }
    }

    async function startScanner() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        els.scanNotice.innerHTML = makeNotice('err', '该浏览器不支持摄像头访问（需要 HTTPS 或本地环境）。请手动录入 ISBN。');
        return;
      }

      els.scanNotice.innerHTML = makeNotice('warn', '正在申请摄像头权限…');

      // Path 1: Native BarcodeDetector (Chrome, iOS 17.4+)
      if ('BarcodeDetector' in window) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
          });
          scannerStream = stream;
          const video = els.scannerVideo;
          video.srcObject = stream;
          await video.play();
          scannerActive = true;
          els.scannerBox.style.display = 'block';
          render();
          els.scanNotice.innerHTML = makeNotice('warn', '将书背面条码对准框内…');
          const detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128', 'qr_code'] });
          const scan = async () => {
            if (!scannerActive) return;
            try {
              if (video.readyState >= 2) {
                const barcodes = await detector.detect(video);
                if (barcodes.length > 0) { handleScanResult(barcodes[0].rawValue); return; }
              }
            } catch (_) {}
            scannerAnimFrame = requestAnimationFrame(scan);
          };
          scan();
          return;
        } catch (e) {
          const msg = e.name === 'NotAllowedError' ? '摄像头权限被拒绝，请在浏览器设置中允许访问摄像头后重试。'
            : e.name === 'NotFoundError' ? '未检测到摄像头设备。'
            : `摄像头启动失败：${e.message || e.name}`;
          els.scanNotice.innerHTML = makeNotice('err', msg + ' 请手动录入 ISBN。');
          stopScanner();
          return;
        }
      }

      // Path 2: ZXing fallback (iPhone Safari iOS < 17.4, Firefox)
      if (!window.ZXingBrowser || !window.ZXingBrowser.BrowserMultiFormatReader) {
        els.scanNotice.innerHTML = makeNotice('err', '该设备浏览器暂不支持条码扫描，请手动录入 ISBN。');
        return;
      }

      try {
        zxingReader = new window.ZXingBrowser.BrowserMultiFormatReader();
        scannerActive = true;
        els.scannerBox.style.display = 'block';
        render();
        els.scanNotice.innerHTML = makeNotice('warn', '将书背面条码对准框内…');
        // decodeFromVideoDevice manages camera lifecycle; null = prefer rear/environment camera
        zxingScanControl = await zxingReader.decodeFromVideoDevice(
          null, els.scannerVideo,
          (result, err) => { if (result && result.text) handleScanResult(result.text); }
        );
      } catch (e) {
        const msg = e.name === 'NotAllowedError' ? '摄像头权限被拒绝，请在浏览器设置中允许访问摄像头后重试。'
          : e.name === 'NotFoundError' ? '未检测到摄像头设备。'
          : `摄像头启动失败：${e.message || e.name}`;
        els.scanNotice.innerHTML = makeNotice('err', msg + ' 请手动录入 ISBN。');
        stopScanner();
      }
    }

    els.scannerCancelBtn.onclick = stopScanner;
    // ── End Scanner ───────────────────────────────────────────────────────────

    render();
  </script>
</body>
</html>
